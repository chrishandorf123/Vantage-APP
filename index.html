ust for decision-making?","When ops leaders ask for a metric you don't have, what's standing in the way of capturing it?","How do your current BI tools connect to shop floor data. direct API, data warehouse, or manual export?"],"warn":"Speak data pipeline language. sources, schemas, APIs, latency. They are not interested in operator UX; they want clean, structured, real-time data.","thread":"'Who owns the data strategy above you? Who on ops is most data-hungry?' → CIO + VP Ops + CI Mgr.","vm":"Hey [Name], Chris from Tulip. BI leaders tell me floor data is the hole in every pipeline: manual, late, untrusted. Capturing it automatically at the point of work fixes it at the source. Worth a conversation. I'll email you. Chris, Tulip, [number]."},{"title":"Supply Chain Mgr","c":"#0284c7","openers":["Hey [Name], Chris from Tulip. Reason for the call: supply chain managers tell me their biggest blind spot is inside their own four walls. WIP disappears between receiving and shipping and the plan runs on guesswork. How do you see actual floor status today: a system, a meeting, or someone walking?","Hey [Name], Chris at Tulip. One supply chain team killed 90% of their production status meetings by giving planning a live floor picture: WIP, cycle times, bottlenecks, real time. How often does stale floor data cause a planning miss or an OTD slip for you?","Hey [Name], Chris from Tulip. Quick one: where do supplier defects actually surface for you: incoming inspection, or three stations downstream? If it's downstream, the paper at receiving is the leak. That's what we fix. Worth a minute?"],"cares":["On-time delivery (OTD)","Inventory accuracy & WIP","Demand-supply alignment","Supplier quality incoming"],"pains":["Floor data is stale. planning is guesswork","WIP black hole between receiving and shipping","Manual cycle time tracking","Incoming inspection is paper-based"],"pitch":"The four-walls problem: your plan depends on knowing where everything is, and between receiving and shipping it goes dark. What changes: WIP and throughput are visible live at every station, actual cycle times feed your planning system automatically instead of standards from memory, and incoming inspection goes digital so supplier defects get caught at the dock instead of on the line. OTD improves because the slip is visible while you can still act. One team retired most of their status meetings entirely. What decision would you make differently this week with a live WIP picture?","qs":["How do you get a real-time view of production status and WIP today. system, meeting, or someone walking the floor?","How often does stale or inaccurate floor data cause a planning miss or an OTD failure?","What's your current on-time delivery rate and what's driving the miss when it slips?","How does incoming inspection work today. paper or digital, and where do supplier defects tend to surface?","If you had real-time cycle time and WIP data feeding your planning system automatically, what would you do differently?"],"warn":"They care about DATA ACCURACY and TIMELINESS, not shop floor UX. Frame everything as better planning inputs.","thread":"'Who runs the floor? Who owns quality on incoming?' → Plant Mgr + Quality Dir.","vm":"Hey [Name], Chris from Tulip. Supply chain leaders tell me the blind spot is inside the building: WIP status, yield, what actually ships on time. A live floor picture closed it and killed most of their status meetings. Worth a call. I'll email you. Chris, Tulip, [number]."},{"title":"Delivery Assurance Manager","c":"#d97706","openers":["Hey [Name], Chris from Tulip. Reason for my call: delivery assurance managers tell me the hardest part of protecting OTD is seeing the slip while there's still time to fix it. Milestones tracked by hand are always a step behind. How do you track program milestones today, and how current is that picture?","Hey [Name], Chris at Tulip. A program shop stopped feeding compliance risk with paper: digital travelers, ECNs landing instantly, audit trails building themselves. Pratt Miller won new DoD work on exactly that. What audit findings have cost your programs time in the last year?","Hey [Name], Chris from Tulip. Quick one: when an ECN drops, how long until the updated requirement is actually running on the floor? Every day of that lag is delivery risk you're carrying silently. Closing it is exactly what we do. Worth 30 seconds?"],"cares":["On-time delivery to contract milestones","DCMA / DCAA audit readiness","Traveler and serialized traceability","Risk visibility across programs"],"pains":["Paper travelers create traceability gaps","Milestone status is manual and delayed","ECNs don't reach the floor until too late","Audit findings slow down program execution"],"pitch":"Your risk compounds quietly: paper travelers open traceability gaps, milestone status arrives late, and audit findings turn into schedule slips. What changes: digital travelers with serial-level tracking, real-time visibility at every station so a slip shows itself early, ECNs propagating instantly, and audit trails that build themselves as the work happens. Pratt Miller ran DoD production this way and won new contracts on the strength of their record. The penalty conversation gets replaced by the early-warning conversation. Which program's OTD is tightest right now?","qs":["What does your traveler and serialized part tracking process look like today. paper or digital?","How do you track milestone status across programs. is that in a system or managed manually?","When an ECN drops, how long before the updated requirement is actually running on the production floor?","What audit findings have slowed program execution or impacted delivery in the last 12 months?","If a delivery slips due to a traceability or compliance gap, what does that cost you in penalties or re-work?"],"warn":"Frame everything as schedule risk and contract compliance. not technology. They care about program outcomes, not features.","thread":"'Who owns manufacturing systems? Who handles AS9100 or DCMA compliance?' → Program Mgr + Quality Dir.","vm":"Hey [Name], Chris from Tulip. Delivery assurance leaders tell me the hardest part of OTD is catching the slip early enough to matter. Real-time WIP at every station makes the slip visible while it's still fixable. Worth 20 minutes. I'll email you something short. Chris, Tulip, [number]."},{"title":"Maintenance Mgr","c":"#64748b","openers":["Hey [Name], Chris from Tulip. Reason for the call: maintenance managers tell me most unplanned downtime traces back to something small: a PM that slipped, an operator who noticed a noise and didn't report it. What's your planned-to-reactive ratio right now, honestly?","Hey [Name], Chris at Tulip. One maintenance team cut unplanned downtime 30% with two changes: operators logging issues in ten seconds from the line, and PM checklists that can't get skipped. How do operators report machine issues today: verbal, paper, or not at all until it breaks?","Hey [Name], Chris from Tulip. Quick one: what's your average time from 'issue reported' to 'machine running again'? If part of that clock is a paper work order sitting in a tray, that's the free win. That's what we fix. Worth 60 seconds?"],"cares":["Uptime & OEE","Preventive vs reactive ratio","MTTR & MTBF","Spare parts & work order speed"],"pains":["Mostly reactive. always firefighting","Paper work orders lost or delayed","No real-time machine health visibility","Operators don't report issues until breakdown"],"pitch":"You're firefighting because the system feeds you fires: issues reported late or never, paper work orders that stall, PMs tracked on a calendar nobody enforces. What changes: an operator logs a machine issue in ten seconds and it auto-creates the work order, PM checklists enforce every step with nothing skippable, and machine health flags anomalies before the failure. One team cut unplanned downtime 30% this way. Your ratio shifts from reactive to planned because the early signals finally reach you. Which machine or line generates most of your 2am calls?","qs":["What's your current ratio of planned to unplanned maintenance, and where is reactive work hurting you most?","How do operators report machine issues right now. verbal, paper, or a system?","What's your average MTTR from when an issue is reported to when the machine is back running?","How are your PM schedules tracked and triggered. calendar-based, run-hour-based, or something else?","What's your single biggest driver of unplanned downtime. equipment age, operator behavior, or lack of early warning?"],"warn":"Speak their language: MTTR, MTBF, PM compliance, wrench time. Don't over-tech it.","thread":"'Who runs ops above you? Who manages the operators?' → VP Ops + Plant Mgr.","vm":"Hey [Name], Chris from Tulip. Maintenance managers tell me most unplanned downtime traces to a PM that slipped or an issue nobody reported. One team fixed both and cut downtime 30%. Worth 20 minutes. I'll email you. Chris, Tulip, [number]."},{"title":"Machine Shop Supervisor","c":"#78716c","openers":["Hey [Name], Chris from Tulip. Reason for my call: shop supervisors tell me setup is where the money leaks: machinists working from a binder or memory, first-piece scrap, and the veteran carrying half the process in his head. How do setups actually get done on your floor today?","Hey [Name], Chris at Tulip. A machine shop cut setup time 40% by putting the setup guide on a screen at the machine: photos, required confirmations before cutting, first-article logged automatically. How long does your first-piece inspection cycle run right now?","Hey [Name], Chris from Tulip. Quick one: when your most experienced machinist is out, what happens to setup time and scrap that week? If the answer is 'it gets ugly,' the process lives in his head instead of at the machine. That's what we fix. Worth 60 seconds?"],"cares":["Setup time and changeover efficiency","First-article inspection accuracy","Job routing and traveler visibility","Operator skill and ramp-up time"],"pains":["Paper travelers lost or out of date","Setup relies on veteran knowledge. hard to transfer","First-piece inspection is manual and slow","No visibility into job status across the shop"],"pitch":"The shop's real costs hide in transitions: setups from memory, first-piece scrap, travelers that go missing, new machinists taking weeks to run alone. What changes: setup instructions live at the machine with photos and required confirmations before cutting, first-article inspection logs itself, travelers go digital with a QR scan at each op so you always know where a job sits, and the new machinist follows the same guided process as your best. One shop cut setup time 40%. Ramp went from weeks to days. Which machine's setups hurt most?","qs":["How do machinists get setup instructions today. paper binders, verbal handoff, or something digital?","How long does a typical first-piece inspection take from setup complete to approved to run?","When a job is on the floor, how do you know where it is in the routing at any given moment?","How long does it take to onboard a new machinist to the point where they're running independently?","When your most experienced machinist is out, how much does setup time and quality risk increase, and why?"],"warn":"Be practical and tangible. They respond to specific scenarios. setup time, first-piece, travelers. not 'digital transformation.'","thread":"'Who approves new tooling or process changes? Who manages scheduling?' → Dir of Mfg + Plant Mgr.","vm":"Hey [Name], Chris from Tulip. Shop supervisors tell me setup and first-piece are where their scrap lives, machinists working from memory or a binder. One shop put the guide at the machine and cut setup time 40%. Worth a call. I'll email you. Chris, Tulip, [number]."},{"title":"Supply Quality Manager","c":"#059669","openers":["Hey [Name], Chris from Tulip. Reason for the call: supply quality managers tell me the painful moment is a supplier defect surfacing on the line, then hours of hunting paper to trace the lot and the inspection record. How is incoming inspection documented at [company] today?","Hey [Name], Chris at Tulip. One team digitized receiving inspection and cut incoming escapes 60% in six months: mandatory sign-offs, defects traced to lot and supplier instantly, SCARs opening themselves. How long does a SCAR take you from open to verified closure right now?","Hey [Name], Chris from Tulip. Quick one: what does a single supplier escape that reaches the line actually cost you, all in? If you've never totaled it, the number usually justifies fixing receiving on its own. Worth 60 seconds?"],"cares":["Incoming inspection accuracy","Supplier scorecards & SCAR","NCR tracking and closure","Audit readiness for supplier quality"],"pains":["Paper-based receiving inspection","Supplier defects caught late or not at all","SCAR process is slow and manual","No real-time supplier quality dashboard"],"pitch":"The pattern: paper receiving inspection, defects surfacing downstream, and a SCAR process that runs on chasing. What changes: incoming inspection goes digital with mandatory sign-offs and camera capture, a defect traces to the lot, supplier, and original inspection record in seconds, SCARs open automatically with the evidence attached, and supplier scorecards run live instead of quarterly. One team cut incoming escapes 60% in six months. Your audits get boring, which is the goal. Which supplier would you put under the microscope first?","qs":["How is incoming inspection documented today. paper forms, spreadsheets, or a digital system?","When a supplier defect reaches the line, how quickly can you trace it back to the lot and the original inspection record?","How long does it take to close a SCAR end-to-end from opening to verified closure?","How do you score and track supplier quality performance over time. system or manual?","What does one supplier escape that reaches the production line actually cost you. direct and indirect?"],"warn":"Use their vocabulary: SCAR, NCR, incoming inspection, supplier scorecard. Don't generalize. they are specialists.","thread":"'Who owns supplier relationships above you? Who runs quality internally?' → Quality Dir + Supply Chain Mgr.","vm":"Hey [Name], Chris from Tulip. Supply quality managers tell me the worst part is chasing paper when a supplier defect surfaces. One team digitized receiving and cut incoming escapes 60% in six months. Worth 20 minutes. I'll send you something. Chris, Tulip, [number]."},{"title":"Test Engineer","c":"#7c3aed","openers":["Hey [Name], Chris from Tulip. Reason for my call: test engineers tell me the weak link isn't the test, it's the record: results in spreadsheets filled in after the fact, failures surfacing downstream, traceability that takes hours to rebuild. How are results captured at your stations today?","Hey [Name], Chris at Tulip. One test team stopped transcribing: torque tools, calipers, and test equipment logging straight to the serial number with pass/fail logic and mandatory sign-off. Test escapes dropped 70%. How quickly do you know when a failure happens right now: real time, or at a downstream check?","Hey [Name], Chris from Tulip. Quick one: what does one test escape that reaches a customer cost, counting the warranty, the field return, and the relationship? That number is why the record has to capture itself. That's what we fix. Worth a minute?"],"cares":["Test coverage and repeatability","First-pass test yield","Traceability of test results to serial numbers","Reducing escapes and warranty returns"],"pains":["Paper test travelers. manual data entry errors","Test failures not caught until downstream","No real-time test yield dashboard","Compliance audit trail is a nightmare"],"pitch":"The exposure isn't your test coverage, it's everything around it: manual entry breeding transcription errors, failures caught downstream, and compliance pulls that mean spreadsheet archaeology. What changes: your instruments log directly to the serial number, pass/fail logic flags the failure at the station in real time, sign-off is enforced before anything moves, and the audit trail exists the moment the test does. One team cut test escapes 70%. First-pass yield becomes a live number instead of a monthly reconstruction. Which test stand would you instrument first?","qs":["How are test results captured today. paper travelers, spreadsheets, or a connected system?","How quickly do you know when a test failure happens. real-time or found at a downstream check?","How do you link test results to a specific serial number or lot for traceability and compliance?","What's your current first-pass test yield and where are failures most commonly occurring?","What does one test escape that reaches the customer cost. warranty, field return, and relationship damage?"],"warn":"They respect technical depth. Mention IoT connectivity, serial number traceability, and auto-logging. not 'digital transformation.'","thread":"'Who owns quality above you? Who manages production scheduling?' → Quality Dir + Plant Mgr.","vm":"Hey [Name], Chris from Tulip. Test engineers tell me the risk isn't the test, it's the spreadsheet someone fills in afterward. One team logged instruments straight to the serial number and cut test escapes 70%. Worth a look. I'll email you. Chris, Tulip, [number]."},{"title":"EH&S Director","c":"#059669","openers":["Hey [Name], Chris from Tulip. Reason for the call: EH&S leaders tell me the most preventable incidents trace back to a safety step that got skipped: the procedure was in a binder and the operator was in a hurry. How do you verify safety compliance across shifts today: audits, trust, or something in between?","Hey [Name], Chris at Tulip. One site cut recordable incidents 40% with a simple change: safety-critical steps became mandatory digital checkpoints operators can't bypass. Where would a skipped step hurt most on your floor right now?","Hey [Name], Chris from Tulip. Quick one: if OSHA walked in unannounced tomorrow, what's your biggest exposure: the procedures, the training records, or proving either was actually followed? Whichever it is, that's the record we make build itself. Worth 60 seconds?"],"cares":["Incident prevention and near-miss tracking","Safety procedure compliance and audit readiness","OSHA recordable reduction","Chemical and hazmat handling traceability"],"pains":["Safety SOPs on paper. operators skip or miss steps","No visibility into safety compliance on the floor","Incident root cause is slow and manual","Training records are paper-based and hard to audit"],"pitch":"Your risk lives in the gap between the written procedure and the actual behavior: binder SOPs, verbal confirmations, training records that take days to assemble for an audit. What changes: safety-critical steps become mandatory digital checkpoints that work can't proceed without, near-misses and incidents get logged at the point of occurrence in seconds, and training and inspection records are searchable the moment someone official asks. One site cut recordable incidents 40% this way. The audit stops being a scramble and the behavior stops depending on the binder. Which procedure worries you most on night shift?","qs":["How do operators confirm they've completed safety checks today. paper sign-off, verbal, or a digital record?","How do you verify safety procedure compliance across shifts. is it audited, trusted, or somewhere in between?","When an incident or near-miss happens, how long to complete root cause and pull all related training and inspection records?","How are safety training records managed. paper, LMS, or something else, and how audit-ready are they?","What's your biggest compliance exposure if OSHA walked in tomorrow unannounced?"],"warn":"Lead with safety outcomes. incident reduction, compliance, auditability. They are not technology buyers; they are risk mitigators. Frame Tulip as a safety system, not a software platform.","thread":"'Who owns production scheduling and standard work? Who leads quality?' → Plant Mgr + Quality Dir.","vm":"Hey [Name], Chris from Tulip. EH&S leaders tell me preventable incidents trace back to skipped steps and buried procedures. One site made safety checks mandatory digital steps and cut recordables 40%. Worth 20 minutes. I'll email you. Chris, Tulip, [number]."},{"title":"MSAT Director","c":"#7c3aed","cares":["Process robustness and CPV without living in spreadsheets","Tech transfers that land on time with the receiving site actually ready","Closing the loop between process understanding and what operators actually do","Deviation trends traced to root cause, not narrative"],"pains":["Transfers reinvented from paper each time, knowledge lost between sites","CPV data assembled by hand from batch records weeks after the fact","Process changes stuck behind validation cycles","The floor drifting from the validated process with no signal until a deviation"],"openers":["Hey [Name], Chris from Tulip. Reason for my call: MSAT leaders tell me the same thing about transfers. The process knowledge exists, but it moves between sites as documents and tribal memory, so the receiving site pays for it in deviations. How did your last transfer actually land?","Hey [Name], Chris at Tulip. Quick question about CPV. Most MSAT teams I talk to assemble it by hand from batch records, weeks behind the process. If parameter data flowed in as the batch ran, what would you catch earlier? AstraZeneca built their transfers on modular validated blocks for exactly this reason."],"pitch":"The process knowledge your team owns lives in documents, and the floor runs on its own memory of them. What changes: the validated process becomes executable steps operators follow, parameter data streams into CPV as batches run instead of weeks later, and a transfer means deploying a proven digital playbook to the next site rather than re-authoring it. AstraZeneca scaled that model across 24 GxP sites.","qs":["When a process transfers to a new site or line, what actually carries the knowledge: documents, people, or something executable?","How current is your CPV picture right now: live, weekly, or assembled at review?","Where does the floor drift from the validated process first, and how do you find out?"],"thread":"'Who owns the transfer timeline commercially?' → Site Head or VP Ops. 'Who validates the systems you'd use?' → CSV lead.","vm":"Hey [Name], Chris from Tulip. MSAT leaders tell me transfers move as documents and tribal memory, and the receiving site pays in deviations. AstraZeneca made transfers a deployable validated playbook across 24 sites. Worth 20 minutes. I'll email you. Chris, Tulip, [number].","warn":"Deep technical audience. Speak CPV, CPPs, CQAs, PPQ, tech transfer. Never oversimplify the science. Their skepticism is validation burden, so lead with configuration-based change inside a controlled framework, not features.","hub":"pharma"},{"title":"CSV / Digital Systems Lead","c":"#2563eb","cares":["Part 11 and Annex 11 compliance that survives an inspection","Risk-based validation (CSA) instead of testing everything to death","A supplied validation package that actually reduces their authoring burden","Change control that doesn't turn every update into a revalidation project"],"pains":["Every new system means months of protocol authoring from scratch","Vendors who claim compliance but arrive with no validation documentation","Legacy validated systems nobody dares touch","Being the reason good tools die in the queue, and everyone knowing it"],"openers":["Hey [Name], Chris from Tulip. Reason for my call: CSV leads tell me they've become the place where good ideas go to wait, not because they want to, but because every system arrives with zero validation documentation and the authoring lands on them. What does your validation queue look like right now?","Hey [Name], Chris at Tulip. Quick one: when a vendor shows up claiming GxP-ready, what do they actually hand you? Most hand a brochure. There's a difference between claiming compliance and arriving with a validation package built for risk-based CSA. Worth 60 seconds on that difference?"],"pitch":"Every system change lands on your desk as a from-scratch protocol project, so the queue grows and you become the bottleneck nobody thanks. What changes: the platform arrives with a supplied validation package aligned to risk-based CSA, changes are configuration inside an already-qualified framework instead of new code, and the audit trail is native rather than bolted on. Your queue shrinks and the floor stops waiting.","qs":["When a floor system changes today, what triggers revalidation, and how long does that cycle actually run?","Have you moved toward risk-based CSA, or is the SOP still test-everything?","What would a vendor have to hand you on day one for a project to feel low-risk?"],"thread":"'Who feels the queue most?' → MSAT and manufacturing engineering. 'Who owns the budget for the systems you validate?' → IT Director and Quality Director.","vm":"Hey [Name], Chris from Tulip. CSV leads tell me every new system dumps months of protocol authoring on their desk. A supplied validation package plus configuration-based change collapsed that scope for one team. Worth 20 minutes. I'll email you. Chris, Tulip, [number].","warn":"They have been burned by vendor compliance claims. Do not say compliant, say what documentation ships and how change control works. Precision earns the meeting, enthusiasm kills it.","hub":"pharma"},{"title":"Packaging & Serialization Mgr","c":"#d97706","cares":["Serialization data integrity from printer to aggregation without manual patching","Line clearance that is fast and provable","Changeovers between SKUs and markets that don't eat the shift","Label and artwork versions that physically cannot mix"],"pains":["Serialization exceptions handled by hand at the line while product waits","Paper line clearance checks that get pencil-whipped under pressure","A label mixup being one distracted moment away, and it's a recall","Changeover taking hours of checks that nobody can prove happened"],"openers":["Hey [Name], Chris from Tulip. Reason for my call: packaging leaders tell me line clearance is the scariest signature in the building, because a rushed check is invisible until the mixup ships. How is clearance actually verified on your lines today, paper or proof?","Hey [Name], Chris at Tulip. Quick question about changeover on your packaging lines. Between clearance checks, label verification, and serialization setup, how much of the shift goes to proving the line is ready instead of running it? Sharp cut clinical packaging setup 30 percent."],"pitch":"Your lines lose time twice: once doing clearance and setup, and again proving it happened. What changes: guided digital clearance where the line physically cannot start until every check is verified, label and recipe versions locked to the order so mixups are structurally impossible, and serialization events captured cleanly instead of patched by hand. Sharp runs clinical packaging this way and cut setup 30 percent.","qs":["Walk me through line clearance today: who checks, who verifies, and what proves it happened?","Where do serialization exceptions get handled, at the line in the moment or in a cleanup pile?","What did your last label or lot mixup near-miss look like?"],"thread":"'Who owns the recall risk conversation?' → Quality Director. 'Who feels changeover time as capacity?' → Ops Manager and Planner.","vm":"Hey [Name], Chris from Tulip. Packaging leaders tell me line clearance is the scariest signature in the building because a rushed check is invisible until it ships. One team made clearance impossible to skip and cut setup 30 percent. Worth 20 minutes. I'll email you. Chris, Tulip, [number].","warn":"DSCSA and EU FMD words land here: aggregation, EPCIS, verification. But their daily life is clearance and changeover, so lead with the line, not the regulation.","hub":"pharma"},{"title":"QC Lab Manager","c":"#0e9f6e","cares":["Sample turnaround time that doesn't gate batch release","Data integrity from instrument to record with no transcription in between","Lab investigations closed on data instead of interviews","Analyst execution consistent across shifts and instruments"],"pains":["Results transcribed from instruments into records, a standing ALCOA exposure","Samples waiting in queues nobody can see, while release waits on the lab","OOS investigations reconstructed from notebooks and memory","Method execution varying by analyst with no way to prove otherwise"],"openers":["Hey [Name], Chris from Tulip. Reason for my call: QC managers tell me release doesn't wait on production, it waits on the lab, and the lab is waiting on transcription and queues nobody can see. Where does a sample actually sit longest between arrival and result at your site?","Hey [Name], Chris at Tulip. Quick data integrity question. Every place a result moves by hand from instrument to record is an ALCOA exposure your auditor can find. How many of those handoffs exist between your bench and the batch record right now?"],"pitch":"Your lab gates release, and the lab is gated by transcription, invisible queues, and investigations built from memory. What changes: instruments log straight into compliant records so transcription disappears, sample status is visible from arrival to result, and guided method execution makes analyst-to-analyst variation provable instead of assumed. Release stops waiting on paperwork.","qs":["Where does a result move by hand today between instrument and record?","Can you see your sample queue right now, or does the answer require walking the lab?","What did your last OOS investigation take to reconstruct, and from what sources?"],"thread":"'Who owns release timing above you?' → Quality Director and site leadership. 'Who validates lab systems?' → CSV lead.","vm":"Hey [Name], Chris from Tulip. QC managers tell me release waits on the lab, and the lab waits on transcription and invisible queues. Instruments logging straight to compliant records removed both for one site. Worth 20 minutes. I'll email you. Chris, Tulip, [number].","warn":"They may assume you're selling a LIMS. Say early: this works with the LIMS, it fixes execution and the instrument-to-record gap around it.","hub":"pharma"},{"title":"CDMO / CMO Site Leader","c":"#dc2626","cares":["Winning and keeping clients on the strength of transparency and right-first-time","Onboarding new client processes fast without drowning in documentation","Margin per suite in a business where capacity is the product","Audit performance, because every client audits and every audit is a sales event"],"pains":["Every new client program means weeks of batch record authoring before revenue","Client-facing status assembled by hand for every weekly call","Deviations and documentation rework eating the margin the contract assumed","Hosting dozens of client and regulatory audits a year on paper systems"],"openers":["Hey [Name], Chris from Tulip. Reason for my call: CDMO site leaders tell me the economics are brutal in one specific way. Every new program front-loads weeks of documentation before a single billable batch, and every client call burns hours assembling status. How long from signed contract to first batch at your site?","Hey [Name], Chris at Tulip. Quick question: how many audits did your site host last year, client plus regulatory? For most CDMOs it's dozens, and every one runs on the same paper. Sharp, a contract packager, digitized execution and cut clinical setup 30 percent. Worth hearing how?"],"pitch":"Your product is capacity and trust, and both leak through paper: weeks of authoring before first batch, hand-built client status, and audit after audit on the same binders. What changes: client programs deploy as digital instructions in days, status is live and shareable instead of assembled, records complete themselves during execution, and audits become a strength you sell. Sharp runs contract packaging this way.","qs":["From contract signature to first billable batch, where does the time actually go?","How is client-facing status built today, and who spends their week building it?","When a client audits, what do they see: a differentiator or the same paper as everyone else?"],"thread":"'Who owns client relationships and growth?' → BD lead. 'Who feels documentation cost as margin?' → CFO or site controller.","vm":"Hey [Name], Chris from Tulip. CDMO leaders tell me every new program front-loads weeks of documentation before revenue, and every client call burns hours on status. One contract site digitized execution and cut setup 30 percent. Worth 20 minutes. I'll email you. Chris, Tulip, [number].","warn":"They think commercially, not technically. Frame everything as time to revenue, margin, and client retention. The compliance story is table stakes, the business story wins.","hub":"pharma"},{"title":"Clinical Supply Mfg Mgr","c":"#475569","cares":["Small batches with huge documentation ratios executed right first time","Protocol amendments reaching the floor before the next batch, not after","Blinding, labeling, and kit integrity with zero tolerance for error","Speed, because a trial waiting on supply is a trial burning money"],"pains":["Documentation per batch that rivals commercial while batch sizes are tiny","Every study a new process with a new learning curve and new deviations","Amendments crawling to execution through document control","Label and kit errors that can unblind a study"],"openers":["Hey [Name], Chris from Tulip. Reason for my call: clinical supply leaders tell me their ratio is upside down: commercial-grade documentation on batches a fraction of the size, and a new process to learn with every study. What ate the most time on your last campaign, the making or the proving?","Hey [Name], Chris at Tulip. Quick question about amendments. When a protocol changes, how long before the floor is executing the new version, and how do you prove nobody ran the old one? Most sites answer in weeks and hope."],"pitch":"Clinical manufacturing pays commercial documentation costs on tiny batches, relearns the process every study, and lives one label error from unblinding. What changes: study-specific instructions deploy in days instead of authoring cycles, amendments land on the floor instantly with the old version unable to run, and the record builds itself batch by batch. The campaign moves at trial speed instead of paperwork speed.","qs":["On your last campaign, what was the ratio of documentation time to production time?","When an amendment lands, how does the floor find out, and how fast?","Where is the scariest error mode in your kitting and labeling flow today?"],"thread":"'Who feels trial timeline pressure most?' → Clinical operations and program leadership. 'Who owns the site quality position?' → Quality Director.","vm":"Hey [Name], Chris from Tulip. Clinical supply leaders tell me they pay commercial documentation costs on tiny batches and relearn the process every study. Study instructions deployed in days changed that math for one team. Worth 20 minutes. I'll email you. Chris, Tulip, [number].","warn":"GMP-for-clinical has its own rhythm: annex 13, IMP, blinding. Show you know the difference from commercial or lose them in the first minute.","hub":"pharma"},{"title":"RA / QA Director","c":"#7c3aed","cares":["Inspection readiness as a standing state, not a fire drill","A QMS where the documented process and the executed process are the same thing","Submission commitments the floor can actually prove it keeps","QMSR transition landing without a remediation project"],"pains":["Audit prep consuming weeks per cycle because evidence lives everywhere","Findings that trace to execution drift, not missing procedures","The gap between what the SOP says and what the floor does","Remediation projects that fix the paper without fixing the process"],"openers":["Hey [Name], Chris from Tulip. Reason for my call: RA and QA leaders tell me their findings almost never come from missing procedures. They come from the gap between what the SOP says and what the floor actually did. How do you see that gap today before an auditor does?","Hey [Name], Chris at Tulip. Quick question ahead of your next inspection: how many weeks does readiness prep actually take, and how much of it is assembling evidence that should already exist? One team made the record exist by default and audit prep became a non-event."],"pitch":"Your findings come from execution drift, and your audit prep is weeks of assembling evidence after the fact. What changes: the SOP becomes the executable process itself, so the floor cannot drift from it silently, and every action creates its own compliant record as it happens. Inspection readiness stops being a project and becomes the standing state of the operation.","qs":["Of your last several findings, how many traced to procedure gaps versus execution gaps?","What does inspection prep cost you in weeks, honestly?","When the QMSR transition audit comes, is your DHR story a strength or an exposure?"],"thread":"'Who owns the floor that creates your evidence?' → VP Ops. 'Who funds quality systems?' → CFO with the cost-of-poor-quality math.","vm":"Hey [Name], Chris from Tulip. RA and QA leaders tell me findings come from the gap between the SOP and what the floor did. One team made the procedure the executable process itself, and audit prep became a non-event. Worth 20 minutes. I'll email you. Chris, Tulip, [number].","warn":"Regulatory professionals detest overpromising. Never say guaranteed compliance. Say the record exists by construction and let them draw the conclusion.","hub":"meddevice"},{"title":"Design Assurance Mgr","c":"#2563eb","cares":["DMR to DHR alignment, so what was built provably matches what was designed","Design transfer landing in production without translation loss","Risk controls from the FMEA actually implemented at the point of work","Design change verification on the floor, not assumed"],"pains":["The DHR proving a process that drifted from the DMR without anyone noticing","Design transfer as a document dump the floor reinterprets","Risk mitigations that exist in the file but not at the station","Change effectivity on paper, with old-revision builds discoverable only later"],"openers":["Hey [Name], Chris from Tulip. Reason for my call: design assurance leaders tell me their nightmare is quiet drift: the DHR keeps passing while the process slides away from the DMR, and nobody sees it until a complaint or an audit connects the dots. How do you verify build-to-design today?","Hey [Name], Chris at Tulip. Quick question about your risk file. The FMEA lists mitigations, but how many of them exist as enforced steps at the actual station versus lines in a document? That gap is where field issues are born."],"pitch":"Design transfer hands the floor documents, and the floor hands back a DHR, and the drift between them is invisible until it costs you. What changes: the DMR becomes the executable process, risk mitigations from the FMEA become enforced checkpoints at the station, and change effectivity is absolute because a superseded revision cannot physically run. Build-to-design stops being an assumption.","qs":["How do you verify today that what production runs still matches the DMR?","Pick one FMEA mitigation: is it an enforced step at a station, or a sentence in a file?","When a design change goes effective, how do you prove the old revision never ran again?"],"thread":"'Who owns production execution?' → Ops Manager. 'Who owns the design file?' → R&D leadership. Bridge them: this is their shared gap.","vm":"Hey [Name], Chris from Tulip. Design assurance leaders tell me the nightmare is quiet drift: the DHR passing while the process slides from the DMR. One team made the DMR the executable process itself. Worth 20 minutes. I'll email you. Chris, Tulip, [number].","warn":"Design controls vocabulary is mandatory: DMR, DHR, DHF, design transfer, effectivity. One sloppy term and you're a generic software vendor.","hub":"meddevice"},{"title":"Complaints & Post-Market Mgr","c":"#dc2626","cares":["Complaint investigations closed on production data instead of archaeology","MDR and vigilance decisions made fast with real evidence","Trending that connects field signals back to lots, lines, and process changes","Closing the loop so the same complaint stops recurring"],"pains":["Every investigation starting with a days-long hunt through paper DHRs","Root cause defaulting to operator error because the data ran out","Field signal trends that can't connect to what changed in production","Reportability clocks ticking while records are still being located"],"openers":["Hey [Name], Chris from Tulip. Reason for my call: post-market leaders tell me every complaint investigation starts the same way, with a hunt through paper DHRs that eats days before analysis even begins, while the reportability clock runs. What does the record pull take on a typical complaint today?","Hey [Name], Chris at Tulip. Honest question: how many of your investigations close as operator error? Usually that's not the root cause, it's where the data ran out. Serial-level production records change what root cause even means."],"pitch":"Your investigations spend their days locating records instead of analyzing them, and root cause defaults to operator error when the trail runs out. What changes: every unit carries a complete digital history searchable in seconds, so an investigation starts at analysis, trends connect field signals to specific lots and process changes, and the loop actually closes. The reportability clock stops being the enemy.","qs":["On your last complaint, how long from receipt to having the full production record in hand?","What share of investigations close as operator error, and do you believe it?","Can you connect a field trend to a process change today, or only suspect it?"],"thread":"'Who owns the production records you dig through?' → Quality Director and Ops. 'Who feels field issues commercially?' → Product leadership.","vm":"Hey [Name], Chris from Tulip. Post-market leaders tell me investigations spend days locating paper records while the reportability clock runs. Serial-level digital histories made the pull a seconds-long search for one team. Worth 20 minutes. I'll email you. Chris, Tulip, [number].","warn":"They operate under regulatory clocks: MDR timelines, vigilance. Respect the pressure, never minimize a field issue, and don't promise fewer complaints, promise faster truth.","hub":"meddevice"},{"title":"Configuration Manager","c":"#475569","cares":["As-built matching as-designed on every serial, provably","Change incorporation tracked to the unit level across the program","CDRL and data deliverables produced without a document hunt","One configuration truth across engineering, the floor, and the customer"],"pains":["Effectivity managed in spreadsheets against a floor running on paper","As-built records reconstructed at delivery instead of captured during build","Engineering changes whose actual incorporation status nobody can state","Configuration audits (FCA/PCA) as multi-week reconstruction events"],"openers":["Hey [Name], Chris from Tulip. Reason for my call: configuration managers tell me the job is proving a negative: that no unit shipped with the wrong change state. And with effectivity in spreadsheets and builds on paper, that proof is reconstruction. How do you answer the incorporation question today, per serial?","Hey [Name], Chris at Tulip. Quick one before your next FCA or PCA: how long would it take to produce the complete as-built configuration for one serial right now? If the answer is days, the audit is going to be weeks."],"pitch":"You manage effectivity in spreadsheets while the floor builds from paper, so as-built truth is reconstructed at delivery instead of captured during build. What changes: every build step executes against the exact revision and records it at the unit level, change incorporation status is a query instead of an investigation, and FCA or PCA becomes a report you print. Pratt Miller runs DoD work with that discipline.","qs":["For any serial on the floor right now, how fast can you state its exact change incorporation status?","Where does effectivity live today, and how does the floor actually consume it?","What did your last configuration audit cost in calendar time?"],"thread":"'Who signs the delivery?' → Delivery assurance and program management. 'Who generates the changes you track?' → Engineering leadership.","vm":"Hey [Name], Chris from Tulip. Configuration managers tell me the job is proving no unit shipped in the wrong change state, and that proof is reconstruction. Unit-level capture during build made it a query for one team. Worth 20 minutes. I'll email you. Chris, Tulip, [number].","warn":"EIA-649 world. Speak effectivity, incorporation, FCA, PCA, CDRL. They are precision people; one vague answer about how the data model works and you're done.","hub":"aerodefense"},{"title":"Mission Assurance Mgr","c":"#7c3aed","cares":["Zero-defect delivery on hardware where failure is mission loss","Evidence packages that satisfy MAR requirements without heroics","Process escapes caught at the step, because there is no field repair in orbit","Supplier and internal build data unified into one assurance picture"],"pains":["Assurance evidence assembled by hand across thousands of build steps","Process escapes discovered at integration and test, painfully late","Every anomaly investigation a paper archaeology project","Customer mission assurance reviews consuming the team for weeks"],"openers":["Hey [Name], Chris from Tulip. Reason for my call: mission assurance leaders tell me the standard is zero escapes on hardware nobody can repair after launch, but the evidence proving each step lives across paper and spreadsheets. How does your team assemble the assurance case today?","Hey [Name], Chris at Tulip. Quick question: when an anomaly shows up at integration, how far back through the build can you trace in an afternoon? For most teams the honest answer is days of paper, and integration is the most expensive place to learn something."],"pitch":"Your standard is zero escapes with no repair option, but the evidence lives scattered across paper and the escapes surface at integration where they cost the most. What changes: every build step is enforced and captured at the point of work, the assurance package builds itself as the hardware does, and an anomaly traces back through the full history in minutes. The mission assurance review becomes a walkthrough instead of a scramble.","qs":["When the customer review comes, how long does assembling the evidence package take?","Where did your last significant escape get caught, and where should it have been?","How much of your MAR compliance is captured at the step versus reconstructed later?"],"thread":"'Who owns program cost and schedule?' → VP Programs. 'Who owns supplier data feeding your builds?' → Supply chain quality.","vm":"Hey [Name], Chris from Tulip. Mission assurance leaders tell me the standard is zero escapes on hardware nobody can repair after launch, and the evidence is scattered paper. Records built at the step made the assurance case automatic for one team. Worth 20 minutes. I'll email you. Chris, Tulip, [number].","warn":"Space-grade seriousness. No hype, no rounding. Say escapes, not defects. They will test whether you understand that integration-and-test is where cost concentrates.","hub":"aerodefense"},{"title":"MRO Operations Mgr","c":"#d97706","cares":["Turnaround time, because a unit on the bench is an aircraft on the ground","Repair traceability that survives an AS9100 or FAA audit","Found-condition documentation and quote cycles that don't stall induction","Technician knowledge captured before the veterans retire"],"pains":["Every repair a unique job documented on paper travelers","TAT lost to waiting: on quotes, parts, approvals, and information","Repair history for a returning unit buried in filing","Thirty-year technicians retiring with the real repair knowledge in their heads"],"openers":["Hey [Name], Chris from Tulip. Reason for my call: MRO leaders tell me TAT dies in the gaps, waiting on found-condition writeups, quote approvals, and information, not in the wrench time itself. Where does a unit sit idle longest between induction and ship at your shop?","Hey [Name], Chris at Tulip. Quick question about your senior technicians. When the ones with thirty years walk, how much of the actual repair knowledge walks with them? Most shops answer everything, and the paper travelers prove it."],"pitch":"Your turnaround time dies in the waiting, not the wrenching: found-condition writeups, quotes, approvals, and hunting repair history. What changes: guided digital repair procedures capture the veteran knowledge before it retires, found-condition documentation happens at the bench with photos in the record, unit history is a serial-number search, and the audit trail exists by default. TAT drops because the gaps close.","qs":["Break down your TAT honestly: how much is wrench time versus waiting time?","When a unit returns that you repaired two years ago, how do you pull its history?","Which retirements in the next three years scare you, and what do they take with them?"],"thread":"'Who owns customer commitments on TAT?' → Site GM or delivery leadership. 'Who feels the audit exposure?' → Quality Manager.","vm":"Hey [Name], Chris from Tulip. MRO leaders tell me turnaround dies in the waiting, not the wrenching, and the repair knowledge is retiring on schedule. Guided digital repair with history by serial closed both gaps for one shop. Worth 20 minutes. I'll email you. Chris, Tulip, [number].","warn":"MRO is job-shop chaos, not production-line order. Never pitch standardization of the repair itself; pitch capturing the found condition and the knowledge. Repair authority and 8130 language earns credibility.","hub":"aerodefense"},{"title":"CMMC & Gov Compliance Lead","c":"#0e9f6e","cares":["CMMC certification achieved and kept without freezing the operation","CUI boundaries that the floor systems actually respect","DFARS flowdowns satisfied with evidence, not assertions","Compliance as a contract-winning posture instead of pure cost"],"pains":["Every floor tool triggering a CUI scope review that takes months","Paper surviving because it's the only thing that never fails an assessment","Evidence for assessors assembled from a dozen disconnected systems","Being seen as the office of no while contracts depend on the cert"],"openers":["Hey [Name], Chris from Tulip. Reason for my call: compliance leads at defense suppliers tell me paper survives on their floors for one reason: it never fails a CMMC scope review. But it fails everything else. How is the CUI boundary shaping what your operation can actually deploy?","Hey [Name], Chris at Tulip. Quick question ahead of your assessment: how many separate systems does your evidence live in today? Every additional one is scope, cost, and a place for the assessor to dig. Consolidating floor execution into one compliant environment shrinks that surface."],"pitch":"Paper survives on your floor because it never fails a scope review, and meanwhile every real system triggers months of CUI analysis. What changes: floor execution consolidates into a single environment built for the compliance conversation, so the assessment surface shrinks instead of sprawling, and the operational evidence assessors want exists by default. Compliance stops being the reason the floor can't modernize.","qs":["What has the CUI boundary already kept off your floor?","How many systems hold assessment-relevant evidence today?","Is your compliance posture showing up in bids as a strength yet, or only as cost?"],"thread":"'Who owns the contracts the cert protects?' → Growth and program leadership. 'Who runs the systems in scope?' → IT Director.","vm":"Hey [Name], Chris from Tulip. Defense compliance leads tell me paper survives because it never fails a scope review, while every real tool triggers months of CUI analysis. Consolidating execution into one compliant environment flipped that for one supplier. Worth 20 minutes. I'll email you. Chris, Tulip, [number].","warn":"Do not freelance on CMMC specifics or claim certification levels on Tulip's behalf. Speak to shrinking assessment surface and consolidation, and route deep security questions to a solutions engineer fast.","hub":"aerodefense"},{"title":"Training & Workforce Dev Mgr","c":"#2563eb","cares":["Ramping new operators in days instead of months","Training records that are current, provable, and tied to the actual work","Tribal knowledge captured before the veterans leave","Cross-training depth so one absence doesn't idle a line"],"pains":["Onboarding built on shadowing whoever happens to be available","Training matrices in spreadsheets drifting from reality","Certifications expiring silently until an audit finds one","The best knowledge living in three heads that are five years from retirement"],"openers":["Hey [Name], Chris from Tulip. Reason for my call: training leaders tell me onboarding is really shadowing, and shadowing means every new hire learns a slightly different process from whoever was free that week. How long until a new operator at [company] runs solo, honestly?","Hey [Name], Chris at Tulip. Quick question about your training matrix. When a cert expires or someone runs a station they're not signed off on, does the system stop it, or does an audit find it? For most plants it's the audit, eventually."],"pitch":"Your onboarding is shadowing, your matrix is a spreadsheet drifting from reality, and your deepest knowledge retires on a schedule you can see coming. What changes: the work itself becomes guided instructions that carry the veteran's method, so a new hire executes correctly on day one, sign-offs are enforced at the station so an uncertified operator cannot run it, and the training record builds itself from actual work performed. Ramp drops from months to days.","qs":["How long from hire to running solo today, and what makes it that long?","Where does the training record live, and when did it last match the floor?","Which departures in the next two years take the most knowledge with them?"],"thread":"'Who feels ramp time as output?' → Ops Manager and Plant Manager. 'Who owns audit exposure on training records?' → Quality.","vm":"Hey [Name], Chris from Tulip. Training leaders tell me onboarding is shadowing, so every hire learns a different process and the matrix drifts. Guided work that enforces sign-offs and builds its own training record cut ramp from months to days for one plant. Worth 20 minutes. I'll email you. Chris, Tulip, [number].","warn":"Warm audience, low budget authority. Multithread fast to Ops and Quality who feel the pain as output and audit risk. Their yes is real but rarely sufficient.","hub":"all"},{"title":"Aseptic / Sterility Lead","c":"#7c3aed","hubs":["pharma"],"openers":["Hey [Name], Chris from Tulip. Reason for my call: aseptic leaders tell me the same thing about media fills and line interventions. Every intervention has to be recorded, justified, and defensible, and today that happens on paper an operator fills out after the fact inside the gowning discipline. How do you prove every intervention was logged the moment it happened?","Hey [Name], Chris at Tulip. An aseptic manufacturing lead I spoke with was carrying the same weight you probably are: one unrecorded intervention or a gap in the media fill record and the whole sterility assurance argument wobbles at audit. If you could see every intervention logged live at the line instead of reconstructed later, what would that change for your next campaign?","Hey [Name], Chris from Tulip. Quick one. On your fill line, when an operator makes an intervention, where does that record actually live in the minutes after it happens, and would it survive an inspector asking to see it?"],"cares":["Sterility assurance and a defensible media fill program","Every aseptic intervention captured and justified in the moment","Operator aseptic qualification current and provable","Fewer line stoppages without cutting corners on the record"],"pains":["Interventions recorded on paper after the fact, not as they happen","Media fill and intervention records reconstructed under audit pressure","No live proof that gowning and behavior rules were followed","Operator requalification status hard to prove on demand"],"pitch":"The sterility argument you defend at every inspection rests on records that operators write down after the intervention, from memory, inside the hardest environment in the building to document anything. What changes: interventions get logged at the line the instant they happen, the aseptic steps are guided so behavior and sequence are enforced, and operator qualification status is live instead of a binder. The media fill record and the commercial record are built the same defensible way. It runs on a validated foundation, so this is configuration inside your controlled framework, not a system that reopens your sterility validation.","qs":["When an operator makes an aseptic intervention, how does it get recorded, and how long after the actual event?","How do you prove today that every operator on the line is current on media fill qualification?","When an inspector pulls a media fill record, how much of it is reconstruction versus captured-in-the-moment data?"],"warn":"Deep sterility audience. Speak media fill, interventions, Annex 1, gowning qualification, sterility assurance. Never oversimplify. Their skepticism is that any new system touches validated aseptic process, so lead with in-the-moment capture and configuration inside the controlled framework.","thread":"'Who owns the sterility validation strategy?' → QA or Validation. 'Who owns the fill line day to day?' → Aseptic Ops lead.","vm":"Hey [Name], Chris from Tulip. Aseptic leaders tell me interventions get recorded after the fact, then defended at audit as if they were captured live. One site made every intervention log at the line the moment it happened. Worth 20 minutes. I'll email you. Chris, Tulip, [number]."},{"title":"Microbiology / EM Manager","c":"#7c3aed","hubs":["pharma"],"openers":["Hey [Name], Chris from Tulip. Reason for my call: micro and EM managers tell me the same thing. Environmental monitoring generates a flood of plate reads, excursions, and trends, and most of it lives in spreadsheets that make an excursion investigation an archaeology project. When an EM excursion hits, how fast can you actually see whether it is a trend or a one-off?","Hey [Name], Chris at Tulip. An EM manager in a similar spot told me the worst part of the job was that the data proving contamination control was under control was itself impossible to trust, because it was hand-transcribed from plate reads into spreadsheets. If your EM trending were clean and live instead of reconstructed monthly, what decision would you make faster?","Hey [Name], Chris from Tulip. Quick question. When a plate read comes back out of spec, what has to happen before you can tell whether it connects to other excursions across the suite, and how many spreadsheets is that?"],"cares":["Contamination control strategy backed by trustworthy data","EM excursions investigated fast, with real trend context","Plate reads and results captured without transcription risk","A defensible EM data set at inspection without a scramble"],"pains":["EM data hand-transcribed from plate reads into spreadsheets","Excursion investigations slowed by scattered, untrusted data","Trends invisible until a monthly report assembled by hand","Data integrity exposure baked into the whole EM pipeline"],"pitch":"Your contamination control strategy is only as credible as the data behind it, and today that data is transcribed by hand from plate reads into spreadsheets, which is exactly where integrity questions start. What changes: EM results are captured at the point of read, excursions surface against live trends instead of a monthly reconstruction, and the whole data set is ALCOA-clean by construction. When an inspector or your own investigation asks whether an excursion is isolated or part of a pattern, the answer is a query, not a week of assembly. It sits on a validated foundation, so it strengthens your data integrity story rather than adding another system to defend.","qs":["How does an EM plate read get from the microbiologist into your trending system today?","When you get an excursion, what has to happen before you can see it in the context of other results?","If an inspector questioned the integrity of your EM data, how much of the defense is manual reconstruction?"],"warn":"Technical micro audience. Speak EM, excursions, contamination control strategy, data integrity, ALCOA. Their pain is trust in the data pipeline, so lead with point-of-read capture and integrity, not dashboards.","thread":"'Who owns the contamination control strategy?' → QA/Micro head. 'Who owns the digital systems that would hold this?' → CSV lead.","vm":"Hey [Name], Chris from Tulip. Micro and EM managers tell me their contamination data is hand-transcribed into spreadsheets, which is where the integrity questions start. One team captured EM at the point of read and made excursion trends live. Worth 20 minutes. I'll email you. Chris, Tulip, [number]."},{"title":"Warehouse & Cold Chain Lead","c":"#7c3aed","hubs":["pharma"],"openers":["Hey [Name], Chris from Tulip. Reason for my call: warehouse and cold chain leads in GMP tell me the same thing. Dispensing, sampling, and material movement all have to be recorded and controlled, temperature excursions have to be caught and dispositioned, and most of it runs on paper logs and a lot of trust. How ow long does assembling it take?"],"warn":"Practical GMP logistics audience. Speak dispensing, sampling, cold chain, excursions, genealogy. Their pain is paper logs and late excursion detection, so lead with point-of-work capture and live excursion visibility.","thread":"'Who owns disposition when a cold chain excursion happens?' → QA. 'Who owns the warehouse systems?' → Supply Chain or IT.","vm":"Hey [Name], Chris from Tulip. GMP warehouse leads tell me dispensing runs on paper and cold chain excursions surface days late. One team captured both live and made lot genealogy a query. Worth 20 minutes. I'll email you. Chris, Tulip, [number]."},{"title":"Process Dev / Sustaining Eng","c":"#e11d48","hubs":["meddevice"],"openers":["Hey [Name], Chris from Tulip. Reason for my call: sustaining and process development engineers at device makers tell me the same thing. You own the process after transfer, but the floor works around issues quietly and you learn about it from a yield dip or a complaint months later. How does what actually happens at the bench get back to you today?","Hey [Name], Chris at Tulip. A sustaining engineer I spoke with had the same frustration you might: every process improvement is real work, but it dies in the validation and design-control queue, so the line runs exactly as validated years ago. If a change were configuration inside a controlled framework instead of a revalidation event, what would you fix first?","Hey [Name], Chris from Tulip. Quick question. When an operator works around a fixture or fit issue on your line, how long before that shows up on your desk, and how do you see it, a metric or a conversation?"],"cares":["Process robustness and yield after design transfer","Real floor feedback reaching engineering fast","Improvements that move without a revalidation slog","CAPA and process changes that actually stick on the line"],"pains":["Floor workarounds invisible until yield drops or a complaint","Improvements stalled in the validation and change queue","Process data thin, so root cause is guesswork","Changes that revert on the floor before they take hold"],"pitch":"You own the process after transfer, but the two things you need most, honest floor feedback and the ability to change quickly, are the two things you do not have. What changes: every build step is captured against the exact revision so workarounds and deviations surface the same day, process data streams in so root cause is evidence instead of guesswork, and a change is configuration inside a controlled framework rather than a revalidation event that takes a quarter. Improvements deploy to the line and are enforced, so they stick instead of reverting. It runs on a validated foundation, so speed does not cost you compliance.","qs":["When an operator works around a process issue, how and when does that reach you?","What is the real path from your improvement idea to it running on the line, and how long is it?","When yield drops, how much of root cause is data versus reconstruction?"],"warn":"Technical device engineering audience. Speak design transfer, sustaining, process validation, CAPA, yield. Their pain is the validation queue and thin data, so lead with configuration-based change and step-level capture, not features.","thread":"'Who owns validation strategy for a change like this?' → Validation or Quality Systems. 'Who owns the line?' → Manufacturing Eng or Ops.","vm":"Hey [Name], Chris from Tulip. Sustaining engineers tell me floor workarounds stay invisible until yield drops, and every fix dies in the validation queue. One team made changes configuration inside a controlled framework and got velocity back. Worth 20 minutes. I'll email you. Chris, Tulip, [number]."},{"title":"Sterilization & Packaging Lead","c":"#e11d48","hubs":["meddevice"],"openers":["Hey [Name], Chris from Tulip. Reason for my call: sterilization and packaging leads at device makers tell me the same thing. A late packaging or sterile-barrier change can push a lau lt for a lot today?","When a packaging or barrier change is needed, what does that do to your launch timeline?","How do you track a lot through an outside sterilizer and back into your record?"],"warn":"Technical packaging/sterilization audience. Speak sterile barrier, seal integrity, sterilization load, DHR, contract sterilizer. Their pain is paper records under deadline and launch-slipping changes, so lead with point-of-work capture and self-building records.","thread":"'Who owns the sterilization validation?' → Quality or Validation. 'Who owns the contract sterilizer relationship?' → Supplier Quality or Ops.","vm":"Hey [Name], Chris from Tulip. Sterilization and packaging leads tell me the seal-integrity record gets assembled on paper under deadline, then defended lot by lot. One team made that record build itself as the lot moved. Worth 20 minutes. I'll email you. Chris, Tulip, [number]."},{"title":"Incoming / Receiving Inspection Lead","c":"#e11d48","hubs":["meddevice"],"openers":["Hey [Name], Chris from Tulip. Reason for my call: incoming inspection leads at device makers tell me the same thing. You are the last line before a supplier defect reaches the build, but incoming runs on paper inspection records, and when a defect gets through, the SCAR crawls because the evidence has to be reassembled. Where did your last supplier escape actually get caught, incoming or the line?","Hey [Name], Chris at Tulip. A receiving inspection lead I spoke with was carrying the same problem you might: paper incoming records mean marginal lots slip through on a busy day, and every supplier corrective action starts with a hunt for the inspection history. If incoming inspection were guided and captured live, what would stop reaching your line?","Hey [Name], Chris from Tulip. Quick question. When a component lot comes in, how does the inspection get recorded, and if that supplier has a recurring problem, how fast can you prove the pattern?"],"cares":["Supplier defects caught at incoming, not on the line","Inspection records captured live and searchable","Fast, evidence-backed SCARs and supplier scorecards","Clean lot-level traceability from receipt into build"],"pains":["Incoming inspection on paper, defects slipping through","SCARs slowed by reassembling inspection history","Supplier trends invisible without manual analysis","Receipt-to-build traceability reconstructed by hand"],"pitch":"You are the last line before a supplier defect becomes a device problem, and today that line runs on paper inspection records that let marginal lots through on a busy day and make every supplier corrective action a hunt for history. What changes: incoming inspection is guided so the right checks happen every time, results are captured live and tied to the lot, and supplier trends surface automatically instead of through manual analysis. When you open a SCAR, the evidence is already there, and traceability from receipt into the build is a query. It runs on a validated foundation, so incoming becomes a control point instead of a paperwork bottleneck.","qs":["How does an incoming inspection get recorded when a component lot arrives?","When you raise a SCAR, how long does assembling the inspection history take?","How do you spot a supplier with a recurring problem today, data or gut?"],"warn":"Practical quality audience. Speak incoming inspection, SCAR, supplier quality, lot traceability, nonconformance. Their pain is paper records and slow evidence assembly, so lead with guided capture and instant traceability.","thread":"'Who owns supplier corrective action?' → Supplier Quality. 'Who owns the inspection systems?' → Quality Systems or IT.","vm":"Hey [Name], Chris from Tulip. Incoming inspection leads tell me defects slip through on paper and every SCAR starts with reassembling history. One team made incoming guided and captured live, so the evidence was already there. Worth 20 minutes. I'll email you. Chris, Tulip, [number]."},{"title":"MRB / Nonconformance Lea ery time","Cure and bond records captured live, not after the fact","Scrap and rework down on expensive composite parts","Full process traceability on structural components"],"pains":["Layup and cure records filled in after the fact on paper","A missed step making an expensive part suspect","Cure data trapped in equipment, not tied to the part record","Scrap driven by process variation nobody can see"],"pitch":"Composite work is unforgiving, the process spec is the part, and today the proof that layup and cure followed spec lives in paper travelers filled out after the part is already made. What changes: every layup and bond step is guided and enforced in sequence, cure data streams from the autoclave straight into the part record, and the whole process history is captured live instead of reconstructed. When a structural part is questioned, the answer is a complete record, not a defense. Process variation that drives scrap becomes visible while there is still time to act. It runs on a foundation that fits your compliance environment, so traceability improves without adding uncontrolled risk.","qs":["On a layup and cure job, how does the process record get built, and how much is filled in later?","When a composite part is questioned, how do you prove the cure cycle and steps followed spec?","How much of your composite scrap traces to process variation you cannot currently see?"],"warn":"Technical composites audience. Speak layup, cure cycle, bond, autoclave, process spec, structural traceability. Their pain is after-the-fact paper records on unforgiving processes, so lead with guided steps and live cure-data capture.","thread":"'Who owns the process spec?' → Manufacturing or Process Eng. 'Who owns quality sign-off?' → Quality Manager.","vm":"Hey [Name], Chris from Tulip. Composites leads tell me layup and cure records get filled in after the part is made, then defended as if captured live. One shop made every step guided and pulled cure data straight from the autocla ","Procedure-centric, not composable. can't build custom apps or IoT-connected workflows without engineering help","No real IoT/smart tool connectivity. operators enter data manually, no sensor-driven guidance","Limited scalability beyond AIT use cases. OEE, real-time line monitoring, and cross-site visibility are weak","No low-code app building. your team can't create or modify workflows without Epsilon3 involvement","Built for engineers, not frontline operators at scale. UX optimized for complex builds, not high-volume production lines"],"win":"Epsilon3 is great if every build looks like a space vehicle. complex, low-volume, engineer-led. But if you need to scale guided workflows across an entire production floor, connect IoT devices and smart tools, and give operators real-time guidance at every station. that's Tulip. We're composable: your team builds and changes apps themselves, no vendor required. Pratt Miller, A&D, 90-day deploy vs 18-month legacy MES. For every $1 invested in Tulip, we strive for $10 in return.","mines":["Is your production model low-volume complex builds, or do you also run higher-volume production lines?","When an operator needs updated work instructions today. how long does that change actually take to reach the floor?","Are your IoT devices, sensors, and smart tools feeding into your current execution system, or is data entry still manual?"]},{"n":"iBase-t (Solumina)","t":"MES · Aerospace & Defense / MRO","c":"#2563eb","ack":"30+ year A&D pedigree. purpose-built for Lockheed, Northrop, GE Aerospace, Rolls-Royce, Pratt & Whitney · Deep DCMA/ITAR compliance out of the box · Strong MRO and sustainment capabilities · Native PLM/ERP integration · Gartner Representative Vendor 2025","atk":["Extremely narrow vertical. purpose-built for A&D/DoD, awkward or expensive outside that lane","Heavy enterprise architecture. long implementations, high TCO, SI-dependent deployments","Low-code claims, but changes still require trained Solumina developers o n 4 weeks.","mines":["When an instruction needs to become an app, kitting, quality checks, machine data, what happens?","What is the Part 11 and GxP record story?","Instructions for one line, or a platform for the whole floor?"]},{"n":"Poka (IFS)","t":"Connected Worker · Knowledge / Skills","c":"#7c3aed","ack":"Skills matrix · Factory feed · Knowledge capture","atk":["Knowledge layer, not an execution layer","Enforcement is thin, watching a video is not doing the step right","Records and machine data are shallow","IFS gravity pulls the roadmap toward their ERP suite"],"win":"Knowing and doing are different systems for them and one system for us. Guided execution with enforced steps cut defects 70% at one device maker, and the training content lives beside the work.","mines":["Skills are tracked, but is execution actually enforced at the station?","Where does the IFS acquisition steer the roadmap?","When the auditor asks for proof the step was followed, what record exists?"]},{"n":"Parsable","t":"Connected Worker · Mobile Procedures","c":"#ea580c","ack":"Mobile-first procedures · CPG and heavy industry footprint","atk":["Procedures without a platform underneath","Machine connectivity and analytics are thin","Authoring flexibility hits a wall fast","Ask hard questions about roadmap and investment pace"],"win":"Procedures are one app type. On Tulip the same engineers ship procedures, quality checks, machine monitoring, and dashboards, TICO went paper to digital in 90 days and doubled production over four years.","mines":["What runs on it beyond checklists and rounds?","How does equipment data get into the procedure?","What has shipped on their roadmap in the last year?"]},{"n":"Augmentir","t":"Connected Worker · AI Guidance","c":"#059669","ack":"AI narrative · Skills and proficiency scoring","atk":["AI on top of a thin execution layer","Guidance is not enforcement, and not a record","Little proof at enterprise manufacturing scale","Validated environments are an open question"],"win":"AI needs real execution data underneath it. Tulip captures the work itself, every step, every device, and AstraZeneca runs it validated across 24 GxP sites. That is the substrate AI actually needs.","mines":["The AI optimizes, but what system executes and records the work?","Largest manufacturing deployment they can name?","How does it live in a validated environment?"]},{"n":"L2L / SwipeGuide","t":"Plant Floor · CMMS + Instructions","c":"#d97706","ack":"Dispatch and maintenance roots · SwipeGuide authoring bolted on","atk":["Two acquired products stitched, not one platform","Quality and regulated records are shallow","App flexibility ends where their modules end","Maintenance DNA, production execution is the add-on"],"win":"One platform beats a stitch-up. Production, quality, maintenance logbooks, and instructions run as apps on the same foundation, with the record built in, which is why Bloom Energy replaced a legacy stack with 230+ stations in 8 months.","mines":["Is instructions-plus-CMMS one product yet, honestly?","What does the quality record look like at audit?","Can your engineers build an app the modules do not cover?"]},{"n":"Redzone (QAD)","t":"Connected Workforce · CPG / OEE","c":"#dc2626","ack":"Strong CPG community · Huddle and coaching model · OEE lift stories","atk":["Packaged program, light on flexibility","Heavy services and coaching dependency","Regulated records and deep quality are thin","QAD gravity pulls toward their ERP world"],"win":"OEE huddles are a practice, not a platform. SBD runs tiered OEE dashboards plus a thousand other apps on Tulip, built by their own people, no coaching subscription required to change a screen.","mines":["After the coaching engagement ends, who changes the system?","Beyond OEE and huddles, what executes and records the work?","What is the GxP and Part 11 answer?"]},{"n":"Dozuki","t":"Work Instructions · Training","c":"#64748b","ack":"Clean documentation · Training courses · iFixit lineage","atk":["Documentation system, not an execution system","No real machine data or device story","Records stop at read-and-sign","Built for a cell, strains at a plant"],"win":"Reading the doc and running the line are different problems. Guided execution with data capture at every step is why one device maker cut defects 70%, the instruction and the record are the same thing.","mines":["Does it capture what happened, or just show what should?","How does a torque value or a test result get into the record?","What does site number two look like?"]},{"n":"Apprentice.io (Tempo)","t":"Pharma MES · Batch Execution","c":"#db2777","ack":"Pharma-native · eBR focus · Tech transfer story","atk":["Single-vertical ceiling, batch execution is the whole product","Everything beyond the batch record needs another system","Vendor backlog owns your changes","Cross-site scale proof is thin next to ours"],"win":"Batch records are one app on Tulip, not the whole company. AstraZeneca scaled validated modular blocks across 24 GxP sites, and the same platform runs their logbooks, training, and quality apps beside the eBR.","mines":["Outside batch execution, what builds the rest of the floor?","Who makes changes, your engineers or their backlog?","Largest multi-site validated deployment they can point to?"]},{"n":"MasterControl Mx","t":"QMS Vendor · eBR Extension","c":"#0284c7","ack":"QMS install base · Document control depth · Quality brand","atk":["Born a document system, execution is the young extension","Machine and device data into the record is thin","Forms DNA shows in the operator experience","Line-side adoption is where QMS tools go to struggle"],"win":"We come from the floor up, they come from the document down. MES plus eDHR live in 6 months with 70% fewer defects at one device maker, because operators actually use what feels built for the line.","mines":["How deep is live execution versus digital forms?","How does equipment data land in the record automatically?","Ask an operator, not a qu
