ality manager, how it feels to run."]},{"n":"Aegis FactoryLogix","t":"MES · Electronics / A&D","c":"#2563eb","ack":"Electronics traceability depth · IPC-CFX standard leadership","atk":["Rigid, services-heavy configuration","Operator-facing flexibility is limited","Strongest in SMT, strains beyond electronics assembly","Changes move at services-engagement speed"],"win":"Serial-level traceability without the services treadmill. Pratt Miller ran DoD-grade digital traceability and won new contracts, with changes their own team deploys in days, on any hardware.","mines":["What does a process change cost in services hours?","Beyond SMT, how does final assembly and quality get covered?","Can a manufacturing engineer change a screen without a ticket?"]}],"CHECKLIST_PHASES":[{"id":"book","label":"Book","icon":"📅","color":"#2563eb","subtitle":"Lock in the meeting and confirm attendance","items":[{"id":"cal","text":"Send calendar invite with Zoom/Teams link","tip":"Include a 1-line agenda so they know what to expect. Subject: '[Company] × Tulip. 20 min intro'"},{"id":"calconf","text":"Confirm invite was accepted","tip":"If not accepted within 24hrs, send a quick reply: 'Just checking the invite landed. let me know if timing works.'"},{"id":"email1","text":"Send confirmation email with context","tip":"Keep it short: who you are, what you'll cover, what to expect. Attach one relevant case study (TICO, Pratt Miller, Forrester TEI)."},{"id":"cstudypick","text":"Pick the right case study for this account","tip":"A&D → Pratt Miller. Industrial OEM → TICO. Regulated/pharma → AstraZeneca. Budgetary → Forrester TEI. Quality → Med Device."},{"id":"linkedin","text":"Connect with attendees on LinkedIn","tip":"Do this before the meeting. they'll see your profile before you call. Mention Tulip in your headline."}]},{"id":"prep","label":"Prep","icon":"🧠","color":"#7c3aed","subtitle":"Walk in knowing more than they expect","items":[{"id":"research","text":"Run the company through the Research tab","tip":"Use the Research tab to pull recent news, likely systems, pain points, and the best opener angle before you dial."},{"id":"persona","text":"Identify the persona(s) attending and review their card","tip":"Look up each attendee in the Playbook tab. Know their pain points, what to avoid, and the multi-threading angle."},{"id":"discov","text":"Pick 3–5 discovery questions for this meeting","tip":"Use the Discovery tab. Choose from Current Tech Stack + Production Challenges at minimum. Don't wing it."},{"id":"competitors","text":"Check if they have a known competitor or incumbent MES","tip":"Review their likely_systems from Research. Pull the relevant Battle Card in Playbook so you're ready if it comes up."},{"id":"pain","text":"Identify the #1 pain angle to lead with","tip":"Based on their industry and persona: Technical Buyer → escapes & audit. Plant Mgr → firefighting. VP Ops → throughput & ROI."},{"id":"agenda","text":"Set a clear agenda for yourself: intro → pain → pitch → next step","tip":"Intro (2 min) → let them talk about their world (8–10 min) → pitch relevant use case (3–4 min) → propose next step (2 min)."}]},{"id":"salesforce","label":"Salesforce","icon":"☁️","color":"#0891b2","subtitle":"Get the CRM right before and after","items":[{"id":"sfcontact","text":"Find or create the Contact in Salesforce","tip":"Search by name and company first. If new, add Title, Company, Phone, Email, and LinkedIn URL."},{"id":"sfaccount","text":"Find or create the Account record","tip":"Check for duplicates. search by company name and domain. Merge if needed. Update Industry and Employee Count."},{"id":"sfoppty","text":"Create the Opportunity in Salesforce","tip":"Stage: Prospecting. Name format: '[Company]. [Use Case]. [Year]'. Set Close Date and Amount estimate even if rough."},{"id":"sfactivity","text":"Log the meeting as an Activity on the Opportunity","tip":"Add meeting date, attendees, and a one-line subject. This timestamps your pipeline activity for your AE."},{"id":"sfnext","text":"Add a Task for your next follow-up action","tip":"Always create the next task before you close Salesforce. Due date = same day as your follow-up email send."}]},{"id":"ae","label":"AE Assignment","icon":"👤","color":"#0284c7","subtitle":"Loop in the right Account Executive","items":[{"id":"aecal","text":"Check AE calendar availability for demo/next step","tip":"Check before the meeting ends if possible. being able to say 'I have [AE name] available Thursday at 2pm' closes the next meeting on the spot."},{"id":"aematch","text":"Match AE to territory, industry, or account size","tip":"Consider vertical expertise: regulated/A&D, med device, general discrete. Enterprise deal size matters too."},{"id":"aeavail","text":"Confirm AE is available and briefed before assigning","tip":"Don't assign cold. Send AE a quick Slack/email: company name, persona, pain found, and your suggested next step."},{"id":"aeintro","text":"Introduce AE to prospect in the follow-up email","tip":"CC your AE on the follow-up. One sentence: 'I'm looping in [AE Name], who works with [similar companies] and will be joining our next call.'"}]},{"id":"followup","label":"Follow-Up","icon":"📨","color":"#059669","subtitle":"Close the loop and move the deal forward","items":[{"id":"fuemail","text":"Send follow-up email within 2 hours of meeting ending","tip":"Speed signals interest. Subject: 'Notes from our call + next step'. Reference something specific they said. it shows you listened. If they asked about ROI, drop this line: 'For every $1 invested in Tulip, we strive for $10 in return. Forrester: 448% ROI and <6 month payback independently.'"},{"id":"funotes","text":"Include a summary of what they shared (pain, context, team)","tip":"Example: 'Based on what you shared. [X lines], [Y operators], currently on [Z system]. here's why I think Tulip is relevant..' Make it feel tailored, not templated."},{"id":"fucs","text":"Attach the right case study or Forrester TEI link","tip":"Match to their pain: throughput → TICO, quality/compliance → Med Device or Pratt Miller, budget → Forrester TEI PDF."},{"id":"funextstep","text":"Propose a specific next step with date and time","tip":"Don't say 'let me know when you're free.' Say: 'I have [AE] available Thursday at 2pm or Friday at 10am. which works better?'"},{"id":"sfupdate","text":"Update Opportunity Stage in Salesforce","tip":"Move from Prospecting → Discovery if pain was confirmed. Add meeting notes to the Opportunity. Update Close Date if discussed."},{"id":"fuaebriefing","text":"Brief your AE on what was discovered","tip":"Send a Slack message or email: attendees, their pain (in their words), incumbent system, urgency/forcing function, and recommended next step."}]}],"CASE_STUDIES":[{"co":"Forrester TEI","tag":"ROI / Budget","color":"#0284c7","stats":["448% ROI / 3yr","$16.23M NPV","<6mo payback","15% labor productivity ↑","70% fewer defects","$318K vendor consolidation savings"],"use":"CFOs, Controllers, budget convos. when they ask for ROI proof. Drop: 'For every $1 in, we strive for $10 out.'"},{"co":"TICO Tractors","tag":"Throughput / OEM","color":"#059669","stats":["2x production / 4yr","60% less rework","Paper → digital 90 days"],"use":"End Users, VP Ops, paper/Excel shops, industrial OEM, throughput conversations"},{"co":"Pratt Miller","tag":"A&D / Compliance","color":"#2563eb","stats":["Won new DoD contracts","Full digital traceability","Eliminated paper travelers","Adaptive to engineering shifts"],"use":"A&D, program managers, DCMA/ITAR, defense compliance conversations"},{"co":"DMG MORI","tag":"NPI / Quick Win","color":"#7c3aed","stats":["Insights in 4 weeks","Engineers built it themselves","NPI cycle compressed"],"use":"Mfg Engineers, champions who need a fast proof point, NPI/ECN discussions"},{"co":"Med Device Co.","tag":"Quality / FDA","color":"#e11d48","stats":["90+ apps","MES + eDHR in 6 months","70% defect reduction","$1M+ operational cost savings"],"use":"Technical Buyers, FDA 21 CFR Part 11, regulated environments, budget conversations"},{"co":"AstraZeneca","tag":"Enterprise / Pharma","color":"#0891b2","stats":["24 global sites","GxP-compliant deployment","Pharma ops at scale"],"use":"Enterprise credibility, pharma, GxP, Annex 11, skeptical buyers, Head of Strategy"},{"co":"Protolabs","tag":"IoT / Machine Connect","color":"#ea580c","stats":["53% scrap reduction","Increased capacity","Faster response times","Machine connectivity"],"use":"CTOs, IT Directors, IoT/machine connectivity convos, smart manufacturing discussions. Quote: 'We've had great success connecting our machines to Tulip.'. Alex Klick, Sr. Mfg Engineer"},{"co":"Sharp","tag":"Pharma / GxP / Speed","color":"#8b5cf6","stats":["30% faster clinical packaging","GxP-compliant guided workflows","Accelerated FDA audit readiness","Digital audit trails"],"use":"Pharma, contract manufacturing, clinical trials, FDA/GxP, QA conversations"},{"co":"Pharma Changeover","tag":"Pharma / Process","color":"#db2777","stats":["14 days → 3 days line clearance","78% changeover time reduction","80-page SOP → guided digital app","Reduced training time"],"use":"Pharma, process engineers, CI managers, Operations Managers where complex changeovers"},{"co":"Bloom Energy","tag":"MES Replacement","color":"#10b981","stats":["230+ stations","8-month deployment","Replaced legacy MES","Real-time throughput + cost data","Citizen development program launched"],"use":"MES replacement conversations, VP Ops, End Users, operations at scale, IoT"},{"co":"Stanley Black & Decker","tag":"Multi-Site / OEE","color":"#64748b","stats":["Multi-site EU deployment","Tiered OEE dashboards","Scrap and production tracking digitized","Continuous improvement enabled"],"use":"Multi-site manufacturers, Director of Manufacturing, CI Managers, European operations"}],"DISCOVERY":[{"id":"stack","label":"Current Tech Stack","color":"#2563eb","icon":"⚙️","subtitle":"Understand their existing systems before positioning Tulip","questions":[{"q":"Walk me through what operators actually use on the floor today. paper, screens, or a system?","why":"Starts conversationally and surfaces the single most important signal: paper/PDF = land fast, legacy MES = complement or displace. Gets them talking before you've asked anything threatening.","flags":{"green":["Paper binders","PDFs on shared drive","Printed travelers","No MES","Homegrown spreadsheets"],"red":["Just renewed MES contract in last 6 months","Deeply embedded Siemens Opcenter with dedicated in-house team"]}},{"q":"And behind that. what ERP are you running? SAP, Oracle, Epicor, IFS, Infor, Dynamics?","why":"Natural follow-on from floor systems. ERP identity drives the integration story. Tulip has deep connectors for all major ERPs. Sets up the 'we connect to what you already have' message.","flags":{"green":["SAP","Epicor","IFS","Infor","Oracle","Dynamics"],"red":["No ERP at all. may not be ready for Tulip","Fully homegrown ERP with no API access"]}},{"q":"Is there a QMS in the mix, and is it talking to the floor, or living in its own world?","why":"Disconnected QMS is the norm. Paper QMS = quality pain is live. The 'living in its own world' framing invites them to agree without feeling defensive.","flags":{"green":["Paper QMS","QMS disconnected from production floor","Quality data entered manually after the fact"],"red":["Fully integrated digital QMS with no expressed pain"]}},{"q":"Do you have any machine monitoring or SCADA running. Ignition, PI, FactoryTalk?","why":"Many manufacturers have machine data but no operator-facing layer. Tulip complements SCADA. it's the UX on top, not a replacement. Surfaces the 'data without context' pain naturally.","flags":{"green":["SCADA for machine data but no operator app layer","Ignition for dashboards only","PI historian with no floor workflow"],"red":[]}},{"q":"When engineering makes a change. a revision, an ECN. how does that actually get to the operator on the floor?","why":"ECN propagation lag is one of the most expensive and underappreciated pains in manufacturing. This question often triggers a candid, frustrated answer. Directly sets up Tulip's instant revision propagation story.","flags":{"green":["Manual. someone prints and walks it to the floor","Email to supervisors who update binders","Days or weeks to propagate"],"red":["Fully automated ECN-to-floor system already in place"]}},{"q":"And do you have a PLM. Teamcenter, Windchill, Enovia, or is engineering living in a different world from production?","why":"PLM disconnect from production = digital thread pain. Closes out the stack section with a question that naturally bridges to the NPI and ops profile sections.","flags":{"green":["PLM disconnected from production floor","Manual BOM transfer to production"],"red":[]}},{"q":"Across all of that. ERP, PLM, QMS, SCADA. if you brought in a new platform, do you feel confident you could connect it to the systems that matter, or are integrations a known headache?","why":"Surfaces integration readiness and IT gatekeeping risk early. If they say integrations are a nightmare, position Tulip's 60+ pre-built connectors and open API directly. If IT is a blocker, surfaces that now rather than late-stage.","flags":{"green":["Open to integrations","API-friendly IT environment","Already use cloud connectors","IT is a partner not a gatekeeper"],"red":["IT blocks all new integrations","Everything is on-prem with no API exposure","Previous integration projects took 12+ months"]}},{"q":"Last one on systems. how would you describe the quality of your floor data today? If I asked you to build an AI model on top of it, or make a major ops decision from it, would you trust it?","why":"57% of manufacturers cite data quality as their #1 barrier to scaling AI (MIT/IoT Analytics 2024). This question surfaces whether they have a data problem masquerading as a technology problem, and positions Tulip as the clean data foundation before AI is layered on. If they hesitate or laugh, that's Tulip's opening.","flags":{"green":["'Our data is pretty clean'","Already have a data warehouse or historian feeding analytics","Trust their ERP and floor data enough to make decisions from it"],"red":["'Honestly the data is a mess'","Manual data entry. no automated capture","Multiple conflicting systems with no single source of truth. data foundation problem, not just a workflow problem"]}}]},{"id":"ops","label":"Operations Profile","color":"#059669","icon":"🏭","subtitle":"Size the opportunity and understand their environment","questions":[{"q":"What kind of manufacturing are you running. discrete assembly, machine shop, A&D, medical, pharma, or a mix?","why":"Sets the context for everything else. Determines which use cases, compliance requirements, and case studies to lead with. Ask this first so every subsequent question lands in the right frame.","flags":{"green":["Discrete assembly","A&D / DoD regulated","Medical device","Industrial OEM","High-mix low-volume"],"red":["Pure continuous batch process with no assembly. harder fit"]}},{"q":"How many operators are touching the floor on a given day. roughly?","why":"Drives license count and deal size. 50+ = meaningful deal. 200+ = enterprise opportunity. Ask casually. 'roughly' takes the pressure off and gets a real number.","flags":{"green":["50–500+ operators","Multiple shifts running concurrently"],"red":["<10 operators. likely too small to prioritize"]}},{"q":"How many lines or work cells are you running, and are they all the same process or different?","why":"More lines = higher ACV and expansion potential. 'Same or different' surfaces complexity. high-mix = stronger Tulip fit. Each line/cell is a deployment unit.","flags":{"green":["5+ lines","Mix of assembly + machine shop + inspection","High-mix processes across cells"],"red":["Single bench operation with no expansion path"]}},{"q":"Are you running multiple shifts, and do you have one facility or several?","why":"Combines two profiling questions naturally. Multi-shift = shift handoff pain. Multi-site = Economic Buyer is your buyer, not just End User. Critical for deal size and positioning.","flags":{"green":["2+ shifts with variability across them","2+ facilities or global ops"],"red":[]}},{"q":"Roughly what's the revenue range. $50M, $500M, $5B?","why":"Sizes budget authority and urgency. $100M+ = meaningful budget. Growth companies adding headcount = ops strain = high urgency. Phrase it as a range so it doesn't feel like a finance interrogation.","flags":{"green":["$50M–$10B range","Growth company actively hiring or expanding capacity"],"red":["<$10M. may lack budget or operational complexity"]}},{"q":"And is ops currently a constraint on your growth, or is it keeping pace?","why":"Closes the profile section with a strategic open-door question. If they say 'constraint,' you've surfaced a VP Ops / CEO-level pain in two minutes. Their answer sets up the entire pain section that follows.","flags":{"green":["'Ops can't keep up with demand'","'We're hiring but not getting more output'","Throughput is the growth ceiling"],"red":["'Ops is running fine'. qualify further before continuing"]}}]},{"id":"pain","label":"Production Challenges","color":"#e11d48","icon":"🔥","subtitle":"Find the pain, quantify it, make it urgent","questions":[{"q":"Given what you just described. what's the one problem on the floor that's costing you the most right now?","why":"Flows naturally from the ops profile. 'Given what you just described' makes them feel heard and signals you're connecting the dots. Let them lead. their answer tells you the use case, the buyer, and the urgency.","flags":{"green":["Quality escapes or rework","Throughput / OEE shortfall","Inconsistent operator execution","Compliance gaps","Unplanned downtime"],"red":["'Things are pretty good', not a qualified opportunity yet, keep digging"]}},{"q":"How widespread is it. one line, a whole facility, or is it showing up everywhere?","why":"Quantifies scope without asking for a number directly. The broader the impact, the bigger the business case and the more executive urgency. Also surfaces whether it's a pilot or platform conversation.","flags":{"green":["Cross-shift or cross-site impact","50+ operators affected","Multiple lines or facilities touched"],"red":[]}},{"q":"Put a number on it if you can. what's it costing in scrap, rework, overtime, or missed shipments?","why":"Monetizes the pain. Without a number, there's no ROI story and no urgency for the CFO. Even a rough estimate works. If they can't answer, that's a discovery gap to address before moving forward.","flags":{"green":["Names a dollar amount or percentage","Downtime hours, rework rate, cost per escape"],"red":["'We don't track that'. blocker; probe further before moving on"]}},{"q":"How long has this been going on, and what have you already tried?","why":"Chronic pain with failed attempts = maximum urgency. If they've tried IT projects that stalled, Tulip's no-code speed is the sharpest differentiator. Also surfaces incumbent relationships and political landmines.","flags":{"green":["Problem exists 1+ years","Tried an IT project that stalled","Previous vendor or approach failed"],"red":["Brand new problem. may not have budget authority yet"]}},{"q":"If you fixed it. what does that actually unlock for the business?","why":"Gets them to articulate the outcome in their own words. Their answer becomes your proof-of-value framing in the follow-up email and AE brief. Don't fill in the answer. let them say it.","flags":{"green":["Specific outcome: 'X% more throughput', 'clean audit', 'no more overtime'"],"red":["Vague: 'just better visibility'. push for a metric"]}},{"q":"Is there a date on this. an audit, a contract deadline, a product launch that makes this urgent?","why":"Forcing functions are worth more than any ROI math. External deadlines create urgency that stalls disappear. If there's no date, that's the biggest risk to the deal cycle.","flags":{"green":["DCMA audit in Q2","FDA inspection pending","New product launch in 90 days","Contract renewal coming"],"red":["No timeline. deal will stall; plant the seed and stay warm"]}}]},{"id":"quality","label":"Quality & Compliance","color":"#7c3aed","icon":"✅","subtitle":"Identify regulatory exposure and audit readiness gaps","questions":[{"q":"What certifications are you holding or actively pursuing. AS9100, ISO 9001, FDA 21 CFR Part 11, ITAR, GxP?","why":"Certifications are a hard requirement list. Regulated companies need electronic records, traceability, and audit trails Tulip meets out of the box. Also immediately elevates the conversation beyond 'nice to have.'","flags":{"green":["AS9100","FDA 21 CFR Part 11","ITAR","ISO 13485","GxP / eBR"],"red":["No certifications, no plans. quality angle is weaker"]}},{"q":"How are you managing batch records, device history records, or electronic signatures right now?","why":"Paper DHRs and manual e-sigs are one of the most direct Tulip entry points. replaces them with fully compliant, auditable digital records. Surfaces the compliance pain in one question.","flags":{"green":["Paper batch records","Spreadsheet DHR","Manual signatures on paper travelers"],"red":["Fully compliant digital system already in place with no expressed pain"]}},{"q":"If I asked you right now to pull full traceability for a specific lot or serial number. how long does that take?","why":"The 'right now' framing makes it vivid. If the answer is hours or days, that's audit exposure and a clear Tulip win. The question also surfaces whether they're paper-first or system-first.","flags":{"green":["Hours to days","'We'd have to search through paper records'","Different systems for different data"],"red":["Real-time digital traceability already in place"]}},{"q":"What does a quality escape that reaches a customer actually cost you. total, not just the part?","why":"Forrester validated 70% fewer defects with Tulip. 'Total, not just the part' prompts them to include rework labor, expediting, customer penalties, and reputational cost. all of which are large. Builds ROI fast.","flags":{"green":["Names a number or incident",">$10K per escape is material","Mentions customer penalties or chargebacks"],"red":[]}},{"q":"How are NCRs and CAPAs handled today. paper forms, spreadsheets, or a QMS?","why":"Manual NCR/CAPA = Technical Buyer is your champion and they are frustrated daily. Slow closure rates = regulatory risk they are actively worried about. Short question, high signal.","flags":{"green":["Paper NCRs","Spreadsheet CAPA tracker","Slow closure rates or backlog"],"red":[]}},{"q":"Honest answer. if an auditor walked in tomorrow, how would you feel about your traceability and records?","why":"The 'honest answer' framing disarms the reflex to say 'we'd be fine.' If they hesitate, laugh, or qualify. that's your opening. Fear of audit failure is one of the most powerful purchase motivators in manufacturing.","flags":{"green":["Hesitates or qualifies","Recent audit finding or close call","Upcoming scheduled audit"],"red":["Full confidence + recent clean audit with no gaps expressed"]}}]},{"id":"impl","label":"Implementation Fit","color":"#0284c7","icon":"🚀","subtitle":"Think Big. Start Small. Go Fast. Composable Operations. qualify deployment readiness for the 90-day pilot","questions":[{"q":"Are you thinking about one use case on one line to start, or is this a broader platform initiative?","why":"Framing the choice gives them permission to start small. which lowers risk and speeds the close. One pilot line = fastest path to a win and an expansion story. 'Broader initiative' = larger deal but longer cycle.","flags":{"green":["Start with one use case, prove it, expand","One pilot line or work cell"],"red":["Require full plant rollout before they'll sign. scope and timeline risk"]}},{"q":"Do you have manufacturing engineers or systems engineers on staff who like to build things?","why":"This is the no-code champion question. If they have engineers who want to own their tools, offer the 30-day free trial on the spot. No SI = faster time to value, lower TCO, and a motivated internal champion.","flags":{"green":["Mfg engineers on staff","'Our engineers would love to own this'","Systems engineers or CI team who builds internally"],"red":["No technical staff at all. full SI dependency raises cost and risk"]}},{"q":"What does your IT environment look like. cloud-friendly, or is everything on-prem?","why":"Tulip is cloud-native SaaS on AWS. On-prem-only is a disqualifier unless they accept edge + cloud hybrid. Surface this early. don't let it become a late-stage blocker.","flags":{"green":["Cloud OK","AWS already in use","No strong on-prem requirement"],"red":["Hard on-prem only. potential disqualifier; escalate to AE"]}},{"q":"Is the floor connected. WiFi or Ethernet at stations, or are there dead zones?","why":"Tulip's edge runtime handles offline mode, but connectivity affects deployment planning and device choice. Dead zones = hardware conversation. Tablets already in use = faster deployment.","flags":{"green":["WiFi or wired at stations","Tablets already deployed to operators"],"red":["No floor connectivity. adds infrastructure complexity before go-live"]}},{"q":"What are operators actually touching today. tablets, PCs, shared kiosks, paper?","why":"Closes the implementation section with a practical infrastructure question. Tablets already deployed = shortest path. Paper or shared terminals = device conversation needed. Helps scope the deployment.","flags":{"green":["Tablets already in use","PCs or dedicated screens at workstations"],"red":["Single shared ancient kiosk. IT discussion needed before deployment"]}},{"q":"If you moved forward with something like this, would you expect to use your existing hardware. tablets, screens, terminals, or would new devices be part of the conversation?","why":"Tulip runs on any modern tablet, PC, or browser. no proprietary hardware required. Existing hardware = faster deployment and lower upfront cost. Surfaces CapEx sensitivity and deployment readiness in one question.","flags":{"green":["Already have tablets or screens deployed","Expecting to reuse existing hardware","Bring-your-own-device environment"],"red":["Require proprietary ruggedized hardware only. compatibility check needed","No devices on the floor at all. full hardware procurement required"]}},{"q":"One thing we see make or break implementations is operator adoption. how would you describe your team's openness to new tools? Are operators typically early adopters, or does change tend to meet resistance on your floor?","why":"Adoption risk is the #1 reason implementations stall post-go-live. This question surfaces change management readiness and gives you a chance to position Tulip's operator-first UX, guided onboarding, and the fact that operators typically embrace it because it makes their job easier. not harder.","flags":{"green":["'Our operators are pretty open'","Previous successful digital rollout","Champions on the floor who want change"],"red":["'Our operators resist anything new'","Previous failed implementation due to low adoption","Union environment with strict change rules. flag for AE"]}}]},{"id":"buying","label":"Buying Process & MEDDIC","color":"#0891b2","icon":"💰","subtitle":"Qualify the deal, map the decision, and test for real transformation intent","questions":[{"q":"When a decision like this gets made at your company. who's in the room?","why":"Maps the buying committee without the word 'stakeholders.' You need an economic buyer (VP Ops, CFO) and a champion (Mfg Engineer, End User) at minimum. Their answer tells you whether you're talking to the right person.","flags":{"green":["Small committee: 2–4 people","Economic buyer and champion already identified"],"red":["Procurement-led with no ops champion in the conversation","Committee of 10+. long consensus process"]}},{"q":"Have you looked at anything like this before. MES platforms, floor digitization, or is this new territory?","why":"Prior evaluation = they understand the category. May have evaluation criteria you can map to Tulip's strengths. Surfaces competitive threats and incumbent loyalty early. New territory = education cycle ahead.","flags":{"green":["Previous evaluation. familiar with the space","Looked at a competitor and were disappointed"],"red":["Never evaluated ops tech. longer education cycle likely"]}},{"q":"Is there budget allocated for this already, or would it need to go through a business case?","why":"Budget allocated = fastest cycle. No budget = help them build the ROI model using the Forrester TEI report ($16.23M NPV, 448% ROI). Don't be afraid to offer this. it's the most credible document you have.","flags":{"green":["Budget allocated this cycle","'We have a line item for ops tech'","CapEx or OpEx approved in planning"],"red":["No budget, no path to one in the near term. 6+ month cycle minimum"]}},{"q":"When would you want this live. is there a target date tied to anything?","why":"Timeline = urgency signal and deal velocity indicator. <6 months + tied to an event = high urgency. >12 months = longer cycle. '90 days to deploy' is Tulip's strongest competitive message. use it here.","flags":{"green":["Live within 90 days","Tied to audit, product launch, or contract"],"red":["'Someday' or '2+ years out'. low urgency, nurture and stay warm"]}},{"q":"Six months after go-live. what would a win look like? What would you point to?","why":"The success metric question. Their answer is your proof of value, your AE brief, and your follow-up hook. It also sets evaluation criteria in your favor. Don't suggest an answer. let them define the win.","flags":{"green":["Specific metric: FPY %, downtime hours, audit pass, operator training time"],"red":["'Just better visibility'. vague and hard to prove; push for a number"]}},{"q":"Are we the only people you're talking to, or is there a shortlist forming?","why":"Surfaces competitive threats directly. Casual framing reduces defensiveness. Siemens/SAP on the list = TCO and deploy speed. Paper = urgency play. First mover = set the evaluation criteria now before anyone else does.","flags":{"green":["No shortlist. you're first mover","Evaluated legacy MES and rejected it"],"red":["Already deep into a Siemens or SAP evaluation. harder to displace"]}},{"q":"Last one. when your organization decides to move on something like this, how fast does it actually move? Are you an organization that can go from decision to deployment in 90 days, or does change tend to take longer to work through?","why":"Organizational agility is a real disqualifier. the fastest Tulip deployments happen with orgs that have executive buy-in, a clear champion, and a culture of moving. If they describe 12-committee approvals and 18-month procurement cycles, that's not a bad lead but it needs to be qualified correctly and handed to AE with context.","flags":{"green":["'We move fast when the pain is real'","Executive sponsor in the room","Previous 90-day or sub-6-month technology deployments"],"red":["'Everything takes at least a year here'","Procurement-led with no ops authority","Committee approval required for any technology decision"]}},{"q":"One last thing, and this is the most important question I ask. If you implemented something like Tulip and it quietly disappeared six months later, would anything about how your floor operates actually be different? Or would it go back to the way it was?","why":"Jeff Winter's test: 'If your tech disappeared tomorrow, would anything change?' The best deals are with companies who want to transform behavior, not just deploy software. If they describe actual workflow changes, operator behavior shifts, or decisions they'd make differently. that's a buyer. If they can't answer or say 'probably not much'. that's either a disqualified lead or someone who needs their vision raised before they can champion this internally.","flags":{"green":["Describes specific behavior changes they want to see","Can point to decisions they'd make differently with better data","Has tried and failed to change floor behavior before. frustrated"],"red":["'We just need better reporting'","Can't articulate what 'different' looks like","Sees this as an IT project, not an ops transformation"]}}]},{"id":"fit","label":"Fit Signals & Disqualifiers","color":"#059669","icon":"🎯","subtitle":"Use this to score the deal after the call","scoreItems":[{"label":"50+ operators impacted by the pain","pts":2},{"label":"Paper / spreadsheet / homegrown MES today","pts":2},{"label":"Clear cost or metric attached to the pain","pts":2},{"label":"External forcing function (audit, launch, contract)","pts":2},{"label":"Internal champion identified (mfg eng / plant mgr)","pts":2},{"label":"Budget allocated or in planning cycle","pts":1},{"label":"Regulated environment (FDA, AS9100, ITAR, GxP)","pts":1},{"label":"Mfg engineers or systems engineers on staff","pts":1},{"label":"Multi-site or multi-line opportunity","pts":1},{"label":"Cloud-friendly / no on-prem hard requirement","pts":1}],"redFlags":["Hard on-prem only requirement","No technical staff. full SI dependency","MES contract renewed in last 6 months","No pain expressed. 'we're doing fine'","No budget and no path to one","Single operator, single line. too small","Procurement-only conversation with no ops access"]}],"HUB_TIPS":{"pharma":{"label":"Pharma & Biotech","color":"#a78bfa","icon":"💊","priority_sections":["stack","quality","impl"],"spotlight_qs":["How are your batch records currently managed. paper, hybrid, or electronic?","When FDA walks in, how fast can you pull a complete batch record for a specific lot?","What does your CSV validation process look like. internal team, CRO, or hybrid?","How long does product changeover take, and where does the time go?","Are you under any current 483 observations or have you had regulatory attention recently?"],"tip":"Lead with compliance questions (stack → quality → impl). Get to batch records and audit readiness fast. that's the pain that drives urgency in pharma."},"meddevice":{"label":"Med Device & Diagnostics","color":"#ff5f57","icon":"🩺","priority_sections":["stack","quality","ops"],"spotlight_qs":["How is your DHR currently generated. paper during production, transcribed after, or electronic?","If FDA requested a complete trace of a specific unit shipped last month, how fast could you pull that?","What's your current first pass yield, and where does rework most commonly occur?","What's your CAPA cycle time. FDA QMSR effective Feb 2, 2026 (ISO 13485 now mandatory) from deviation identification to closure?","What QMS are you currently using. Greenlight Guru, MasterControl, ETQ?"],"tip":"DHR and traceability are the entry point. Once you've established their documentation gap, move to quality and then CAPA cycle time. FDA QMSR effective Feb 2, 2026 (ISO 13485 now mandatory). those quantify the cost of doing nothing."},"general":{"label":"General Manufacturing","color":"#f59e0b","icon":"🏭","priority_sections":["ops","stack","quality"],"spotlight_qs":["Walk me through how an operator gets their work instructions today. paper, binder, or screen?","What's your current OEE, and where does most of your loss come from?","When you need to know production status right now, how do you get that information?","What does your shift handoff look like. what context typically gets lost?","What's your current scrap or rework rate, and where in the process does it originate?"],"tip":"For general manufacturing, the ops and stack sections are your primary discovery areas. Get their OEE number and current system. that anchors the ROI conversation."},"aerodefense":{"label":"Aerospace & Defense","color":"#60a5fa","icon":"✈️","priority_sections":["stack","quality","ops"],"spotlight_qs":["How are production travelers and work instructions managed today. paper, PDF, or electronic?","When DCMA auditors request a production record, how long does it take to pull a complete traveler package?","How do you currently ensure operators are always on the current approved work instruction revision?","Do you have any ITAR-controlled technical data on the floor, and how are you managing access controls?","Do you have any open DCMA findings or AS9100 nonconformances related to documentation?"],"tip":"A&D discovery leads with documentation and compliance. DCMA, AS9100, ITAR. Get them to quantify audit prep time and describe their traveler process. That's where the pain lives."}},"PLAYBOOKS":[{"id":"bant","cat":"qualification","name":"BANT","full":"Budget · Authority · Need · Timeline","origin":"IBM, 1950s","stage":"Prospecting → Top of Funnel","when":"Fast top-of-funnel filter. Cold calls, inbound triage. Use to disqualify fast, not qualify deep.","desc":"The oldest qualification framework. Best as a first screen. too shallow for complex enterprise deals. Use to avoid chasing dead ends, then layer CHAMP or MEDDPICC for serious opportunities.","letters":[{"l":"B","n":"Budget","d":"Do they have allocated budget, or do you need to help them build the business case?","q":"Have you set aside budget for shop-floor digitization, or is this something you'd need to build a business case for?"},{"l":"A","n":"Authority","d":"Are you talking to a decision-maker or an influencer? Map the hierarchy.","q":"If we found the right solution, who else would need to be part of the decision?"},{"l":"N","n":"Need","d":"Is there a real, felt pain your solution addresses? Not curiosity. urgency.","q":"What's driving the interest in looking at something like Tulip right now?"},{"l":"T","n":"Timeline","d":"When do they need to solve the problem? Is there a forcing function?","q":"Is there a date driving this. upcoming audit, product launch, new customer requirement?"}],"apply":"On a cold call: run BANT mentally as they talk. Lead with Need (N). budget is often the last thing to confirm. B without a real N is a ghost pipeline.","tip":"BANT was built for mainframes in the '50s. Great pre-filter. Terrible enterprise qualification tool on its own.","color":"#2563eb"},{"id":"champ","cat":"qualification","name":"CHAMP","full":"Challenges · Authority · Money · Prioritization","origin":"Modern consultative sales","stage":"First Discovery Call","when":"Use on first discovery call for manufacturing ops leaders. Buyer-centric. starts with their pain, not your product.","desc":"CHAMP flips BANT by starting with the buyer's challenges, not their budget. Treats the rep as a consultant. Ideal for manufacturing where pain drives urgency before budget exists.","letters":[{"l":"C","n":"Challenges","d":"What operational pains are they living with daily? Surface and deepen them.","q":"Walk me through the most painful part of your current production process. Where do you lose the most time or money?"},{"l":"H","n":"Authority","d":"Who makes the call? Who influences it? Map the decision unit.","q":"Besides yourself, who would be most affected by a change like this, and who would need to sign off?"},{"l":"A","n":"Money","d":"Can they fund it? Will they prioritize budget for this problem?","q":"When you've solved problems like this before, how did you fund that investment?"},{"l":"M","n":"Prioritization","d":"Where does this rank on their list? Is there a forcing function making it urgent?","q":"Of everything on your plate right now, where does fixing this fall? What would make it rise to the top?"}],"apply":"Open every manufacturing discovery call with C: 'Walk me through your biggest pain on the floor right now.' Let the pain set the agenda. not your pitch.","tip":"Manufacturing ops leaders have pain before they have budget. Start with Challenges and you'll earn the right to talk about money.","color":"#059669"},{"id":"anum","cat":"qualification","name":"ANUM","full":"Authority · Need · Urgency · Money","origin":"Ken Krogue, InsideSales.com","stage":"Prospecting → SDR Handoff","when":"High-volume outbound. Pre-qualify before burning AE time. Confirm authority first. everything else is secondary.","desc":"ANUM puts Authority first because talking to the wrong person wastes everyone's time. Built for SDR environments: confirm you have the right contact, then qualify fast and pass upstream.","letters":[{"l":"A","n":"Authority","d":"Confirm decision-making power before investing discovery time.","q":"Are you the right person who'd be involved in evaluating a solution like this for your operations?"},{"l":"N","n":"Need","d":"Is there a real, felt business problem that maps to Tulip?","q":"What's the biggest operational challenge you're trying to solve on the floor right now?"},{"l":"U","n":"Urgency","d":"Is there a timeline or trigger creating real pressure to act?","q":"Is there something making this more pressing right now. an audit, new contract, leadership push?"},{"l":"M","n":"Money","d":"Can they fund a solution? Have they bought similar things before?","q":"Have you made investments in other shop-floor systems recently, or would this be a new budget category?"}],"apply":"On cold calls: 'Are you involved in decisions around manufacturing ops tech?' Confirms A. Then move to N. Don't pitch until you have both.","tip":"ANUM is your SDR filter. Confirm authority before you invest discovery time. Don't let enthusiasm substitute for authority.","color":"#7c3aed"},{"id":"neat","cat":"qualification","name":"N.E.A.T.","full":"Need · Economic Impact · Access to Authority · Timeline","origin":"Harris Consulting Group. built for complex B2B SaaS","stage":"Discovery → Proposal","when":"When you need to build a quantified business case. Forces you to price the pain, not just name it.","desc":"NEAT upgrades BANT by requiring you to quantify economic impact, not just confirm need. 'Access to Authority' acknowledges that you usually work through a champion to reach the Economic Buyer.","letters":[{"l":"N","n":"Need","d":"Core needs. technical and personal. What does the buyer actually need, not just what they say they want?","q":"What's the operational problem you're solving, and what's it cost you every month you don't fix it?"},{"l":"E","n":"Economic Impact","d":"Don't just identify pain. price it. Buyers need a number to build a business case.","q":"If you fixed the defect rate / downtime / paper problem, what would that be worth in dollars or hours per week? [Anchor: 448% ROI, $16.23M NPV]"},{"l":"A","n":"Access to Authority","d":"Can your champion facilitate a meeting with the Economic Buyer? Access ≠ knowing who it is.","q":"Who would need to approve an investment like this, and is that a conversation you'd be comfortable facilitating?"},{"l":"T","n":"Timeline","d":"Is there a real, compelling timeline with consequences for missing it?","q":"What happens if this isn't solved by [date]? Is there a forcing function. audit, product launch, contract renewal?"}],"apply":"Use Forrester TEI ($16.23M NPV, 448% ROI, <6mo payback) to anchor Economic Impact. Give them the number before they have to imagine it.","tip":"NEAT's E letter is where Tulip's ROI data dominates. Quantify early. A deal without a dollar value is a conversation, not an opportunity.","color":"#0891b2"},{"id":"faint","cat":"qualification","name":"FAINT","full":"Funds · Authority · Interest · Need · Timing","origin":"Mike Schultz, RAIN Group","stage":"Prospecting → Discovery","when":"Prospects without a pre-defined budget. Classic for manufacturing companies exploring digitization for the first time.","desc":"FAINT recognizes that great prospects often don't have budget yet, but they have funds. Your job is to build the business case that creates the budget, not wait for one to exist.","letters":[{"l":"F","n":"Funds","d":"Do they have financial capacity, even without a formal budget line?","q":"Have you made operational investments recently. automation, ERP upgrades. at a similar scale?"},{"l":"A","n":"Authority","d":"Are you talking to or can you reach a decision-maker?","q":"Who would be the key stakeholder you'd want us to build a business case for?"},{"l":"I","n":"Interest","d":"Are they genuinely curious, or just being polite? Test their engagement.","q":"What triggered your interest in looking at this now. what changed?"},{"l":"N","n":"Need","d":"Is the pain real and meaningful, even if not yet urgent?","q":"How are you managing [process] today, and what's the frustration level on your team?"},{"l":"T","n":"Timing","d":"Can you create a timeline around a real event or initiative?","q":"Is there anything on the horizon. audit, contract renewal, new product launch. that would make timing relevant?"}],"apply":"When they say 'we don't have budget': 'Totally fine. most great projects start that way. Can I show you what the ROI typically looks like so you can make a case internally?'","tip":"Manufacturing companies often have capital but no MES budget line yet. FAINT lets you sell before they're formally in buying mode.","color":"#e11d48"},{"id":"meddic","cat":"qualification","name":"MEDDIC","full":"Metrics · Economic Buyer · Decision Criteria · Decision Process · Identify Pain · Champion","origin":"Dick Dunkel, PTC, 1996. grew PTC from $300M to $1B in 4 years","stage":"Discovery → Close","when":"Any qualified opportunity with multiple stakeholders. The foundation. Score every deal against all 6 letters.","desc":"The gold standard for complex B2B SaaS. 73% of SaaS companies over $100K ACV use it. Improves win rates 18% and deal sizes 24%. Champion is the single most predictive element. without one, deals stall.","letters":[{"l":"M","n":"Metrics","d":"Quantifiable value tied to what the buyer reports upward.","q":"What KPIs does your VP/COO care about most? [Tulip: 448% ROI, 70% fewer defects, $318K vendor savings, 15% labor productivity]"},{"l":"E","n":"Economic Buyer","d":"The person with final budget authority. Not always who you're talking to.","q":"Who has final authority to approve the budget for a project like this? What does their scorecard look like?"},{"l":"D","n":"Decision Criteria","d":"Formal and informal requirements used to evaluate vendors.","q":"When you evaluate a vendor, what are the top 3 things that have to be true to move forward?"},{"l":"D","n":"Decision Process","d":"The exact steps from evaluation to signed contract.","q":"Walk me through how a decision like this gets made. from evaluation to purchase order. Who's involved at each step?"},{"l":"I","n":"Identify Pain","d":"Specific, felt, consequential pain with a dollar cost.","q":"What's the single operational problem that, if solved, would have the biggest impact? What's it cost you?"},{"l":"C","n":"Champion","d":"Internal advocate with power, influence, and personal motivation.","q":"Who on your team would benefit most from this project succeeding, and would they go to bat for it with leadership?"}],"apply":"After every call, score your deal 0-6. Missing Champion = will stall. Missing Metrics = will lose on price. Use the MEDDPICC Scorecard in Tools to track this.","tip":"Test your champion: ask them to do something (set up a call, share a doc, intro the EB). If they act, they're real. If they stall, they're a coach, not a champion.","color":"#2563eb"},{"id":"meddicc","cat":"qualification","name":"MEDDICC","full":"Metrics · Economic Buyer · Decision Criteria · Decision Process · Identify Pain · Champion · Competition","origin":"MEDDIC + Competition layer","stage":"Discovery → Proposal → Close","when":"Competitive deals. When you know 2+ vendors are being evaluated, or when status quo is the main alternative.","desc":"Adds Competition to MEDDIC. In manufacturing MES, you're almost always competing against paper/Excel, a legacy system, or an internal IT build. Pull your battle cards.","letters":[{"l":"M","n":"Metrics","d":"Quantified business outcomes tied to buyer KPIs.","q":"Tulip metrics to lead with: 448% ROI, $16.23M NPV, 70% fewer defects, 15% labor productivity, $1 in → $10 out."},{"l":"E","n":"Economic Buyer","d":"Who controls the budget and has final authority? Have you met them?","q":"Is there a CFO, COO, or VP who would need to approve this? What does their annual scorecard look like?"},{"l":"D","n":"Decision Criteria","d":"Technical, business, and relationship criteria. Surface what could eliminate you.","q":"Are there must-haves that could eliminate a vendor? [GxP compliance? SAP integration? No-code?]"},{"l":"D","n":"Decision Process","d":"Steps from evaluation to signature. Who's on the selection committee?","q":"After you narrow the field, what comes next. POC, security review, legal, procurement? How long does each step take?"},{"l":"I","n":"Identify Pain","d":"The core business problem driving urgency right now.","q":"What's the operational pain that's forcing a decision now. versus why this wasn't a priority before?"},{"l":"C","n":"Champion","d":"Internal advocate with credibility and skin in the game.","q":"Is your champion comfortable going to leadership and saying 'I recommend Tulip'? What's in it for them personally?"},{"l":"C","n":"Competition","d":"Named competitors and status quo. Must have a strategy for each one.","q":"Are you evaluating other solutions, or is the current process the main alternative? [Pull battle card for each named competitor]"}],"apply":"When competition is named, immediately pull the battle card. Lead with win themes first, then neutralize their strengths.","tip":"Status quo (paper/Excel) is your #1 competitor in manufacturing. Price it: 'What's it costing you to stay where you are?' Most buyers have never calculated it.","color":"#7c3aed"},{"id":"meddpicc","cat":"qualification","name":"MEDDPICC","full":"Metrics · Economic Buyer · Decision Criteria · Decision Process · Paper Process · Identify Pain · Champion · Competition","origin":"MEDDIC evolution. enterprise SaaS standard","stage":"Discovery → Proposal → Close → Signature","when":"Enterprise deals $100K+ ACV with formal procurement, legal review, and security cycles.","desc":"Adds Paper Process (procurement/legal/security) to MEDDICC. In manufacturing, IT security reviews and ERP integration validation can add 60–90 days after verbal agreement. Map this early or it will kill your Q4. Use the Scorecard in Tools to track every deal.","letters":[{"l":"M","n":"Metrics","d":"Quantified outcomes tied to what the buyer's leadership scores them on.","q":"Tulip metrics: 448% ROI, $16.23M NPV, 70% fewer defects, 15% labor productivity, $318K vendor consolidation."},{"l":"E","n":"Economic Buyer","d":"Budget authority. Often COO, VP Ops, or CFO in manufacturing. Have you met them?","q":"Have you connected the EB to this initiative? What's their #1 priority this fiscal year?"},{"l":"D","n":"Decision Criteria","d":"Explicit requirements. In mfg: GxP, ERP integration, no-code, scalability, security.","q":"Does your team have a formal requirements list? What are the absolute deal-breakers?"},{"l":"D","n":"Decision Process","d":"Evaluation timeline and gates: demo → POC → selection → procurement.","q":"Who's on the selection committee? What are the gates between stages?"},{"l":"P","n":"Paper Process","d":"Everything after selection: MSA, DPA, security questionnaire, PO. Often takes longer than the sale.","q":"What does procurement look like after a vendor is selected? IT security review? Legal review? How long does each typically take?"},{"l":"I","n":"Identify Pain","d":"Specific, consequential pain with a dollar cost attached.","q":"What's the cost of a quality escape, failed audit, or production delay? Hours/week lost to paper and manual reporting?"},{"l":"C","n":"Champion","d":"Internal advocate who owns the outcome and has personal motivation.","q":"Does your champion know what's in it for them personally if this project succeeds? Career win? Less firefighting?"},{"l":"C","n":"Competition","d":"Named competitors and status quo. Strategy required for each.","q":"Who else are you looking at? What's working well with your current approach that we'd need to match or beat?"}],"apply":"Score deals 0–8 before AE handoff. Missing P (Paper Process) = deal will slip your forecast quarter. Ask about procurement on call #2, not call #10.","tip":"73% of SaaS companies over $100K ACV use MEDDPICC. It's the language your AEs speak. Brief your AE with MEDDPICC scores after every booked meeting.","color":"#0891b2"},{"id":"spin","cat":"selling","name":"SPIN Selling","full":"Situation · Problem · Implication · Need-Payoff","origin":"Neil Rackham, 1988. 35,000 sales calls analyzed at Huthwaite","stage":"Discovery Calls","when":"Every discovery call. The single best question framework for surfacing and developing pain. Use P and I heavily.","desc":"Research-backed: top performers ask more Implication and Need-Payoff questions, far fewer Situation questions. The goal is to help buyers feel the full weight of their problem. then feel the relief of solving it. They sell themselves.","letters":[{"l":"S","n":"Situation","d":"Context questions. Do your research first. don't waste call time on things you can find on LinkedIn.","q":"'How are you currently tracking production steps and work instructions on the floor?' [Minimal. you should already know most of this.]"},{"l":"P","n":"Problem","d":"Surface specific pains. Get them talking. Listen for emotion, not just facts.","q":"'Where do you see the most rework or quality escapes in your process? What's the most frustrating part of your current system?'"},{"l":"I","n":"Implication","d":"MOST IMPORTANT. Deepen the pain. Make the cost of the problem visceral and real. This is where deals are won.","q":"'What happens downstream when a quality escape slips through? What's the impact on customers, audits, your team?' [Let them feel the full cost.]"},{"l":"N","n":"Need-Payoff","d":"Help the buyer articulate the value of solving the problem. They say it. you don't.","q":"'If you had real-time visibility into every step and caught defects the moment they happen. what would that mean for your results?'"}],"apply":"The ratio: spend 10% on S, 30% on P, 40% on I, 20% on N. Most SDRs over-invest in S and never get to I. Implication is where the emotional buy happens.","tip":"Best Need-Payoff openers: 'If you could..' / 'What would it mean if..' / 'How valuable would it be if..' Let them answer. then tie it to a Tulip case study.","color":"#2563eb"},{"id":"challenger","cat":"selling","name":"Challenger Sale","full":"Teach · Tailor · Take Control","origin":"Matt Dixon & Brent Adamson, CEB/Gartner, 2011. 6,000 reps researched","stage":"Discovery → Proposal","when":"Prospects complacent about status quo. When you need to create urgency that doesn't exist yet.","desc":"53% of customer loyalty comes from the quality of the sales experience. not the product. Challengers win by teaching buyers something new about their business and guiding them to the ideal solution rather than responding to stated needs.","letters":[{"l":"1","n":"Teach","d":"Lead with a unique insight the buyer hasn't heard. Reframe their problem through your lens.","q":"'Most manufacturers think their ERP handles shop floor ops. What we actually see is a 2-layer gap between the ERP and the floor where tribal knowledge, rework, and compliance risk live. That's the gap Tulip was built for.'"},{"l":"2","n":"Tailor","d":"Customize your insight for their specific industry, role, and what they're measured on.","q":"Pharma: 21 CFR Part 11 + eBR. A&D: ITAR, DCMA, AS9100. Discrete: OEE, throughput, NPI cycle time. Each persona hears a different version."},{"l":"3","n":"Take Control","d":"Drive the conversation to a decision. Challenge complacency directly.","q":"'That's actually where our best customers were 12 months before an audit or quality escape made the cost of staying put undeniable. What would that look like for you?'"}],"apply":"Your Challenger opener: 'The #1 thing we hear from plant managers is that their ERP tells them what happened. Tulip tells them what's happening right now.'","tip":"Challenger wins in complex deals with complacent buyers. Don't use it on a buyer already sold. you'll seem confrontational. Read the room.","color":"#e11d48"},{"id":"sandler","cat":"selling","name":"Sandler Selling System","full":"Bond & Rapport → Up-Front Contract → Pain → Budget → Decision → Fulfillment → Post-Sell","origin":"David Sandler, 1967. one of the most widely used frameworks globally","stage":"Full Sales Cycle","when":"Any deal where you want to stop chasing and start attracting. Kills the 'maybe' that drags on for months.","desc":"Sandler reverses the traditional sales dynamic: both buyer and seller qualify each other. The rep is the authority, not the supplicant. Goal: a clear YES or NO, not a maybe. No pressure tactics. Mutual respect.","letters":[{"l":"1","n":"Bond & Rapport","d":"Build genuine human trust before selling anything.","q":"Mirror their energy. Ask about their role, their plant, their biggest wins this year. Don't pitch in the first 3 minutes."},{"l":"2","n":"Up-Front Contract","d":"Set explicit expectations for the call. Both parties agree on what happens.","q":"'I want to make sure this is worth your time. Here's what I'm hoping to cover. does that work? And if it's not a fit, that's completely okay to say.'"},{"l":"3","n":"Pain (3 Levels)","d":"L1: surface pain. L2: business cost. L3: personal impact. Go all three levels.","q":"L1: 'What's the issue?' → L2: 'What does that cost you per month?' → L3: 'How does that affect you personally?'"},{"l":"4","n":"Budget","d":"Confirm they can fund it, and that they're willing to spend. Surface investment range early.","q":"'Typically a solution like this runs $X–Y annually. Is that the ballpark you've been thinking about, or would that be a challenge?'"},{"l":"5","n":"Decision","d":"Map the exact decision process and all stakeholders before you invest in a proposal.","q":"'Walk me through how a decision like this gets made at [Company]. who's involved, what are the steps, how long does it take?'"},{"l":"6","n":"Fulfillment","d":"Present the solution ONLY once Pain + Budget + Decision are confirmed. Premature demos kill deals.","q":"Hold the demo until the above is in place. 'Before I show you the platform, I want to make sure it actually maps to what you told me matters most..'"},{"l":"7","n":"Post-Sell","d":"Prevent buyer's remorse. Lock in next steps and surface late-breaking objections.","q":"'Is there anything that could get in the way of moving forward with what we agreed on today?' Ask this before you hang up."}],"apply":"Up-Front Contract on cold calls: 'I'll take two minutes. if it resonates, we go deeper. If not, I'll get out of your hair. Fair enough?'","tip":"Sandler's law: No mutual mystification. If you're confused about where a deal stands, ask directly. 'Where do you see this going?' Prospects respect directness.","color":"#059669"},{"id":"gap","cat":"selling","name":"Gap Selling","full":"Current State → Problem Identification → Future State → The Gap","origin":"Keenan (Jim Keenan), 2019","stage":"Discovery → Proposal","when":"When buyers need to see the full cost of their problem before they can value your solution.","desc":"People don't buy products. they buy movement from a painful present to a better future. The rep's job is to make the current state painful enough and the future state compelling enough that the gap demands to be closed.","letters":[{"l":"1","n":"Current State","d":"Deeply understand where they are now: tech stack, process, problems, human cost.","q":"Tulip current states: paper travelers, Excel QA, legacy MES, tribal knowledge, manual reporting, 40–60% OEE, compliance risk."},{"l":"2","n":"Problem Identification","d":"Go deeper than the surface. Root causes, downstream effects.","q":"'You mentioned paper travelers. what happens when a step gets skipped? How often? Before or after the product ships?'"},{"l":"3","n":"Future State","d":"Paint a vivid picture of life with the problem solved.","q":"Tulip future state: real-time traceability, 70% fewer defects, digital eBR, connected workers, 4-week NPI, always audit-ready."},{"l":"4","n":"The Gap","d":"The distance between current and future = the value of your solution. Quantify it.","q":"'Tulip customers average 448% ROI. For a plant your size, that gap is roughly $X.' Use the ROI Calculator in Tools."}],"apply":"Your gap pitch: 'Most floors run 40–60% OEE with manual reporting. Our customers average 15–25% productivity gains and 70% fewer defects in year one. That gap is real money.'","tip":"The wider the gap you can show, the less price matters. Make the current state painful, the future state vivid, and the gap undeniable.","color":"#0284c7"},{"id":"solution","cat":"selling","name":"Solution Selling","full":"Diagnose Pain → Create Vision → Map Capabilities","origin":"Mike Bosworth, 1983","stage":"Discovery → Proposal","when":"Complex deals where buyers need help defining what they actually need before choosing a vendor.","desc":"Positions the rep as a problem-solver, not a vendor. Diagnose the issue before prescribing the solution. When a buyer feels you understand their problem better than they do, price becomes secondary.","letters":[{"l":"1","n":"Diagnose Pain","d":"Uncover the real business problem before mentioning your product.","q":"'Before I show you anything about Tulip, walk me through what a typical shift looks like on your floor. Where does work pile up or break down?'"},{"l":"2","n":"Create Vision","d":"Help them envision the future state. without naming your product.","q":"'Imagine your operators had step-by-step guidance on any device and every action was automatically recorded. What would that change for QA and compliance?'"},{"l":"3","n":"Map Capabilities","d":"Once the vision is set, connect Tulip's capabilities to exactly what they described.","q":"'What you just described. digital work instructions, automatic audit trail, no paper. that's exactly what Tulip does. Let me show you a customer who was in your exact situation.'"}],"apply":"Rule: never lead with a demo. Diagnose first. Build the vision. Then show the product as the answer to their own words. They'll hear their description in your demo.","tip":"Solution Selling is the foundation under SPIN, Challenger, and Gap Selling. Master this and the others click into place.","color":"#7c3aed"},{"id":"conceptual","cat":"selling","name":"Conceptual Selling (Miller Heiman)","full":"Get Information · Give Information · Get Commitment","origin":"Robert Miller & Stephen Heiman, 1985","stage":"Discovery → Stakeholder Management → Close","when":"Large enterprise deals with buying committees. When you have 4+ stakeholders with different definitions of success.","desc":"You're not selling a product. you're selling a concept (each stakeholder's idea of their ideal solution). Align your solution to each person's concept. Famous for the Blue Sheet: deal management tool for mapping account power.","letters":[{"l":"1","n":"Get Information","d":"Understand what each stakeholder values and their personal definition of success.","q":"'What does a win look like for you personally on this project?' [Ask each stakeholder separately.]"},{"l":"2","n":"Give Information","d":"Share only what's relevant to this specific person's concept.","q":"EB → ROI/NPV. Champion → daily workflow wins. IT → integration/SOC 2. QA Director → compliance/audit trail. Tailor every conversation."},{"l":"3","n":"Get Commitment","d":"Lock in a concrete next step at every interaction. Not 'let's stay in touch.'","q":"'Based on today's conversation, the logical next step is [specific action]. Does [date] work?' Never leave a call without a committed next step."}],"apply":"Blue Sheet mental model: draw the account. Boxes = stakeholders. Arrows = influence. Circle the EB and your champion. Identify the gaps. Fill them before the final decision.","tip":"Four buyer types: Economic Buyer (approves budget), User Buyers (use it daily), Technical Buyer (IT/security veto), Coach (your guide to the org). Each needs a different message.","color":"#0891b2"},{"id":"blount","cat":"prospecting","name":"Blount / Fanatical Prospecting","full":"30-Day Rule · Law of Replacement · Multi-Channel · Power Hours","origin":"Jeb Blount, Fanatical Prospecting (2015)","stage":"Daily. Non-Negotiable","when":"Every day. Pipeline is a lagging indicator. What you do today shows up as meetings in 30–90 days.","desc":"Blount's core insight: most reps only prospect hard when pipeline is thin. by then it's too late. Fanatical Prospecting demands consistent daily activity regardless of current pipeline health.","letters":[{"l":"1","n":"30-Day Rule","d":"Prospecting you do today pays off in 30–90 days. Miss a day and a gap opens three months later.","q":"Daily non-negotiable: X cold calls + Y LinkedIn touches + Z emails. Even on demo days. Even on great days."},{"l":"2","n":"Law of Replacement","d":"When you close a deal (or book a meeting), replace it immediately.","q":"Just booked a meeting? Before you move on, add 2 new targets to your Hit List. Celebrate later."},{"l":"3","n":"Multi-Channel","d":"Phone + email + LinkedIn + video. Reps who rely on one channel leave 80% of opportunities untouched.","q":"Sequence: call → LinkedIn connect → email with value → call → personalized video → DM → call again."},{"l":"4","n":"Power Hours","d":"Protect 2–4 hours of uninterrupted prospecting daily. Block the calendar. No exceptions.","q":"Morning power hour: 8–10 AM. No meetings, no Slack, no admin. Dials only. Non-negotiable."}],"apply":"Your daily minimum: 60+ dials. Track it on your Hit List. The 30-Day Rule means today's calls become next quarter's quota. Don't borrow from your future self.","tip":"Blount's law: 'Amateurs wait for the perfect time to prospect. Professionals just prospect.' The best time to call was yesterday. Second best is now.","color":"#0284c7"},{"id":"sobczak","cat":"prospecting","name":"Sobczak / Smart Calling","full":"Research → Interest-Creating Statement → Engage or Qualify Out","origin":"Art Sobczak, Smart Calling (2010)","stage":"Before Every Cold Call","when":"Before you dial anyone. There are no cold calls if you've done the research. Replace cold with warm.","desc":"Sobczak's thesis: the only thing that makes a call cold is your lack of knowledge. The Interest-Creating Opening Statement (ICOS) is the antidote to pitch-slapping. it hooks the buyer by leading with their world, not your product.","letters":[{"l":"1","n":"Research","d":"Know their role, company, industry challenges, recent news, and likely pains before you dial.","q":"Pre-call research: LinkedIn (title, tenure, recent posts), company news, industry pain points, tech stack. The Research tab is your Sobczak engine."},{"l":"2","n":"Interest-Creating Statement","d":"Hook them in 15 seconds with something relevant to their world.","q":"Formula: 'I work with [role] who [their situation]. We help with [specific pain]. how you're [gap question] today.' Applied to all 40 personas in the Playbook tab."},{"l":"3","n":"Engage or Qualify Out","d":"If they engage, go deeper. If not, exit professionally and follow up systematically.","q":"'Sounds like the timing isn't right. is it okay if I reach back out in 60 days? And is there a better person on your team who handles this?'"}],"apply":"The Research tab in this app IS your Smart Calling system. Run it before every targeted account call. Don't dial without it.","tip":"Sobczak's rule: never open with 'How are you today?' It signals you're a rep. Use their name + your ICOS. Get to value in 10 seconds.","color":"#2563eb"},{"id":"voss","cat":"prospecting","name":"Voss / Tactical Empathy","full":"Mirroring · Labeling · Accusation Audit · Calibrated Questions · FM DJ Voice","origin":"Chris Voss, Never Split the Difference (2016). former FBI hostage negotiator","stage":"Prospecting + Objection Handling","when":"Objection handling. Difficult conversations. Keeping a prospect engaged when they're about to bail.","desc":"Voss's negotiation tactics translate directly to sales because buying is emotional. The goal isn't to overcome objections. it's to make the prospect feel heard so deeply that resistance dissolves on its own.","letters":[{"l":"1","n":"Mirroring","d":"Repeat the last 1–3 words the prospect said, slight upward inflection. Gets them to keep talking.","q":"Prospect: 'We're happy with what we have.' You: '..happy with what you have?' [silence] They'll explain the real objection."},{"l":"2","n":"Labeling","d":"Name the emotion you hear. 'It sounds like..' 'It seems like..' Then silence.","q":"'It sounds like this has been a frustrating process for your team.' [pause] They'll confirm and go deeper into the real pain."},{"l":"3","n":"Accusation Audit","d":"Pre-empt their objections by naming them first. Defenses drop when you say it before they can.","q":"'I know you probably get a ton of calls about MES software, and I know you probably don't need another vendor in your inbox, but I think this might be different.'"},{"l":"4","n":"Calibrated Questions","d":"How and What questions that make them think. not defend. Avoid Why (sounds accusatory).","q":"'What's your biggest challenge with your current process?' 'How does that affect your team day-to-day?' 'What would need to be true for you to want to explore this?'"},{"l":"5","n":"FM DJ Voice","d":"Slow, warm, calm tonality on objections. The voice of a problem-solver, not a pusher.","q":"When they say 'not interested': slow down, lower pitch slightly, 'I completely understand..' [2-second pause]. Never speed up under pressure."}],"apply":"On pushback: mirror + label before responding. 'It sounds like you've been burned by a bad implementation before..' They say yes, you've just unlocked the real objection.","tip":"Voss: 'No' isn't the end. 'No' means 'I'm not comfortable yet.' 'Not interested' means 'I haven't heard anything interesting yet.'","color":"#059669"},{"id":"weinberg","cat":"prospecting","name":"Weinberg / New Sales. Simplified.","full":"Hunting Mindset · ICP Discipline · 5-Touch Minimum · Sales Story","origin":"Mike Weinberg, New Sales. Simplified. (2012)","stage":"Account Selection + Pursuit Strategy","when":"Account planning and territory management. Not just activity. targeting strategy.","desc":"Weinberg's thesis: most salespeople are account managers who occasionally prospect. True hunters target the right accounts with a crisp story and relentless, systematic follow-through.","letters":[{"l":"1","n":"Hunting Mindset","d":"Treat prospecting as the job. not an interruption to the job.","q":"Your hunting block: mornings. No inbound processing, no admin, no Slack. Outbound only. This time is sacred."},{"l":"2","n":"ICP Discipline","d":"Know exactly who you're targeting. Every contact on your list should match the ICP.","q":"Tulip ICP: 50+ operators, discrete or regulated manufacturing, paper or legacy MES, growth-stage or digitally motivated leadership. Does this account match?"},{"l":"3","n":"5-Touch Minimum","d":"Most reps give up after 1–2 attempts. Most deals close after 5+ touches.","q":"Sequence: Call 1 → VM + Email → LinkedIn → Call 2 → Value-add email → Call 3 → Video → Call 4. Never stop at 2."},{"l":"4","n":"Sales Story","d":"Have a crisp, compelling narrative about why your company, why now, why you.","q":"Tulip's story: 'We're the composable operations platform that puts a digital layer on top of your floor. custom apps in days, not months, and the ROI to back it up.'"}],"apply":"Weekly review: Am I hunting the right accounts? Have I put in 5+ touches before moving on? Hit List discipline is Weinberg in action.","tip":"Weinberg: 'The pipeline is the most important asset you own in sales. Guard it, feed it, and review it relentlessly.' Build the pipeline you wish you had 90 days from now.","color":"#e11d48"},{"id":"farrokh","cat":"prospecting","name":"30MPC / Farrokh + Cegelski","full":"Win First 60 Seconds · Mr. Miyagi Objection · 1-in-3 Benchmark","origin":"Armand Farrokh & Nick Cegelski, 30 Minutes to President's Club","stage":"Cold Call Execution","when":"Every cold call. The actual mechanics of what to say in the first 60 seconds, and when they push back.","desc":"Farrokh and Cegelski cut through theory with battle-tested call mechanics. Benchmark: 1 in 3 cold call connects should book a meeting if your opener and objection handling are dialed in. Most SDRs run 1 in 10.","letters":[{"l":"1","n":"Win the First 60 Seconds","d":"Your opener determines everything. Lead with a relevant insight.","q":"Chris's formula: 'Hey [Name], Chris from Tulip. Reason for my call: [role]s keep telling me [pain and what it costs them]. How are you handling [gap question] at [company]?' Pain first, product never. The question does the selling."},{"l":"2","n":"Mr. Miyagi Method","d":"On 'not interested': agree with them, then redirect. Don't fight the objection. use its momentum.","q":"'Not interested.' → 'Fair enough. most people I talk to aren't until they hear one thing: [sharp insight]. Does that change anything for you?'"},{"l":"3","n":"1-in-3 Benchmark","d":"Audit your opener and objection handling. not your call volume. if you're under 1 meeting per 3 connects.","q":"Track your funnel: connects → openers delivered → objections handled → meetings booked. Where does it break? Fix that link."}],"apply":"Your opener is already Farrokh-formatted (see Playbook tab per persona). Practice it 10x before dialing. The first 15 words either open the conversation or end it.","tip":"30MPC rule: if your opener doesn't get a response in 15 seconds, you've lost them. Tight. Relevant. Ends in a question. Every time.","color":"#ea580c"},{"id":"obj-nointeres","cat":"objections","type":"objection","name":"Not Interested","tag":"REFLEXIVE","what":"They don't actually know enough to be uninterested yet. This is a knee-jerk defensive reflex, not a real objection.","color":"#e11d48","t1":"'Totally get it. I wouldn't expect you to be interested in something you haven't heard about yet. All I'm asking for is 27 seconds. If it's not relevant, I'll disappear. Fair enough?'","t2":"[Voss/Miyagi] 'Not interested.' → '..not interested?' [silence, let them fill it] OR 'Fair enough. most [role] I talk to aren't until they hear one thing: we help plants like yours cut defects 70% without ripping out existing equipment. Does that change anything?'"},{"id":"obj-email","cat":"objections","type":"objection","name":"Send Me an Email","tag":"STALL","what":"They're trying to end the call politely. An email will get deleted. This is a brush-off, not genuine interest.","color":"#e11d48","t1":"'Happy to, but I'd hate to send something generic. Let me ask you one thing first so I can make it worth reading: what's the biggest challenge on your floor right now. paper, quality, compliance? [Listen] Perfect. I'll make it specific to that.'","t2":"'I'll send something over right now. But I want to make sure it's not another email you delete. Can I ask. is the timing genuinely bad, or is there something about this that didn't land for you?' [Voss label. uncover the real objection]"},{"id":"obj-system","cat":"objections","type":"objection","name":"We Have a System","tag":"COMPETITIVE","what":"They already use something. could be paper, Excel, a legacy MES, ERP add-on, or a point solution. This is your best opportunity to differentiate.","color":"#e11d48","t1":"'What are you using today? [Listen] Got it. we work alongside [system] all the time, actually. The gap we typically fill is the real-time layer between your ERP and what's actually happening on the floor. What does your current system do when an operator skips a step or a quality issue surfaces mid-process?'","t2":"'Sounds like you're covered. Can I ask. when's the last time you had an audit, and how did documentation hold up? [Listen] That's exactly the gap we fill for most of our customers. Not replacing [system]. just making what happens on the floor traceable in real time.'"},{"id":"obj-renewed","cat":"objections","type":"objection","name":"Just Renewed / Just Signed","tag":"TIMING","what":"They recently committed to another vendor. This is a timing objection, not a permanent no. Your goal is to stay in their orbit for the renewal.","color":"#e11d48","t1":"'Totally makes sense. I actually respect that, bad timing on my part. Can I ask. what were the deciding factors when you went with [vendor]? [Listen] Good to know. We hear that a lot actually. The reason I'd stay in touch is that a lot of teams outgrow [vendor] in year two once they try to scale. Would it be okay to reconnect closer to your renewal?'","t2":"'When does your contract come up? [Get the date] Perfect. I'll put a reminder and reach back out then. not to sell anything, just to see how it's going. Fair enough?'"},{"id":"obj-timing","cat":"objections","type":"objection","name":"Not a Good Time","tag":"TIMING","what":"Could be real (genuine chaos) or reflexive. Distinguish between 'bad week' and 'bad year'. one is a reschedule, the other is a disqualifier.","color":"#e11d48","t1":"'No worries at all. what would be a better time? [Get a specific date] I'll follow up then. And just so I make it worth it when we connect. is timing the issue, or is there something about what I said that didn't resonate?'","t2":"[Voss label] 'It sounds like things are pretty full right now.' [Let them respond. they'll either confirm it's a reschedule or reveal the real objection]"},{"id":"obj-budget","cat":"objections","type":"objection","name":"No Budget","tag":"RESOURCE","what":"Budget either doesn't exist yet, was cut, or you haven't built a compelling enough business case to create it. Rarely a permanent blocker.","color":"#e11d48","t1":"'Totally understand. most of the best projects we've run started that way. Can I ask: is there no budget because this hasn't been prioritized, or because no one's built the business case yet? [Listen] If it's the latter, that's something I can help with. our customers typically see $10 back for every $1 in. Would it be worth 20 minutes to see what that math looks like for your plant?'","t2":"'Makes sense. When does your budget cycle reset? [Listen] And hypothetically. if the ROI was undeniable, is there a path to find budget this year, or would this be a next-fiscal conversation?'"},{"id":"obj-notlooking","cat":"objections","type":"objection","name":"Not Looking at Vendors","tag":"TIMING","what":"They're not in active buying mode. This doesn't mean the pain doesn't exist. it means the urgency hasn't surfaced yet.","color":"#e11d48","t1":"'That's fine. we're not asking you to buy anything. The reason I reached out is that most plants we work with weren't looking either until something forced the issue. I'm curious: what's the one thing on your floor that if you fixed it, would change your results the most?'","t2":"[Challenger] 'Honestly, the best conversations we have are with people who aren't looking yet. because we can talk about the problem without a sales agenda. What's the thing keeping you up at night operationally?'"},{"id":"obj-statusquo","cat":"objections","type":"objection","name":"Happy With Status Quo","tag":"COMPLACENCY","what":"The most dangerous objection. They're not feeling enough pain to move. Your job is to surface pain they haven't named yet, or quantify the cost of staying put.","color":"#e11d48","t1":"[Challenger] 'That's actually where most of our best customers were 12 months before we talked to them. Then an audit, a product recall, or a quality escape made the cost of staying put undeniable. What would an event like that mean for your business?'","t2":"'Great. what's working? [Listen] And where do you still feel friction? [Listen for: paper, manual reporting, rework, inspection bottlenecks] Those are usually the gaps. We're not here to replace what's working. just to close what isn't.'"},{"id":"obj-sap","cat":"objections","type":"objection","name":"We Use SAP / Siemens / Incumbent","tag":"COMPETITIVE","what":"They're loyal to or locked into a major vendor. They may not realize their inc
