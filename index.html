<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<title>VANTAGE — Cold Call Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F8FA; --panel:#FFFFFF; --panel2:#F1F4F7; --ink:#0E1116; --ink2:#3D4450; --dim:#8A93A2;
  --line:#E3E7ED; --hair:#EDF0F4;
  --sig:#2563EB; --sigbg:#EAF0FE;
  --steel:#475569; --steelbg:#EEF2F7;
  --go:#0E9F6E; --gobg:#E6F6EF;
  --amber:#D97706; --amberbg:#FBF1DF;
  --alarm:#DC2626; --alarmbg:#FBEAEA;
  --violet:#7C3AED; --violetbg:#F1EAFB;
  --disp:'Inter',sans-serif; --body:'Inter',sans-serif; --mono:'IBM Plex Mono',monospace;
  --shadow:0 10px 28px rgba(14,17,22,.10);
  --shadow-sm:0 2px 8px rgba(14,17,22,.07);
}
[data-mode="dial"]{
  --bg:#0B1220; --panel:#111A2B; --panel2:#17233A; --ink:#F4F7FB; --ink2:#C4CDDC; --dim:#6E7C93;
  --line:#243352; --hair:#1B2740;
  --sigbg:#152B5E; --steelbg:#1A2740; --gobg:#0D2E22; --amberbg:#33260F; --alarmbg:#3A1618; --violetbg:#271744;
  --shadow:0 12px 30px rgba(0,0,0,.5); --shadow-sm:0 2px 8px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:14px;overflow:hidden;-webkit-font-smoothing:antialiased}
::selection{background:var(--sig);color:#fff}
button{font-family:inherit;color:inherit}
input,textarea,select{font-family:var(--mono);font-size:12px;color:var(--ink);background:var(--panel);border:1px solid var(--line);padding:8px 10px;outline:none;border-radius:8px}
input:focus,textarea:focus,select:focus{box-shadow:var(--shadow-sm);border-color:var(--sig)}
input::placeholder,textarea::placeholder{color:var(--dim)}
textarea{resize:vertical;line-height:1.6}
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:var(--hair);border:2px solid var(--bg)}
*::-webkit-scrollbar-thumb:hover{background:var(--dim)}
*:focus-visible{outline:2px solid var(--sig);outline-offset:2px}

/* ---- primitives ---- */
.blk{background:var(--panel);border:2px solid var(--line);box-shadow:var(--shadow)}
.blk-flat{background:var(--panel);border:2px solid var(--line)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;color:var(--ink);background:var(--panel);border:2px solid var(--line);box-shadow:var(--shadow-sm);padding:8px 14px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:transform .06s,box-shadow .06s;user-select:none;white-space:nowrap}
.btn:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--ink)}
.btn:active{transform:translate(2px,2px);box-shadow:0 0 0 var(--ink)}
.btn.primary{background:var(--sig);color:#fff;border-color:var(--ink)}
.btn.go{background:var(--go);color:#fff}
.btn.steel{background:var(--steel);color:#fff}
.btn.alarm{background:var(--alarm);color:#fff}
.btn.ghost{box-shadow:none;border-color:var(--hair)}
.btn.ghost:hover{border-color:var(--line);box-shadow:var(--shadow-sm)}
.btn.big{padding:14px 22px;font-size:14px}
.btn.sm{padding:4px 9px;font-size:9px;box-shadow:none}
.btn.sm:hover{box-shadow:2px 2px 0 var(--ink)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.stamp{display:inline-block;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border:1.5px solid currentColor}
.eyebrow{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
.disp{font-family:var(--disp);font-weight:850;letter-spacing:-.01em;text-transform:uppercase}
.mono{font-family:var(--mono)}
.dim{color:var(--dim)} .ink2{color:var(--ink2)}
.row{display:flex;align-items:center;gap:10px}
.grow{flex:1;min-width:0}
.hr{border:none;border-top:2px solid var(--hair);margin:12px 0}
.copy-flash{animation:flash .5s}
@keyframes flash{0%{background:var(--gobg)}100%{}}
@keyframes slideup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.94);opacity:0}100%{transform:scale(1);opacity:1}}
.anim-up{animation:slideup .22s ease both}
.anim-pop{animation:pop .16s ease both}
/* ---- command palette ---- */
.cp-overlay{position:fixed;inset:0;background:rgba(20,20,18,.45);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding-top:11vh}
.cp-box{width:min(660px,92vw);background:var(--panel);border:2px solid var(--line);box-shadow:6px 6px 0 rgba(0,0,0,.22)}
.cp-inputrow{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:2px solid var(--line)}
.cp-input{flex:1;border:none!important;background:transparent!important;font-size:14px;padding:0!important;outline:none!important;box-shadow:none!important}
.cp-kbd{font-family:var(--mono);font-size:8px;font-weight:700;border:1.5px solid var(--hair);padding:2px 5px;color:var(--dim)}
.cp-results{max-height:52vh;overflow-y:auto}
.cp-item{display:flex;align-items:baseline;gap:10px;padding:9px 14px;border-bottom:1px solid var(--hair);cursor:pointer}
.cp-item.hi{background:var(--sigbg);box-shadow:inset 3px 0 0 var(--sig)}
.cp-type{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.08em;width:70px;flex-shrink:0}
.cp-label{font-size:13px;font-weight:700}
.cp-sub{font-family:var(--mono);font-size:9.5px;color:var(--dim);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cp-go{font-family:var(--mono);font-size:10px;color:var(--dim)}
.cp-foot{padding:7px 14px;border-top:2px solid var(--line);font-family:var(--mono);font-size:8.5px;color:var(--dim);letter-spacing:.04em}
/* ---- rail groups ---- */
.rail-grp{font-family:var(--mono);font-size:7px;font-weight:700;letter-spacing:.16em;color:var(--dim);text-align:center;padding:7px 0 3px;background:var(--panel2);border-bottom:1px solid var(--hair)}
.rail-search{border-bottom:2px solid var(--line)!important;color:var(--ink)}
.rail-search .ri{color:var(--sig)}
/* ---- tulip product theme ---- */
.blk,.blk-flat,.modal,.cp-box,.list-item{border-radius:10px}
.blk,.blk-flat{border-width:1px}
.modal,.cp-box{border-width:1px}
.btn{border-radius:8px;border-width:1.5px}
.cp-inputrow{border-bottom-width:1px}
.cp-foot{border-top-width:1px}
input:focus,textarea:focus,select:focus{border-color:var(--sig);box-shadow:0 0 0 3px var(--sigbg)}
.rail{width:84px}
.rail-btn{border-radius:8px;margin:2px 6px;border-bottom:none;padding:8px 2px 7px}
.rail-btn.on{background:var(--sigbg);color:var(--sig)}
.rail-grp{background:transparent;border-bottom:none;text-align:left;padding:10px 12px 3px}
@media(max-width:820px){
  .g3,.g4{grid-template-columns:1fr 1fr}
  .lc-wrap{flex-direction:column!important;height:auto!important;overflow:visible!important}
  .lc-left{width:100%!important;min-width:0!important;border-right:none!important;border-bottom:2px solid var(--line)!important;max-height:none!important}
  .split{flex-direction:column;height:auto;overflow:visible}
  .split-list{width:100%;max-height:40vh}
  input,textarea,select{font-size:16px}
}
@media(max-width:640px){
  .g2,.g3,.g4{grid-template-columns:1fr}
  .andon{overflow-x:auto}
  .stage{padding:12px 10px 60px}
}
@media(max-width:820px){
  /* app shell: real viewport, one scroller, rail pinned in the thumb zone */
  #app{height:100dvh}
  .main{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .rail{order:2;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
  .andon{position:sticky;top:0;z-index:40}
  /* fixed-height screens unwind into the one scroller */
  .vh-page{height:auto!important;min-height:0}
  /* touch targets: Apple HIG 44pt floor, Material 48dp, primary 56 */
  .btn{min-height:44px}
  .btn.big{min-height:56px}
  .disp-btn{min-height:52px}
  .rail-btn{min-height:52px}
  .rail-btn .rl{font-size:8.5px}
  /* DIAL is the headline act on a phone */
  .rail-btn[data-m="dial"]{background:var(--sigbg);color:var(--sig)}
  .rail-btn[data-m="dial"] .ri{font-size:19px}
}
.more-sheet{position:fixed;inset:0;background:rgba(12,17,27,.55);z-index:200;display:flex;align-items:flex-end}
.more-grid{background:var(--panel);border-top:2px solid var(--line);width:100%;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px 14px calc(18px + env(safe-area-inset-bottom));max-height:70dvh;overflow-y:auto}
.more-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 6px;min-height:64px;border:1.5px solid var(--line);border-radius:10px;background:var(--panel2);color:var(--ink);font-family:inherit;font-size:10px;font-weight:700;letter-spacing:.04em;cursor:pointer}
.more-btn .mi{font-size:20px}
.more-btn.on{border-color:var(--sig);color:var(--sig);background:var(--sigbg)}
.rail-more{display:none}
@media(max-width:820px){
  .rail{overflow-x:visible;justify-content:space-around;align-items:stretch}
  .rail-btn{display:none;margin:2px 2px}
  .rail-btn[data-m="board"],.rail-btn[data-m="dial"],.rail-btn[data-m="targets"],.rail-btn[data-m="stats"],.rail-more{display:flex;flex:1;flex-direction:column;align-items:center;justify-content:center;gap:2px}
  .rail-grp,.rail-foot,.rail-logo{display:none}
  .andon{height:auto;min-height:56px;flex-wrap:wrap}
}
@media(max-width:820px){
  /* bottom bar: six fixed slots, search included per thumb-zone research, zero scroll possible */
  .rail{flex-wrap:nowrap;overflow:hidden;justify-content:space-between;padding-left:2px;padding-right:2px}
  .rail-btn[data-m="board"],.rail-btn[data-m="dial"],.rail-btn[data-m="targets"],.rail-btn[data-m="stats"],.rail-more,.rail-search{display:flex;flex:1 1 0;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-width:0!important;margin:2px 1px;padding:7px 0 6px}
  .rail-btn .rl{font-size:8px;letter-spacing:.02em}
  /* top bar: wraps compactly, never side-scrolls */
  .andon{height:auto;min-height:0;flex-wrap:wrap;overflow-x:visible;padding:3px 4px}
  .andon-cell{min-width:0!important;flex:1 1 auto;padding:3px 7px}
  .andon-cell .av{font-size:15px}
  /* every row breathes down, not sideways */
  .row{flex-wrap:wrap}
  /* overlays and tables fit the hand */
  .modal{width:94vw;max-height:88dvh}
  table{display:block;overflow-x:auto;max-width:100%}
  h1{font-size:20px}
}
@media(max-width:820px){
  .rail{display:flex;flex-wrap:nowrap;overflow:hidden;align-items:stretch;gap:0;padding:0;padding-bottom:env(safe-area-inset-bottom)}
  .rail-btn[data-m="board"],.rail-btn[data-m="dial"],.rail-btn[data-m="targets"],.rail-btn[data-m="stats"],.rail-more,.rail-search{display:flex;flex:1 1 0%;width:0;min-width:0!important;max-width:none;flex-direction:column;align-items:center;justify-content:center;gap:1px;margin:0;padding:8px 1px 7px;border:none;border-radius:0;overflow:hidden;white-space:nowrap}
  .rail-btn .rl,.rail-search .rl{font-size:7.5px;letter-spacing:0;max-width:100%;overflow:hidden;text-overflow:ellipsis}
  .rail-btn .ri,.rail-search .ri{font-size:16px;line-height:1}
  .rail-btn[data-m="dial"] .ri{font-size:18px}
  .rail-btn.on,.rail-btn[data-m="dial"]{border-radius:8px}
}
@media(max-width:820px){
  /* slim top: five stats one dense row, window + hubs share a slim second row */
  .andon{padding:2px 3px;gap:1px}
  .andon>.andon-cell:nth-child(-n+5){flex:1 1 0;min-width:0!important;padding:2px 3px}
  .andon>.andon-cell:nth-child(n+6){flex:1 1 46%;min-width:0!important;padding:2px 5px}
  .andon .al{font-size:6.5px}
  .andon .av{font-size:13px}
  .andon button,.andon .btn{min-height:26px!important;padding:3px 6px!important;font-size:8.5px!important}
  /* the clock loses its penthouse on phones */
  .lc-wrap .bigstat{font-size:36px!important}
  .call-top{padding:8px 10px!important}
  .call-top .btn.big{margin-top:8px!important;width:100%!important}
}
@media(max-width:820px){
  /* messages: template list stacks above the editor */
  .msg-split{grid-template-columns:1fr!important}
  /* modals can no longer smuggle inline widths past the cap */
  .modal{width:min(94vw,640px)!important;max-width:94vw!important}
  /* structural guarantee: no page scrolls sideways, ever; contained scrollers still work */
  .main{overflow-x:hidden}
  .stage a,.blk a{overflow-wrap:anywhere}
}
@media(max-width:820px){
  /* canonical app shell: fixed slim header, fixed bottom tabs on the visual viewport, document scroll between */
  #app{display:block;height:auto;min-height:100vh;min-height:100dvh}
  .main{display:block;min-width:0;overflow:visible;overflow-x:hidden;padding-top:44px;padding-bottom:calc(62px + env(safe-area-inset-bottom))}
  .andon{position:fixed;top:0;left:0;right:0;z-index:110;height:40px;min-height:40px;max-height:40px;flex-wrap:nowrap;overflow:hidden;padding:0 2px;gap:0}
  .andon>.andon-cell{flex:1 1 0;min-width:0!important;padding:2px 2px;border:none}
  .andon>.andon-cell:nth-child(n+6),.andon-clock{display:none}
  .andon .al{font-size:6px}
  .andon .av{font-size:14px}
  .rail{position:fixed;bottom:0;left:0;right:0;top:auto;z-index:120;width:100%;height:auto;flex-direction:row;flex-wrap:nowrap;overflow:hidden;border-top:2px solid var(--line);border-bottom:none;border-right:none;background:var(--panel);margin:0;padding:0;padding-bottom:env(safe-area-inset-bottom)}
  .rail-logo,.rail-grp,.rail-foot,.rail-search{display:none!important}
  .rail-btn{display:none}
  .rail-btn[data-m="board"],.rail-btn[data-m="dial"],.rail-btn[data-m="targets"],.rail-btn[data-m="stats"],.rail-more{display:flex;flex:1 1 0%;width:0;min-width:0!important;margin:0;padding:8px 0 7px;flex-direction:column;align-items:center;justify-content:center;gap:1px;border:none;border-radius:0;overflow:hidden;white-space:nowrap}
  .rail-btn .rl{font-size:7.5px;letter-spacing:0}
  .rail-btn .ri{font-size:16px;line-height:1}
  .rail-btn[data-m="dial"]{background:var(--sigbg);color:var(--sig)}
  .rail-btn[data-m="dial"] .ri{font-size:18px}
  .more-hub{grid-column:1/-1;display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:2px 2px 10px;border-bottom:1px solid var(--hair);margin-bottom:2px}
}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

/* ---- layout ---- */
#app{display:flex;height:100%;width:100%}
.rail{width:78px;flex-shrink:0;background:var(--panel);border-right:2px solid var(--line);display:flex;flex-direction:column;align-items:stretch;z-index:30;overflow-y:auto}
.rail-logo{height:56px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--hair);background:var(--panel);color:var(--ink)}
[data-mode="dial"] .rail-logo{background:transparent;color:var(--ink)}
.rail-btn{position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 2px 7px;background:transparent;border:none;border-bottom:1px solid var(--hair);cursor:pointer;color:var(--dim)}
.rail-btn .ri{font-size:17px;line-height:1}
.rail-btn .rl{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.08em}
.rail-btn:hover{color:var(--ink);background:var(--panel2)}
.rail-btn.on{color:var(--ink);background:var(--bg)}
.rail-btn.on::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--sig)}
.rail-foot{margin-top:auto;border-top:2px solid var(--line);padding:8px 6px;text-align:center}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.andon{height:56px;flex-shrink:0;background:var(--ink);color:#F2F4F0;border-bottom:2px solid var(--line);display:flex;align-items:stretch;overflow-x:auto}
[data-mode="dial"] .andon{background:#000}
.andon-cell{display:flex;flex-direction:column;justify-content:center;padding:0 16px;border-right:1px solid #333;min-width:86px}
.andon-cell .al{font-family:var(--mono);font-size:8px;letter-spacing:.14em;color:#8A9099;text-transform:uppercase}
.andon-cell .av{font-family:var(--disp);font-weight:900;font-size:22px;line-height:1.1;font-variant-numeric:tabular-nums}
.andon-clock{margin-left:auto;display:flex;align-items:center;gap:12px;padding:0 16px}
.stage{flex:1;overflow-y:auto;padding:20px 24px 60px;position:relative}
.pagehead{display:flex;align-items:baseline;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.pagehead h1{font-family:var(--disp);font-weight:900;font-size:30px;letter-spacing:-.01em;text-transform:uppercase}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.split{display:flex;gap:0;height:calc(100vh - 58px);overflow:hidden}
.split-list{width:300px;flex-shrink:0;border-right:2px solid var(--line);background:var(--panel);display:flex;flex-direction:column;overflow:hidden}
.split-body{flex:1;overflow-y:auto;padding:18px 22px 60px;min-width:0}
.list-item{padding:10px 12px;border-bottom:1px solid var(--hair);cursor:pointer;border-left:4px solid transparent}
.list-item:hover{background:var(--panel2)}
.list-item.on{background:var(--bg);border-left-color:var(--sig)}
.qcard{border:2px solid var(--line);background:var(--panel);padding:12px 14px;position:relative}
.qcard .qtag{position:absolute;top:-2px;right:-2px;font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.1em;padding:2px 7px;background:var(--ink);color:var(--bg)}
.copybit{cursor:pointer;border:1.5px dashed var(--hair);padding:9px 11px;transition:border-color .1s;position:relative}
.copybit:hover{border-color:var(--sig)}
.copybit::after{content:"COPY";position:absolute;top:4px;right:6px;font-family:var(--mono);font-size:8px;font-weight:700;color:var(--dim);opacity:0;letter-spacing:.1em}
.copybit:hover::after{opacity:1;color:var(--sig)}
.tabbar{display:flex;gap:0;border:2px solid var(--line);width:max-content;max-width:100%;overflow-x:auto;background:var(--panel)}
.tabbar button{padding:7px 14px;border:none;border-right:2px solid var(--line);background:transparent;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;color:var(--dim);white-space:nowrap}
.tabbar button:last-child{border-right:none}
.tabbar button.on{background:var(--ink);color:var(--bg)}
.modal-veil{position:fixed;inset:0;background:rgba(15,18,22,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--panel);border:2px solid var(--line);box-shadow:6px 6px 0 var(--ink);max-width:640px;width:100%;max-height:86vh;overflow-y:auto;padding:20px}
.kbd{font-family:var(--mono);font-size:9px;border:1.5px solid var(--hair);padding:1px 5px;color:var(--dim)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);font-family:var(--mono);font-size:11px;font-weight:700;padding:9px 18px;z-index:200;box-shadow:var(--shadow);animation:slideup .2s ease}
.bigstat{font-family:var(--disp);font-weight:900;font-variant-numeric:tabular-nums;line-height:1}
.bar{height:14px;background:var(--panel2);border:1.5px solid var(--line);position:relative;overflow:hidden}
.bar>i{position:absolute;left:0;top:0;bottom:0;background:var(--sig)}
.disp-btn{border:2px solid var(--line);background:var(--panel);box-shadow:var(--shadow-sm);padding:13px 8px;font-family:var(--mono);font-weight:700;font-size:11px;letter-spacing:.06em;cursor:pointer;text-align:center;text-transform:uppercase;transition:transform .05s}
.disp-btn:hover{transform:translate(-1px,-1px)}
.disp-btn:active{transform:translate(2px,2px);box-shadow:none}
.chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;font-weight:600;padding:3px 8px;border:1.5px solid var(--hair);background:var(--panel);cursor:pointer;letter-spacing:.04em}
.chip.on{border-color:var(--line);background:var(--ink);color:var(--bg)}
@media(max-width:820px){
  #app{flex-direction:column}
  .rail{width:100%;height:auto;flex-direction:row;border-right:none;border-bottom:2px solid var(--line);overflow-x:auto;order:2;border-top:2px solid var(--line)}
  .rail-logo{height:auto;width:54px;flex-shrink:0;font-size:16px;border-bottom:none;border-right:2px solid var(--line)}

ren't"],"pitch":"The strategy isn't the problem. The problem is there's no execution layer between the roadmap and the floor, so initiatives take months to land, land unevenly, and you can't see which sites are executing. What changes: a strategic decision becomes a running floor workflow in weeks, every site executes the same standard, and you get one live picture of who's on plan. AstraZeneca standardized across 24 global sites this way, and when they acquire a facility, alignment takes months, not years. Companies don't transform when the program ends. They transform when the floor behaves differently. Want to pick one initiative and make it real in 90 days?","qs":["When you set a strategic ops initiative. say, improving yield or standardizing a process across sites. how long does it typically take to see it actually running on the floor?","If someone asked you today whether your digital transformation has actually changed how the floor operates. what would you say?","How do you currently get a consistent picture of operational performance across all your facilities to inform strategic decisions?","If you acquired a new facility tomorrow, how would you get their ops aligned with your standard, and how long would that take?","What's the biggest gap between your current ops technology footprint and where you need to be in three years?"],"warn":"They think in roadmaps and transformation arcs, not features. The key insight from the best strategy conversations is Winter's test: 'If your tech disappeared tomorrow, would anything change?' If the answer is 'not much,' that's Tulip's opening. Position Tulip as the execution layer that finally makes the strategy visible on the floor. Never pitch bottom-up.","thread":"'Who owns ops day to day? Who controls the technology budget?' → CEO + VP Ops + CIO + CFO.","vm":"Hey [Name], Chris from Tulip. Strategy leaders tell me the roadmap always stalls in the same place: the floor. AstraZeneca closed that gap across 24 global sites, ig chaos, and the feedback loop back to your team is a customer complaint. What changes: a spec change hits every operator screen the moment it's released, each configuration carries its own guided instructions, and yields, defects, and cycle time by configuration flow back to product in real time. DMG MORI closed exactly this loop. Your product decisions start running on production data instead of anecdotes. What was the most expensive intent-versus-reality gap you've eaten in the last year?","qs":["When you change a product spec or configuration, what's the actual path that change takes before an operator on the floor is executing the new version?","How do you find out when a product change is causing production issues. is it real-time, end-of-shift, or after a customer complaint?","How many active product configurations or SKUs are running on the floor at any given time, and how do you ensure each one gets the right instructions?","When a product defect traces back to a floor execution issue. wrong assembly, missed step, stale revision. how long does that root cause analysis typically take?","What's the most expensive gap you've seen between what product intended and what manufacturing delivered?"],"warn":"This persona sits at the intersection of product and ops. they care about speed of change, quality of execution, and the feedback loop back to product decisions. Don't pitch it as a shop floor tool. Pitch it as the connective tissue between product strategy and production reality.","thread":"'Who owns engineering changes and BOMs? Who runs production execution day to day?' → Mfg Engineer + Quality Dir + Heads of Product + VP Ops.","vm":"Hey [Name], Chris from Tulip. Product leaders tell me the worst part is learning how a product builds from a complaint, months late. DMG MORI wired production data straight back to their product team and killed that lag. Worth 20 minutes. I'll email you. Chris, Tulip, [number]."},{"title":"End User","c":"#059669","openers":["Hey [Name], Chris from Tulip. Reason for the call: plant managers tell me they run the day on a morning report and a walk of the floor, and problems get an hour-long head start every time. How do you find out something's gone wrong today: the system, or your legs?","Hey [Name], Chris at Tulip. A plant manager running paper the way most floors do went to double the production and 60% less rework in four years, without touching the ERP. What's the thing on your floor right now that paper is quietly costing you?","Hey [Name], Chris from Tulip. Quick one: when your best operator is out sick, how much does output drop? If the answer is 'a lot,' the process lives in people's heads instead of at the station, and that's exactly what we fix. Worth 60 seconds?"],"cares":["Daily targets & yield","Reducing downtime & rework","Operator efficiency","Floor running smoothly"],"pains":["Firefighting all day. Avg OEE: 60% (world-class 85%). Reshoring creating new capacity pressure","Paper tracking. no visibility","Slow ramp ($1.2-4K/operator, 28% turnover). McKinsey: smart factory = +30% productivity","Rigid legacy MES"],"pitch":"The day runs you instead of the other way around: paper tracking, problems surfacing late, new hires taking weeks to ramp because the process lives in veterans' heads. What changes: every station shows live status so you stop managing by walking, work instructions guide every operator the same way so the new hire builds like the veteran, and problems flag themselves while there's still time to act. TICO went from paper to 2x production and 60% less rework. One line live in 90 days, no IT project, your people run it. Which line hurts most right now?","qs":["How do you track production status across the floor right now. whiteboard, spreadsheet, or a system?","When something breaks down or goes off plan, how long before you know about it?","How long does it take to onboard a new operator to the point where they're fully productive?","If you could eliminate one thing that pulls you into firefighting instead of improvement work, what would it be?","When your best operator is out sick, how much does output or quality drop, and why?"],"warn":"Practical, not strategic. Don't say 'digital transformation.' Say 'solve today's problems.'","thread":"'Who are your best engineers that would build with this?' → finds your champion.","vm":"Hey [Name], Chris from Tulip. Plant managers tell me running the floor without a live picture is flying blind, and the morning report is always too late. One plant went from paper to double the output and 60% less rework. Worth a 20-minute call. I'll email you. Chris, Tulip, [number]."},{"title":"Operations Manager","c":"#059669","openers":["Hey [Name], Chris from Tulip. Reason for my call: operations managers tell me the worst part of the job is learning about a floor problem after it's already cost an hour of production. When a line starts drifting, how do you find out, and how fast?","Hey [Name], Chris at Tulip. An ops manager with the same morning-report-and-walkabout routine cut unplanned downtime 40% in 90 days, mostly by seeing problems while they were still small. What time of day do you get your first real picture of the floor?","Hey [Name], Chris from Tulip. Quick one: what got lost in last night's shift handoff? If the honest answer is 'no idea,' that's the leak. We make handoff a structured record instead of a hallway conversation. Worth a quick call?"],"cares":["Daily throughput targets and OEE across all lines","Real-time visibility without walking the floor","Reducing unplanned downtime and firefighting","Consistent shift-to-shift handoffs and operator execution","Getting ahead of problems before they miss a target"],"pains":["No real-time picture of what's happening on the floor. relies on morning reports and walkabouts","Supervisors manage by walking around, not by data","Shift handoffs are verbal or paper. context gets lost overnight","Problems get escalated after the fact, not while there's still time to fix them","Can't identify which line, shift, or operator is driving the most variance"],"pitch":"Your day is shaped by lag: problems escalate after the fact, handoffs lose context overnight, and you can't see which line, shift, or operator drives the variance. What changes: every line's status is live without walking, drift triggers an escalation while there's still time to fix it, and shift handoff becomes a searchable digital record instead of a verbal download. One operation cut unplanned downtime 40% in the first 90 days. This is the 7am picture you wish you had, on one line first, expanded by your own team. Where does most of your firefighting start: quality, downtime, or throughput?","qs":["How do you get your first real picture of how the day is going on the floor. what time, and from what source?","When a line goes down or starts drifting, how quickly do you know about it, and how do you find out?","How do you currently hand off context between shifts. paper, verbal, a system?","Where does most of your firefighting come from. quality, downtime, or throughput shortfalls?","If you had real-time visibility into every line right now, what's the first thing you'd fix?"],"warn":"They are practical and time-pressured. every conversation competes with something on fire. Lead with speed of problem detection and shift visibility. Keep it concrete: cycle time, downtime, shift handoff. Don't sell platform, sell the 7am dashboard they wish they had.","thread":"'Who's above you on ops decisions? Who runs quality?' → Plant Mgr + Dir of Mfg + VP Ops.","vm":"Hey [Name], Chris from Tulip. Ops managers tell me the job is firefighting problems that started hours ago. One team got a live picture of every line and cut unplanned downtime 40% in 90 days. Worth 20 minutes. I'll email you. Chris, Tulip, [number]."},{"title":"Production Supervisor","c":"#059669","openers":["Hey [Name], Chris from Tulip. Reason for the call: supervisors tell me the worst feeling is ocess at every station. is it verified, trusted, or somewhere in between?","What happens when a new hire is on a station. do they have the same process guidance as a 10-year veteran?","When your shift ends, how do you hand off context to the next supervisor. what format, what gets lost?","Where do most of your defects originate. which station, which shift, which type of error?","If an operator makes a mistake on a step right now, how quickly do you find out about it?"],"warn":"This is a floor-level conversation. keep it practical. They respond to specific station problems, not strategic outcomes. Lead with operator consistency and shift handoff. Multi-thread up to End User quickly. supervisors are great internal champions but rarely sign anything.","thread":"'Who's your End User? Who makes decisions on floor tools?' → Plant Mgr + Operations Mgr + Dir of Mfg.","vm":"Hey [Name], Chris from Tulip. Supervisors tell me the worst call is the one about a defect that started two shifts ago. Guided checkpoints at every station caught those at the source for one team: 70% fewer defects. Worth 20 minutes. I'll email you. Chris, Tulip, [number]."},{"title":"Technical Buyer","c":"#7c3aed","openers":["Hey [Name], Chris from Tulip. Reason for my call: quality directors tell me their biggest exposure is defects that travel three stations before anyone notices. Where do your escapes actually get caught today: at the station, end of line, or the customer?","Hey [Name], Chris at Tulip. Honest question: if an auditor walked in right now and asked for full traceability on one lot, how long would that take? If the answer isn't minutes, that gap is the risk, and it's exactly what we close. Worth a minute?","Hey [Name], Chris from Tulip. A med device quality team cut defects 70% without adding an inspector. They put a mandatory quality gate at every station so nothing travels. What did your last quality escape cost, all in: containment, rework, and the customer conversation?"],"cares":["FPY & defect rates","Audit readiness","CAPA management","Regulatory compliance"],"pains":["Paper records = audit nightmare","Quality escapes reaching customers","Slow root cause analysis","Manual inspection doesn't scale"],"pitch":"The pattern that keeps quality directors up at night: defects caught downstream, root cause built from paper, audits that turn into archaeology. What changes: every station has a mandatory quality checkpoint so defects get caught at the point of occurrence, every record is created at the point of work so traceability is a search instead of a hunt, and root cause starts with data instead of interviews. A med device manufacturer cut defects 70% this way. Your CAPA cycle shortens because the evidence already exists. What was your last escape's true cost, end to end?","qs":["Are your batch records and work instructions on paper or fully digital?","If an auditor walked in right now, how long to pull full traceability on a specific lot or serial number?","What does one quality escape cost you. from detection through containment to the customer?","How long does a typical root cause analysis take from trigger to closed CAPA?","Where does your inspection process rely most on operator memory or judgment rather than a guided system?"],"warn":"Use their acronyms: CAPA, NCR, DHR, eBR, FPY. They respect depth.","thread":"'Does IT support quality systems or separate?' → bridges to IT.","vm":"Hey [Name], Chris from Tulip. Quality directors tell me their real exposure is the defect that travels before anyone catches it. A med device team put a checkpoint at every station and cut defects 70%. Worth 20 minutes. I'll email you. Chris, Tulip, [number]."},{"title":"Mfg Engineer","c":"#ea580c","openers":["Hey [Name], Chris from Tulip. Reason for the call: manufacturing engineers tell me their best ideas die in the IT queue. When you have a process improvement ready, what's the realistic path to it actually running on the floor, and how long?","Hey [Name], Chris a ter they start, and every launch reinvents the process because lessons live in people's heads. What changes: revisions land on operator screens instantly, yield and defects are visible by station from unit one, and your NPI playbook becomes a deployable standard you run at every site. DMG MORI compressed their NPI cycle exactly this way. Your next launch inherits everything the last one learned. What's the launch date we'd be working against?","qs":["Walk me through your NPI process from first article to volume production. where do most of the delays happen?","When an engineering change comes through during ramp, how does that reach the operators on the floor, and how quickly?","How do you capture and track defects and yield during the introduction phase. is that real time or end of day?","How consistent is your ramp execution across different facilities. same NPI playbook everywhere, or does each site do it differently?","What happens to the lessons learned from each launch. are they systematically captured and used on the next one?"],"warn":"NPI managers are deadline-focused and stressed. every conversation is against the backdrop of a launch date. Lead with ramp speed and revision propagation during introduction. DMG MORI is your strongest anchor. Make the path to a 90-day deploy feel fast and low-risk.","thread":"'Who owns production execution during ramp? Who controls the NPI budget?' → Mfg Engineer + Heads of Product + Dir of Mfg + Quality Dir.","vm":"Hey [Name], Chris from Tulip. NPI managers tell me the first weeks in production are where launches quietly go over. One team made revisions land instantly and saw yield by station from day one. DMG MORI runs it. Worth 20 minutes. I'll email you. Chris, Tulip, [number]."},{"title":"Industrial Engineer","c":"#d97706","openers":["Hey [Name], Chris from Tulip. Reason for the call: IEs tell me their time studies are out of date the day they're published, and the line imbalance they find in Q3 has been costing through eted. only discover the miss after the fact"],"pitch":"You manage risk, and the risk is the record: paper that can't survive scrutiny without reconstruction, signatures that don't satisfy reviewers, gaps that surface when someone official is already asking. What changes: every step produces a tamper-evident, e-signed record at the point of work, traceability from receiving to ship is a search, and CAPA closes faster because the evidence already exists in structure. The audit answer stops being a project and starts being a query. What would a genuinely clean audit be worth to your year?","qs":["When an FDA or DCMA auditor asks for proof that a specific procedure was followed on a specific lot, what does that retrieval process look like?","How are electronic signatures managed in your current process. are they compliant with 21 CFR Part 11 or AS9100 requirements?","Where are your biggest traceability gaps right now. incoming material, in-process, or final inspection?","How long does a typical CAPA take from opening to verified closure, and what slows that down most?","If you had a quality escape today, how quickly could you pull the full inspection and traceability record for the affected units?"],"warn":"Lead with compliance and audit readiness. not software. They are risk managers first. One FDA warning letter or DCMA finding is worth more pain than any feature list. Know their regulatory environment before you call.","thread":"'Who owns quality engineering below you? Who has budget authority for quality systems?' → Quality Engineer + Quality Dir + VP Ops.","vm":"Hey [Name], Chris from Tulip. QA leaders tell me the worst audit moment is hunting binders to prove a procedure was followed. One team made every step create its own signed record automatically. Audit prep became a search. Worth 20 minutes. I'll email you. Chris, Tulip, [number]."},{"title":"Continuous Improvement Mgr","c":"#ea580c","openers":["Hey [Name], Chris from Tulip. Reason for my call: CI managers tell me their kaizens revert within weeks because the new standard lives on paper and the floor votes with its habits. How do your improvements actually get sustained after the event closes?","Hey [Name], Chris at Tulip. A CI team went from idea to floor insight in four weeks, no IT, no code, and the improvement stuck because the new standard became the only way to run the station. How long does your average improvement survive right now?","Hey [Name], Chris from Tulip. Quick one: when you need baseline data before a kaizen, where does it come from and how long does collection take? If the answer is 'manual and weeks,' that's half your cycle time gone before you start. That's what we fix. Worth 30 seconds?"],"cares":["Cycle time reduction","Waste elimination (Lean/Six Sigma)","Kaizen velocity","Sustaining improvements over time"],"pains":["Improvement ideas can't get off paper","No data to baseline or measure impact","Legacy MES too rigid. 70% of MES projects exceed timeline and budget","Tribal knowledge lost when operators leave"],"pitch":"The frustrating part of CI isn't finding improvements, it's keeping them: paper standards revert, baselines take weeks to collect, and three months post-close nobody can prove the impact held. What changes: the new standard becomes the way the station runs by default, cycle times and defect codes get captured automatically so the baseline is already there, and impact tracking is a live chart instead of a follow-up study. DMG MORI's team had insights in four weeks building it themselves. Your kaizen velocity roughly doubles when the data collection and the sustainment come free. Which improvement reverted on you most recently?","qs":["How do you baseline a process before a Kaizen event. where does that data come from and how long to collect?","What's the average time from a CI idea to it actually running on the production floor?","How do you sustain standard work after a Kaizen closes. is it paper-based or something else?","When you need floor data to support an improvement case, how easy is it to get?","How do you measure real impact of a CI project. what does that tracking look like three months post-close?"],"warn":"This persona can be your CHAMPION. Lead with speed and autonomy. they hate waiting on IT or vendors.","thread":"'Who approves CI investments? Who runs the floor day to day?' → VP Ops + Plant Mgr.","vm":"Hey [Name], Chris from Tulip. CI leaders tell me the worst part is watching a kaizen revert in a week. One team made the new standard the only way to run the station, and their improvements finally held. Worth a conversation. I'll email you. Chris, Tulip, [number]."},{"title":"Value Stream Manager","c":"#059669","openers":["Hey [Name], Chris from Tulip. Reason for the call: value stream managers tell me the current-state map is already wrong by the time it's drawn, because the data underneath is sampled and stale. How do you collect current-state data today, and how much do you trust it?","Hey [Name], Chris at Tulip. Imagine your VSM was live: actual cycle times, queue times, and WIP in real time instead of observation snapshots. One team ran it and cut lead time 25% in a quarter. Where does WIP pile up invisibly between your stations right now?","Hey [Name], Chris from Tulip. Quick one: after your last future-state rollout, how long did the standard work actually hold? If the floor drifted back, the map was right and the enforcement was missing. That's what we fix. Worth 60 seconds?"],"cares":["End-to-end flow and lead time","Identifying and eliminating waste","Takt time adherence","Future state implementation velocity"],"pains":["VSM based on sampled, stale data","Can't measure improvement impact in real time","Standard work is on paper. not sustained","WIP builds up invisibly between stations"],"pitch":"The lean toolkit works. The data feeding it doesn't: sampled studies, WIP that hides between stations, standard work that drifts the week after rollout. What changes: takt adherence, queue time, and WIP become live numbers at every station, your value stream map becomes a dashboard that's never stale, and the future state gets enforced digitally so it holds. One operation cut lead time 25% in a quarter once they could see flow in real time. Your kaizen targets start coming from data instead of observation days. Where's the biggest invisible queue in your stream?","qs":["How do you collect current-state data for your VSM. is it sampled manually or pulled from a system?","How long after a Kaizen event before you can see measurable improvement in the data?","Where does WIP tend to pile up most invisibly between stations in your value stream?","How do you sustain and enforce standard work after a future-state rollout?","If you could see takt time adherence and WIP in real time across every station, what decision would you make differently?"],"warn":"Use Lean language: takt time, flow, standard work, pull, future state. They will disengage if you sound like a software vendor.","thread":"'Who approves the Kaizen roadmap? Who runs the floor stations?' → VP Ops + Plant Mgr.","vm":"Hey [Name], Chris from Tulip. Value stream managers tell me WIP and takt adherence are impossible to see without living on the floor. One team made the VSM live and cut lead time 25% in a quarter. Worth 20 minutes. I'll send you something. Chris, Tulip, [number]."},{"title":"IT Director / CIO","c":"#0891b2","openers":["Hey [Name], Chris from Tulip. Reason for my call: IT leaders tell me the floor systems eat the most bandwidth for the least strategic return. Babysitting a legacy MES, working a ticket queue that never empties. How much of your team's time goes to floor systems right now?","Hey [Name], Chris at Tulip. The tension I hear everywhere: ops wants to move fast on the floor, you need governance and security, and today someone loses. One company resolved it by letting ops build inside guardrails IT controls, and retired the ticket queue. How is that balance working at [company]?","Hey [Name], Chris from Tulip. Quick one: when ops asks for a floor workflow change, what's the realistic turnaround? If it's weeks and everyone resents it, the model is the problem, not the people. That's what we fix. Worth 60 seconds?"],"cares":["Integration & architecture. composable, not monolithic","Security, compliance, and OT governance","Reducing IT maintenance burden from legacy floor systems","Enabling AI and IoT adoption without creating new technical debt","Resolving the CIO/COO tension. IT control vs. ops velocity"],"pains":["Legacy MES = constant IT babysitting. wrong use of your team's time","Every ops change is an IT ticket. the queue never empties","Expensive on-prem infrastructure that ops doesn't fully use","Fragile custom integrations between floor systems and ERP","AI adoption stalled because floor data is too unreliable to feed ML models"],"pitch":"You're stuck holding two bad options: keep control and be the bottleneck, or hand over the floor and lose governance. What changes: ops builds and changes their own floor workflows, inside role-based guardrails you define, on a platform your team governs but doesn't babysit. No custom dev, no maintenance burden, no integration project for every new use case. Bloom Energy retired a legacy MES across 230 stations on this model. Your team gets out of the ticket business and back to the roadmap, and the floor data gets clean enough to build on. What would you need to see in the governance model to be comfortable with ops building?","qs":["How much of your IT team's bandwidth goes toward maintaining and supporting shop floor systems right now?","When ops needs a change to a floor workflow or app, what does that process look like. internal or vendor queue?","How is the CIO/ops relationship working right now when it comes to AI and floor technology decisions. is there alignment or friction?","What's your current floor data quality like. is it clean enough to feed analytics and AI, or is garbage-in still the problem?","If ops could build their own floor apps without IT involvement, what guardrails would you need to feel comfortable with that?"],"warn":"IT is often the blocker. Show how Tulip REDUCES their burden. no custom dev, no maintenance, no integration projects. They must feel in control of governance while ops moves fast. Winter's insight: AI stalls because data quality and integration are broken, not because models aren't good enough. Tulip fixes the foundation.","thread":"'Who on ops requests changes most?' → finds frustrated floor champion.","vm":"Hey [Name], Chris from Tulip. IT leaders tell me floor systems are the worst use of their team's time: constant maintenance, endless tickets. One company let ops build inside IT-governed guardrails and retired the queue. Worth 20 minutes. I'll email you. Chris, Tulip, [number]."},{"title":"Technical Director","c":"#0284c7","openers":["Hey [Name], Chris from Tulip. Reason for the call: technical directors tell me the hardest problem isn't picking floor technology, it's getting ops, IT, and engineering to live on the same platform without a rip-and-replace. How are you thinking about the gap between your business systems and the floor?","Hey [Name], Chris at Tulip. Every architecture review I hear has the same tension: ops wants flexibility, IT wants control, and the legacy MES gives neither. One team resolved it with a composable layer that connects the ERP, PLM, and SCADA they already run. Where does that tension bite hardest for you?","Hey [Name], Chris from Tulip. Quick one: when a new ops use case shows up, what does your build-versus-buy conversation look like, and how often does 'build' turn into permanent maintenance? That trade is exactly what we change. Worth a peer-level conversation?"],"cares":["System architecture and scalability","Security, compliance, and governance","Vendor roadmap and platform longevity","Reducing technical debt"],"pains":["Legacy MES architecture is brittle and hard to extend","Ops wants flexibility, IT wants control. nobody wins","Vendor lock-in on proprietary platforms","Every integration is a custom project"],"pitch":"The architecture problem: the floor layer is either a rigid monolith nobody can extend or a pile of custom builds your team maintains forever. What changes: a composable layer that connects to the ERP, PLM, and SCADA you already run, where ops assembles their own use cases inside governance you define, and each new use case is configuration instead of a project. No lock-in to one vendor's hardware or ecosystem. Bloom Energy replaced their legacy MES across 230 stations on this model without a rip-and-replace. I'd rather show you the architecture than pitch it. What would you want to stress-test first: integration, governance, or longevity?","qs":["What does your current shop floor architecture look like. on-prem, cloud, or hybrid, and where are the pain points?","Where does the tension between ops flexibility and IT governance cause the most friction on your team?","What's your current approach to reducing vendor lock-in across your manufacturing tech stack?","When a new ops use case comes up, what does your build-vs-buy decision process look like?","What criteria matter most in a MES evaluation. deployment speed, compliance depth, integration capability, or TCO?"],"warn":"This is a peer-level conversation. Don't pitch features. discuss architecture, governance models, and platform longevity. They will see through a surface-level pitch.","thread":"'Who on ops is pushing hardest for change? Who in IT would own the integration?' → VP Ops + IT Dir.","vm":"Hey [Name], Chris from Tulip. Technical directors tell me the floor is the last layer where every change is a project. One team went composable on top of their existing ERP and PLM and stopped building custom. Worth a look. I'll email you. Chris, Tulip, [number]."},{"title":"Validation Engineer","c":"#7c3aed","openers":["Hey [Name], Chris from Tulip. Reason for my call: validation engineers tell me the real cost of any floor change isn't the change, it's the revalidation cycle behind it. When a process changes today, what does the revalidation scope actually look like?","Hey [Name], Chris at Tulip. A validation team cut their burden by moving to a platform where changes are configuration, not code, with the IQ/OQ/PQ documentation package supplied instead of written from scratch. What eats more of your time right now: initial validation or revalidation?","Hey [Name], Chris from Tulip. Quick one: is your audit trail generated automatically and tamper-evident, or assembled by hand when someone asks? If it's assembled, that's exposure. Closing it is exactly what we do. Worth 60 seconds?"],"cares":["System validation compliance. IQ/OQ/PQ documentation and execution","21 CFR Part 11 and AS9100 electronic records and e-signature compliance","Minimizing revalidation burden when processes change","Audit trail completeness and tamper evidence","Change control. ensuring validated state is maintained through system updates"],"pains":["Every system change triggers a full revalidation cycle. slows down the business","Homegrown or legacy systems lack the documentation packages needed for FDA validation","Paper-based processes don't satisfy electronic records requirements but replatforming is a validation project","Audit trail gaps that surface during FDA inspections, not before","Validation documentation is manual, inconsistent, and hard to maintain over time"],"pitch":"Your bottleneck is structural: every change triggers a validation event, documentation gets written from scratch, and the systems you're validating weren't built for your regulatory reality. What changes: changes are configuration-based with controlled change management, so revalidation scope shrinks to impact assessment, the IQ/OQ/PQ documentation package comes with the platform instead of from your keyboard, and every record is tamper-evident and e-signed at the point of work. Purpose-built for FDA, AS9100, and GxP environments. If we handed you the complete documentation package, how much of your validation effort disappears?","qs":["What systems are you currently validating. MES, QMS, electronic batch records, and what's the biggest pain in that validation process?","When a process changes in your current system, what does the revalidation scope typically look like. full revalidation or can you do an impact assessment?","How are you currently meeting 21 CFR Part 11 requirements for electronic records and signatures. paper, a dedicated system, or something else?","What does your current audit trail look like. is it tamper-evident and automatically generated, or manually assembled?","If we could provide a complete IQ/OQ/PQ documentation package, how much would that change the effort required for validation on your end?"],"warn":"This is a highly technical, compliance-focused conversation. do not wing it. Know 21 CFR Part 11, IQ/OQ/PQ, and GxP before you call. They are gatekeepers who can block a deal. Treat them as a partner, not an obstacle. Bring the AE and potentially a solutions engineer to any real conversation.","thread":"'Who owns the quality and compliance systems decision? Who has budget authority?' → Quality Dir + QA + VP Ops + CTO.","vm":"Hey [Name], Chris from Tulip. Validation engineers tell me the painful part of any new system is the validation burden, and the revalidation after every change. We supply the full IQ/OQ/PQ package and keep changes configuration-based to shrink the scope. Worth 20 minutes. I'll email you. Chris, Tulip, [number]."},{"title":"VP of Programs","c":"#0d9488","openers":["Hey [Name], Chris from Tulip. Reason for the call: VPs of Programs tell me their biggest risk is a visibility gap. The wrong program status, surfacing too late, sometimes in front of an auditor. How do you get real status across your programs today: a system, or someone compiling it?","Hey [Name], Chris at Tulip. A program organization stopped compiling status by hand: real-time visibility across every line, digital travelers, audit trails that build themselves. They won new DoD work partly on the strength of it. How fast could you pull full traceability on one serial number right now?","Hey [Name], Chris from Tulip. Quick one: what's the biggest execution risk across your current programs, schedule, quality, or compliance? Whatever the answer, the common root is usually the same: the floor record lags reality. That's what we fix. Worth 60 seconds?"],"cares":["On-time delivery across all programs","Real-time cross-program visibility","Risk mitigation. traceability and compliance","Scaling execution without proportional headcount growth"],"pains":["Status reporting relies on manual data collection. always a step behind","Quality or traceability gaps surface during audits, not before","Changes in one program create downstream chaos in another","No single view of what's actually happening across all active programs"],"pitch":"Program risk lives in the lag: status reporting is manual and behind, traceability gaps surface during audits instead of before, and a change in one program ripples into the others unseen. What changes: real-time program status across every line and site, digital travelers with the complete production record searchable in seconds, and ECNs that propagate instantly instead of by memo. Pratt Miller ran their DoD contract production this way and won new contracts on the strength of their traceability. When your prime asks for a report, it's a query, not a fire drill. Which program would you de-risk first?","qs":["How do you get a real-time view of status across all your active programs today. system or manual reporting?","When a quality or traceability issue surfaces on a program, how quickly can you trace it and contain it?","If a customer or auditor asked for full traceability on a specific serial number right now, how long would that take?","How do ECNs from engineering actually reach the production floor, and how long does that propagation take?","What's the biggest execution risk across your current programs. schedule, quality, or compliance?"],"warn":"Frame everything as program execution risk and customer delivery. not technology. They think in milestones, contracts, and audit exposure. One bad audit finding can cost more than an entire platform.","thread":"'Who owns production on the floor? Who handles compliance and quality?' → Plant Mgr + Quality Dir + Program Mgr.","vm":"Hey [Name], Chris from Tulip. VPs of Programs tell me the wrong status showing up too late is their nightmare scenario. Pratt Miller got real-time program visibility and audit-ready traceability, and won new DoD work with it. Worth 20 minutes. I'll email you. Chris, Tulip, [number]."},{"title":"Program Mgr. A&D","c":"#ca8a04","openers":["Hey [Name], Chris from Tulip. Reason for my call: A&D program managers tell me the scariest audit moment is pulling a serial number's full history under pressure while it lives on paper travelers. If DCMA asked tomorrow, how long would that pull take?","Hey [Name], Chris at Tulip. A program shop replaced paper travelers with digital ones: QR-tracked, lot-validated, ECNs landing on the floor instantly. Pratt Miller won new DoD contracts on that traceability. What's your biggest compliance exposure right now: traceability gaps, or ECN lag?","Hey [Name], Chris from Tulip. Quick one: when engineering releases an ECN, how does it physically reach the operator, and how long does that take? On most programs it's someone printing and walking, and that's a delivery risk with a name on it. Worth a minute?"],"cares":["Milestone delivery","DCMA / FAA / DoD compliance","Cross-program visibility","Contract cost control"],"pains":["Paper travelers slow velocity","Traceability gaps","Manual multi-program status","ECNs don't reach floor fast"],"pitch":"Everything you're accountable for runs through documentation: traceability, milestones, cost, audit posture. And today it's on paper travelers moving at walking speed. What changes: digital travelers with QR and serial tracking, ECNs landing on operator screens the moment they're released, and the complete production record searchable in seconds when DCMA or your prime asks. Pratt Miller runs DoD contract production this way and won new contracts on it. Delivery risk drops because the record keeps up with the work. Which program has the tightest audit or milestone pressure right now?","qs":["How do you track travelers and serialized traceability today. paper, spreadsheet, or a system?","If DCMA walked in tomorrow, how long to pull full traceability on a specific serial number or lot?","How do ECNs from engineering actually reach the production floor. what's that process and how long does it take?","What's the biggest compliance or delivery risk on your current programs. traceability gaps, late ECNs, or something else?","When you win a new contract, how long before your production system can support the new requirements?"],"warn":"Frame EVERYTHING as delivery risk, contract compliance, cost per unit.","thread":"'Who owns mfg systems. ops or IT? Who handles AS9100?' → maps committee.","vm":"Hey [Name], Chris from Tulip. Program managers in A&D tell me their audit exposure is a serial number's history buried in paper. Pratt Miller made that a seconds-long search and won new DoD work. Worth a call. I'll email you. Chris, Tulip, [number]."},{"title":"Production Planner","c":"#0891b2","openers":["Hey [Name], Chris from Tulip. Reason for the call: planners tell me they schedule tomorrow using data from yesterday, and work orders vanish into the floor until they resurface at shipping, usually late. How much lag is there between the floor and your planning system right now?","Hey [Name], Chris at Tulip. Imagine seeing every work order's actual position: running, queued, blocked, at every station, live. Planners with that view catch the slip before it becomes a miss. When a work order is going to miss, how early do you typically find out today?","Hey [Name], Chris from Tulip. Quick one: the standard times your capacity plan runs on, when were they last validated against actual performance? If the honest answer is 'years,' the plan is fiction with a spreadsheet. That's what we fix. Worth 60 seconds?"],"cares":["Schedule adherence and on-time delivery","Real-time WIP visibility to make accurate scheduling decisions","Capacity utilization. knowing what the floor can actually execute","Early warning when a work order is going to miss its target","Reliable floor data to feed planning and ERP"],"pains":["Planning and scheduling based on yesterday's data. no real-time floor visibility","Work orders disappear into the floor and resurface at shipping, usually late","Capacity plans built on standard times that don't reflect actual floor performance","No early warning system. slips discovered after the fact","Floor data in ERP is manually entered and always lagging"],"pitch":"Your plan is only as good as its inputs, and the inputs are late: floor status arrives via yesterday's ERP entries, WIP hides between stations, and slips announce themselves at shipping. What changes: real-time work order status at every station flows straight into your planning picture, actual cycle times replace the standards nobody has validated in years, and the slip shows up while you can still reroute around it. OTD improves because you see it coming instead of reporting it after. What scheduling decision would you make differently this week with a live WIP picture?","qs":["How do you currently get visibility into where a specific work order is on the floor. is that real time or based on reports?","How much lag is there between something happening on the floor and it showing up in your ERP or planning system?","When a work order is going to miss its target date, how early do you typically find out?","How confident are you in the standard times your capacity plan is built on. when were those last validated against actual performance?","If you had real-time WIP visibility across every station right now, what scheduling decision would you change immediately?"],"warn":"Lead with planning visibility and OTD. not floor software. They think in work orders, capacity, and delivery dates. The pitch is: your plan finally reflects what's actually happening. Connect Tulip directly to their ERP story. they live in that system.","thread":"'Who owns ops execution day to day? Who has budget for planning and floor systems?' → Plant Mgr + Operations Mgr + VP Ops + IT Dir.","vm":"Hey [Name], Chris from Tulip. Planners tell me the worst part is scheduling on data that's already a day old. Real-time WIP at every station means you see the slip before it becomes a miss. Worth 20 minutes. I'll email you. Chris, Tulip, [number]."},{"title":"Digital Transformation Director","c":"#6366f1","openers":["Hey [Name], Chris from Tulip. Reason for my call: transformation leaders tell me the roadmap looks great until it reaches the floor, where point solutions don't talk and every integration waits on IT. Where does your roadmap stall most: floor level, IT bandwidth, or somewhere else?","Hey [Name], Chris at Tulip. Quick reality check: how many manual data handoffs sit between your shop floor and your ERP today, and whose job is that copying? Every one of those is a transformation initiative that half-happened. Removing them is the work we do. Worth 60 seconds?","Hey [Name], Chris from Tulip. A transformation team stopped stalling at the floor when their ops people could build and connect their own workflows instead of queuing for IT. First integration live in 90 days. What would that speed change about your roadmap?"],"cares":["System interoperability","Reducing manual data handoffs","Scalable digital architecture","Delivering ROI on transformation roadmap"],"pains":["Point solutions that don't talk to each other","IT can't keep up with integration backlog","Transformation projects stall at the floor level","No single source of truth for ops data"],"pitch":"The roadmap isn't failing, the execution layer is missing: point solutions that don't talk, manual handoffs bridging systems, and every floor change waiting in an integration queue. What changes: the floor connects to the ERP and systems you already run, ops teams build and modify their own workflows without opening tickets, and each roadmap item becomes weeks of configuration instead of a quarter of integration. The first use case is live in 90 days, which changes what your roadmap can promise. Where would you start: killing the manual handoffs, or the initiative that's been stuck longest?","qs":["How many manual data handoffs exist between your shop floor and ERP today. who is doing that work?","What does your current integration stack look like between ops systems and enterprise systems?","Where does your transformation roadmap stall most often. floor level, IT bandwidth, or something else?","What would it mean for your roadmap if ops teams could build and connect floor apps without opening IT tickets?","How do you currently measure success of transformation investments at the shop floor level?"],"warn":"Speak architecture, not features. They want to know where Tulip fits in the stack. not what it does in isolation.","thread":"'Who owns the ERP? Who drives the shop floor roadmap?' → IT Dir + VP Ops.","vm":"Hey [Name], Chris from Tulip. Transformation leaders tell me the roadmap looks great in slides and stalls at the shop floor. One team made the floor executable: their own people building, first integration in 90 days. I'll send something over. Chris, Tulip, [number]."},{"title":"Systems Engineer","c":"#0891b2","openers":["Hey [Name], Chris from Tulip. Reason for the call: systems engineers tell me every floor app and every new sensor turns into a vendor project or an IT ticket, and good ideas die in the queue. When you want to stand up a new monitoring workflow, what's the actual path today?","Hey [Name], Chris at Tulip. Imagine prototyping a working floor app in an afternoon: sensors, PLCs, cameras, connected without custom middleware, changed whenever you want. What would you build first if the queue disappeared?","Hey [Name], Chris from Tulip. Quick one: how much of your week goes to maintaining what exists versus building what's next? If maintenance is winning, the platform is the problem. There's a free 30-day trial, no credit card. Want to test it on a real problem?"],"cares":["System integration and interoperability","Rapid prototyping and deployment","IoT and sensor connectivity","Reducing dependency on outside integrators"],"pains":["Every floor app requires IT or vendor involvement","Integrating new sensors or devices takes months","Legacy systems can't expose data without custom work","Good ideas die waiting in the development queue"],"pitch":"Your constraint is the path from idea to running: every app needs a developer, every device integration is months, and legacy systems won't expose data without custom work. What changes: you build working floor apps in hours with drag and drop, native connectivity to the sensors, PLCs, and tools already on your floor, clean connections into the rest of your stack without custom middleware, and an edge runtime when the network drops. You prototype Tuesday, deploy Thursday, and change it yourself forever. The fastest way to judge it is hands-on: 30-day free trial on a real problem. Which one?","qs":["When you have an idea for a new floor monitoring or workflow app, what's the actual path to getting it built and deployed?","What does your current IoT and sensor integration setup look like. what protocols and devices are you working with?","How much of your team's time goes toward maintaining existing floor systems versus building new capabilities?","Where do good ideas die in your current workflow. budget, IT bandwidth, or technical complexity?","If you had a fully configurable no-code platform with native edge IoT connectivity, what's the first problem you'd tackle?"],"warn":"This is a potential CHAMPION. Don't pitch. show. Offer a free trial and technical deep-dive immediately. They need to see it to believe it.","thread":"'Who approves a pilot project? Who in IT needs to sign off on new tools?' → Technical Dir + IT Dir.","vm":"Hey [Name], Chris from Tulip. Systems engineers tell me good ideas die waiting in the development queue. Build the app yourself in hours, connect the devices you already have, change it whenever. Free 30-day trial. I'll send documentation. Chris, Tulip, [number]."},{"title":"Project Engineer","c":"#0284c7","openers":["Hey [Name], Chris from Tulip. Reason for my call: project engineers tell me the worst moment is 30 days after close, watching the floor drift back to the old way. How do you verify a new process is actually being followed across shifts once you've moved to the next project?","Hey [Name], Chris at Tulip. A project engineer with the same reversion problem made the new process the only way the station runs: mandatory steps, built-in verification, compliance visible live. The improvement finally held. What's the last change of yours that quietly reverted?","Hey [Name], Chris from Tulip. Quick one: when a project closes, how do you prove it delivered its KPIs, before-and-after? If that proof requires another manual study, the data capture was never part of the rollout. That's what we fix. Worth 60 seconds?"],"cares":["Project execution. getting from design to floor running correctly and on schedule","Process standardization across lines, shifts, and facilities","Change management. getting operators to follow the new standard","Verifying process compliance without walking every station","Capturing data to prove the improvement delivered results"],"pains":["Process changes designed on paper but executed inconsistently on the floor","No way to verify operators are following the new standard without physically observing every shift","Projects that look successful at launch but revert within weeks","Change documentation lives in SharePoint or binders. operators don't read it","No structured data capture to prove the project delivered its KPIs"],"pitch":"Your projects don't fail at design, they fail at sustainment: rollout takes weeks, verification means physically watching shifts, and the SharePoint documentation goes unread while the floor drifts back. What changes: the new process deploys to every line at once as a guided workflow, operators can't skip the mandatory steps, compliance is visible in real time without walking, and the before-and-after data captures itself. Your project sticks by default, and the proof is a chart instead of a study. Which rollout do you have coming up that absolutely has to hold?","qs":["When you complete a process improvement project, how do you actually deploy the new standard to operators on the floor, and how long does that rollout take?","How do you verify that operators across different shifts are following the new process consistently after launch?","What happens 30 days after a project closes. does the new standard hold, or does the floor drift back to the old way?","How do you capture the data to prove a project delivered its target KPIs. FPY improvement, cycle time reduction, defect reduction?","What's the biggest gap between your project design and what actually ends up running on the floor?"],"warn":"They are execution-focused and often frustrated by the gap between engineering intent and floor reality. Lead with deployment speed and built-in compliance verification. not platform features. They want their project to stick, not a new technology to manage.","thread":"'Who owns the floor processes you're improving? Who approves project budgets?' → Mfg Engineer + Plant Mgr + Dir of Mfg.","vm":"Hey [Name], Chris from Tulip. Project engineers tell me the hardest part isn't the improvement, it's keeping the floor from drifting back a month later. One team made the new process the only way the station runs, with live compliance visibility. Worth 20 minutes. I'll email you. Chris, Tulip, [number]."},{"title":"Mechanical Engineer","c":"#64748b","openers":["Hey [Name], Chris from Tulip. Reason for the call: mechanical engineers tell me the most frustrating discovery is that operators have been working around a design issue for weeks and nobody told engineering. How does floor feedback actually reach your team today, and how late?","Hey [Name], Chris at Tulip. When you release a revision, how do you know operators are building to it and not the one from March? A team with that same blind spot wired every assembly step back to the exact revision, and mismatches started surfacing at the station instead of at inspection. Worth 60 seconds?","Hey [Name], Chris from Tulip. Quick one: how well does your as-built BOM reconcile to the engineering BOM, and when do you find out when it doesn't? If the answer is 'late,' that reconciliation gap is where your rework lives. That's what we close."],"cares":["Designs being built to spec. correct revisions, correct components, correct tolerances","Engineering changes reaching the floor instantly and correctly","Production feedback on where designs are hard to build or causing defects","BOM accuracy from engineering to as-built","Reducing the rework loop between design and production"],"pains":["Operators building to stale revisions. ECNs take days to reach the floor","No feedback from the floor on which design features are causing assembly issues","As-built BOMs don't match engineering BOMs. discovered late","Tolerance and fitment issues found at inspection instead of caught during assembly","Tribal knowledge on the floor compensates for design gaps that never get back to engineering"],"pitch":"The loop between your desk and the floor is broken in both directions: revisions crawl out, and feedback crawls back as defects with your name on them. What changes: ECNs and BOM updates land on operator screens in real time, as-built data gets captured at every step and reconciled against your engineering BOM automatically, and assembly friction traces back to the specific revision and step, so the floor's workarounds reach you as data instead of tribal knowledge. DMG MORI runs this loop today. Your next design gets better because the last one finally reported back. Which assembly would you want instrumented first?","qs":["When you release an ECN or drawing revision, how does that change reach the operator on the floor, and how do you verify they're building to the new revision?","How often do you discover that operators have been compensating for a design issue on the floor, and how does that typically surface?","How long does it take for an assembly defect or fitment problem on the floor to make it back to your engineering team as structured feedback?","How accurate is your as-built BOM compared to the engineering BOM. is that reconciliation done systematically or manually after the fact?","If you could see in real time which assembly steps are generating the most operator errors or slowdowns, what would you do differently in your next design?"],"warn":"Mechanical engineers respond to precision and traceability. BOM accuracy, revision control, as-built vs. as-designed. Lead with the engineering change loop and design-to-floor gap. Don't pitch operator UX or dashboards. pitch the feedback loop that makes their designs build better.","thread":"'Who owns production execution for your assemblies? Who owns the ECN process above you?' → Mfg Engineer + Heads of Product + Quality Dir.","vm":"Hey [Name], Chris from Tulip. Mechanical engineers tell me the worst part is learning about a floor workaround weeks late. One team wired every assembly step back to the exact revision, in real time. Worth 20 minutes. I'll email you. Chris, Tulip, [number]."},{"title":"Business Intelligence Director","c":"#7c3aed","openers":["Hey [Name], Chris from Tulip. Reason for my call: BI leaders tell me the hardest data to get is what's happening on the floor right now, not what got typed in the next morning. Where does your ops data actually originate: a system, or a supervisor's spreadsheet?","Hey [Name], Chris at Tulip. The credibility problem I keep hearing: the dashboards look great and ops doesn't trust the numbers, because they know how the numbers got entered. What percentage of your floor data would you personally stand behind in a decision?","Hey [Name], Chris from Tulip. Quick one: when ops asks for a metric you don't have, what's actually in the way of capturing it? If the answer is 'the source systems,' fixing capture at the source is exactly what we do. Worth a conversation?"],"cares":["Data quality and completeness at the source","Real-time ops data pipelines","Self-serve analytics for ops teams","Single source of truth across plants"],"pains":["Floor data is manual, stale, and unreliable","BI dashboards look good but ops doesn't trust the numbers","No structured data from legacy MES or paper processes","IT can't build enough connectors to source systems"],"pitch":"Your pipeline is only as good as its worst source, and the floor is the worst source: manual entry, lagged, incomplete. What changes: every operator action, cycle time, and defect code gets captured automatically at the point of work, structured from birth, flowing to your warehouse and BI stack in real time without custom pipeline work. The lag between event and dashboard collapses to seconds, and ops starts trusting the numbers because they never touched a keyboard. Garbage-in stops being the excuse. What's the first metric you'd light up if the floor could feed it cleanly?","qs":["Where does your shop floor data originate. system, spreadsheet, or manual entry by supervisors?","How long is the lag between something happening on the floor and it showing up in your dashboards?","What percentage of your ops data would you say you fully tr
