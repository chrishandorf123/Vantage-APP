umbent doesn't cover the shop floor the way Tulip does.","color":"#e11d48","t1":"'Great. we actually integrate with [SAP/Siemens] and work alongside them constantly. The question is: does your [ERP/incumbent] give your operators real-time step-by-step guidance on the floor and auto-capture every action for audit? [Pause] That's the gap most teams tell us they have, and that's exactly where Tulip lives.'","t2":"'Totally get it. Out of curiosity, when you think about where [SAP/Siemens] falls short on the floor. paper workarounds, manual data entry, operators going off-script. is any of that a real frustration? That's the specific gap we fill.'"},{"id":"obj-whoisthis","cat":"objections","type":"objection","name":"Who Is This / How Did You Get My Number","tag":"TRUST","what":"They're caught off guard or mildly annoyed. This is a tone objection, not a rejection. Stay calm, be direct, and show credibility fast.","color":"#e11d48","t1":"'This is Chris from Tulip. I reached out because I work with [role] in [industry] and figured it was worth a quick call. If the timing's bad I can call back. what's a better time?'","t2":"'Fair question. I found your name because you're [End User / VP Ops] at [Company] and we work with a lot of teams in [industry] on digitizing operations. I'll be quick: [ICOS]. If it's not relevant, just say so and I'll be out of your hair.'"},{"id":"obj-procurement","cat":"objections","type":"objection","name":"Talk to Procurement / Go Through the Portal","tag":"PROCESS","what":"They're deflecting to process rather than engaging on value. Usually means they're not the decision-maker, or they're not sold enough to be your champion yet.","color":"#e11d48","t1":"'Happy to do that. I just want to make sure it's worth everyone's time before we spin up a formal process. Can I ask you two quick questions first: [1] Is there a real problem you're trying to solve, and [2] are you the right person to evaluate a solution like this?'","t2":"'Totally respect that. just want to make sure we're solving the right problem before going formal. Would it make sense to have a 20-minute conversation with you and your team first to see if there's even a fit?'"},{"id":"obj-failedimp","cat":"objections","type":"objection","name":"We Tried Something Like This Before / It Failed","tag":"TRUST","what":"They got burned. This is the highest-trust objection. acknowledge it, dig into why it failed, and show specifically how Tulip is different.","color":"#e11d48","t1":"[Voss label] 'It sounds like that was a really frustrating experience.' [Let them vent] 'What went wrong. was it the technology, the implementation, the adoption, or something else? [Listen] That's actually really useful context, because that's specifically what we've built differently..'","t2":"'That's a fair concern and honestly something I hear often. The reason most MES implementations fail isn't the technology. it's rigid systems that IT has to build and the floor won't use. Tulip is no-code, so operators build and own it. Can I show you one customer example where they came from a failed implementation?'"},{"id":"seq-tier1","cat":"sequences","type":"sequence","name":"Tier 1. Economic Buyers","full":"VP Ops · COO · CEO · Director of Manufacturing","color":"#2563eb","desc":"Economic buyers are results-driven and time-poor. Every touch must lead with business impact, not product features. Use Tulip's ROI data aggressively. Reference peer companies.","touches":[{"n":1,"ch":"📞 Cold Call","when":"Day 1","subject":"","body":"ICOS opener: 'I work with VP Ops teams running paper-heavy or legacy MES floors. We help them get a digital layer on top in weeks, not a 12-month IT project. how you're thinking about closing that gap today.' → If VM: leave voicemail, follow immediately with email."},{"n":2,"ch":"📧 Email (post-VM)","when":"Day 1 (same day)","subject":"Re: [Company] ops floor digitization","body":"[Name], tried you just now. Quick context: I work with [role peers] at companies like [relevant customer]. They were managing [specific pain] with [paper/legacy system] before switching to Tulip. Forrester: 448% ROI and <6-month payback. Worth 20 minutes?. Chris"},{"n":3,"ch":"💼 LinkedIn Connect","when":"Day 3","subject":"","body":"Connection note: 'Hi [Name]. I work with VP Ops teams in [industry] on closing the gap between their ERP and what's actually happening on the floor. Would love to connect and share a relevant case study.'"},{"n":4,"ch":"📞 Call + 📧 Email","when":"Day 7","subject":"One stat from [similar company]","body":"Call attempt first. Email: 'Wanted to share one number: [Customer in their industry] reduced defects 70% and recovered $1M+ in year one with Tulip. Similar floor to yours by the look of it. Worth a quick conversation? Still happy to show you exactly how they did it. Chris'"},{"n":5,"ch":"📞 Break-Up Call","when":"Day 14","subject":"Should I stop reaching out?","body":"'[Name], I've reached out a few times without hearing back. I'll take the hint if it's not relevant, but I didn't want to disappear without asking one question: is the floor digitization challenge not a priority right now, or did my messaging just not land? Either answer is genuinely helpful.' [If VM. same message, then withdraw]"}],"tip":"For Tier 1, always lead with Metrics (MEDDPICC M). CEO/COO speak in dollars and percentages. $16.23M NPV, 448% ROI, 70% fewer defects. Specific beats vague every time."},{"id":"seq-tier2","cat":"sequences","type":"sequence","name":"Tier 2. Champions","full":"End User · Ops Manager · IE · Mfg Engineer · Production Supervisor","color":"#059669","desc":"Champions feel the pain daily. They're closer to the problem but may need to build the business case upward. Lead with their operational reality, not corporate ROI. Make them look like heroes.","touches":[{"n":1,"ch":"📞 Cold Call","when":"Day 1","subject":"","body":"ICOS opener: 'I work with [End Users / IEs] running floors where paper travelers and manual reporting are still the norm. We help digitize that. no IT project required. how you're where [specific pain for role] today.' → Listen for the pain."},{"n":2,"ch":"📧 Email (post-VM)","when":"Day 1","subject":"Paper on the floor → what we hear from [role peers]","body":"[Name], couldn't reach you but wanted to leave a note. Most [End Users] I talk to are where [rework, compliance docs, operator skill gaps]. We close that gap with no-code apps that operators actually use. Companies like [customer] cut scrap 53% in 6 months. Worth 20 minutes?. Chris"},{"n":3,"ch":"💼 LinkedIn + value","when":"Day 4","subject":"","body":"Connect + message: 'Hi [Name]. saw you're running ops at [Company]. I work with [End Users / IEs] on digitizing floor processes without big IT projects. Sharing a quick case study from a team in [their industry] that might be relevant. Would love your take.'"},{"n":4,"ch":"📞 Call + 📧 Email","when":"Day 9","subject":"Quick Q about your floor","body":"Email: '[Name]. quick question: how are your operators currently capturing quality data at the point of production? Most floors I visit still rely on paper or manual entry after the fact. That gap is where we typically find the biggest wins. Worth a conversation?. Chris'"},{"n":5,"ch":"📞 Break-Up","when":"Day 16","subject":"Last note from me","body":"'[Name]. last reach-out, I promise. I didn't want to disappear without sharing one thing: a [End User / IE] at [similar company] was skeptical too. said they'd tried systems before that never stuck. [Result they got.] If that ever becomes relevant, you know where to find me. Chris'"}],"tip":"For Tier 2, make them the hero. 'Imagine walking into your next review with a 70% defect reduction and a fully compliant audit trail.' Champions need to picture their win before they'll champion you."},{"id":"seq-tier3","cat":"sequences","type":"sequence","name":"Tier 3. Technical Influencers","full":"IT Director · Technical Buyer · Validation Engineer · Systems Engineer","color":"#7c3aed","desc":"Technical buyers are gatekeepers and validators. not economic buyers. They care about integration risk, security, compliance, and implementation complexity. Lead with de-risking, not ROI.","touches":[{"n":1,"ch":"📞 Cold Call","when":"Day 1","subject":"","body":"ICOS for IT Dir: 'I work with IT Directors who are getting pressure to digitize shop floor ops without taking on a massive integration project. We're a no-code platform with OPC-UA, REST APIs, and pre-built ERP connectors. SOC 2 certified, AWS-hosted. how you're thinking about that layer today.'"},{"n":2,"ch":"📧 Email","when":"Day 1","subject":"Tulip + [ERP they use]: integration overview","body":"[Name], tried you today. Quick context: Tulip integrates with [SAP/Oracle/Epicor/Plex] via REST API, OPC-UA for machine data, and has SOC 2 Type II + AWS hosting. No custom code required on your end. IT teams at [reference customer] went live in 8 weeks. Worth a technical call?. Chris"},{"n":3,"ch":"💼 LinkedIn","when":"Day 5","subject":"","body":"'Hi [Name]. I work with IT/OT teams navigating the gap between ERP and the shop floor. We're a no-code MES that connects to your stack without custom dev. Happy to share our integration architecture doc. Would love to connect.'"},{"n":4,"ch":"📧 Email. Security/Compliance","when":"Day 10","subject":"Security, FedRAMP, SOC 2. quick overview","body":"[Name], following up with a quick security snapshot: Tulip is SOC 2 Type II certified, ISO 9001:2015, 21 CFR Part 11 compliant, and pursuing FedRAMP moderate. AWS GovCloud available for defense/government customers. Happy to share the security overview doc. Chris"},{"n":5,"ch":"📞 Break-Up","when":"Day 18","subject":"One last thing","body":"'[Name]. last note from me. I know technical evaluations require real cycles and I don't want to be noise. If the platform-to-platform integration question or compliance burden ever becomes your problem to solve, I'd love to be the first call. In the meantime. here's our integration architecture overview: [doc]. Chris'"}],"tip":"For Tier 3, de-risk everything. SOC 2, FedRAMP, 21 CFR 11, OPC-UA, REST API, 8-week go-live. They need to know it won't become their problem. Make the no-code angle feel like less IT work, not more."},{"id":"triggers-all","cat":"triggers","type":"triggers","name":"Compelling Events Library","full":"Compliance · Operational · Growth · Leadership · Technology","color":"#ea580c","desc":"Compelling events create the urgency that moves deals from 'interesting' to 'we need to act now.' Monitor these signals and reference them in your opener. They're your forcing functions.","sections":[{"label":"🔴 Compliance & Regulatory","color":"#e11d48","events":[{"e":"FDA Warning Letter / 483 Observations","hook":"'We're working with several med device teams right now coming off 483s. digital traceability and electronic DHR are the fastest path to a corrective action plan.'"},{"e":"Upcoming External Audit (ISO, AS9100, DCMA, FDA)","hook":"'Most QA directors I talk to pre-audit are running around pulling paper records. What does your audit prep look like right now?'"},{"e":"New Regulation Requirement (21 CFR 11, Annex 11, CMMC)","hook":"'Are you starting to feel the pressure around [21 CFR 11 / CMMC] compliance? That's the exact trigger that gets most teams to finally replace paper.'"},{"e":"Failed Audit / Corrective Action Mandate","hook":"'If you're under a corrective action mandate right now, the fastest way to close it is a digital work instruction + auto-audit trail. That's a 6-8 week Tulip deployment.'"},{"e":"AS9100 / NADCAP Renewal Coming Up","hook":"'How are you currently managing your AS9100 evidence? Most A&D teams I talk to are spending 2–3 days pulling docs for every audit. we get that to hours.'"}]},{"label":"🟠 Operational Crisis","color":"#0284c7","events":[{"e":"Quality Escape / Product Recall","hook":"'Did you see the [industry] recall last month? Most of the teams we work with after a quality escape say the same thing: we couldn't trace it fast enough. What's your traceability like right now?'"},{"e":"High Scrap Rate / Rework Spike","hook":"'When you see a scrap spike, how long does it take to identify the root cause? Most floors I visit take days. We get that to minutes.'"},{"e":"Production Line Shutdown / Unplanned Downtime","hook":"'Downtime is the most expensive 4-letter word in manufacturing. What does an hour of downtime cost your plant? [Listen] That's usually where Tulip pays for itself fastest.'"},{"e":"Missed Customer Delivery / OTD Miss","hook":"'Are you feeling pressure from customers on delivery right now? OTD misses usually trace back to a visibility gap between what's scheduled and what's actually happening on the floor.'"},{"e":"New Customer Quality Requirement (Tier 1 customer mandate)","hook":"'Did a customer just add a new quality or traceability requirement? That's usually the forcing function that gets teams to move.'"}]},{"label":"🟢 Strategic Growth","color":"#059669","events":[{"e":"New Plant Opening / Facility Expansion","hook":"'If you're opening a new line or plant, that's the perfect time to get the digital infrastructure right from day one instead of inheriting paper processes.'"},{"e":"New Product Introduction (NPI) / Product Launch","hook":"'How long does your NPI cycle take right now? Most teams we work with cut it from 8 weeks to 3–4 with digital work instructions. Is there a launch in the pipeline?'"},{"e":"ERP Go-Live / ERP Upgrade (SAP S/4, Oracle, etc.)","hook":"'Are you going through an ERP migration right now? That's when most teams realize the ERP doesn't handle what happens on the floor. that's the gap Tulip fills.'"},{"e":"M&A Activity / New Ownership","hook":"'With new ownership usually comes a push for operational visibility and standardization across sites. Is there a new mandate from the top?'"},{"e":"Government Contract Win (DoD, defense)","hook":"'Congrats on the [DoD / defense contract]. New DoD contracts typically trigger AS9100, ITAR, and DCMA const KEYS=["settings","hub","scores","targets","stats","templates","cadences","customObjections","personaEdits","blocks","scratch"];
async function loadState(){

function personaAt(idx,hub){

  if(AppState.personaEdits[idx]) p={...p,...AppState.personaEdits[idx]};

}

function parseCSV(txt){
  const rows=[];let row=[],cell="",q=false;
  for(let i=0;i<txt.length;i++){const ch=txt[i];
    if(q){if(ch==='"'){if(txt[i+1]==='"'){cell+='"';i++}else q=false}else cell+=ch}
    else if(ch==='"')q=true;
    else if(ch===','){row.push(cell);cell=""}
    else if(ch==='\n'||ch==='\r'){if(ch==='\r'&&txt[i+1]==='\n')i++;row.push(cell);cell="";if(row.some(c=>c!==""))rows.push(row);row=[]}
    else cell+=ch}
  row.push(cell);if(row.some(c=>c!==""))rows.push(row);
  return rows;
}
function targetsToCSV(){
  const esc=(v)=>{v=String(v==null?"":v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v};
  const head=["name","title","company","phone","tz","hub","persona","status","signal","signalNote","notes"];
  return [head.join(",")].concat(AppState.targets.map(t=>[t.name,t.title,t.company,t.phone,t.tz||"",t.hub||"",(D.PERSONAS[t.personaIdx]||{}).title||"",t.status,t.signal||"",t.signalNote||"",t.notes||""].map(esc).join(","))).join("\n");
}
function importTargetsCSV(text){
  const rows=parseCSV(text);if(!rows.length)return 0;
  const hd=rows[0].map(x=>x.trim().toLowerCase());
  const col=(names)=>{for(const n of names){const i=hd.findIndex(hh=>hh.includes(n));if(i>=0)return i}return -1};
  const ci={name:col(["name","contact"]),title:col(["title","job","role"]),company:col(["company","account","organization","org"]),phone:col(["phone","mobile","number"]),tz:col(["tz","timezone","time zone"]),hub:col(["hub","industry","vertical"]),persona:col(["persona"]),notes:col(["note","trigger","signal"])};
  const looksHeader=ci.name>=0||ci.company>=0;
  const body=looksHeader?rows.slice(1):rows;
  let n=0;
  body.forEach(r=>{
    const g=(k)=>ci[k]>=0?(r[ci[k]]||"").trim():"";
    const name=looksHeader?g("name"):(r[0]||"").trim();
    const company=looksHeader?g("company"):(r[2]||r[1]||"").trim();
    if(!name&&!company)return;
    const hubRaw=g("hub").toLowerCase();
    const hub=hubRaw?(["pharma","meddevice","general","aerodefense"].find(hh=>hh===hubRaw||hh.startsWith(hubRaw.slice(0,4))||hubRaw.includes(hh.slice(0,4)))||""):"";
    let personaIdx=0;const pRaw=g("persona").toLowerCase();
    if(pRaw){const pi=D.PERSONAS.findIndex(p=>p.title.toLowerCase()===pRaw||p.title.toLowerCase().includes(pRaw));if(pi>=0)personaIdx=pi}
    AppState.targets.unshift({id:uid(),name,company,title:looksHeader?g("title"):(r[1]||"").trim(),phone:g("phone"),tz:(g("tz")?({E:"ET",C:"CT",M:"MT",P:"PT",A:"AKT",H:"HT"}[g("tz").trim().toUpperCase()[0]]||""):""),hub,personaIdx,notes:g("notes"),status:"QUEUE",touches:0,createdAt:todayKey()});
    n++;
  });
  if(n)saveState("targets");
  return n;
}

function LiveCall({queueIds,blitz,onEnd}){
  const [pendScore,setPendScore]=useState(null);
  const [pOver,setPOver]=useState(null);
  const discOutRef=useRef(null);
  const intelOutRef=useRef(null);
  const [idx,setIdx]=useState(0);
  const [free,setFree]=useState({name:"",company:"",personaIdx:0});
  const [connected,setConnected]=useState(false);
  const [sec,setSec]=useState(0);
  const [tab,setTab]=useState("opener");
  const [showObj,setShowObj]=useState(false);
  const [notes,setNotes]=useState("");
  const [log,setLog]=useState([]);
  const [booked,setBooked]=useState(null);
  const timer=useRef(null);
  const isQueue=queueIds.length>0;
  const target=isQueue?AppState.targets.find(t=>t.id===queueIds[idx]):null;
  const basePIdx=isQueue?(target?target.personaIdx:0):free.personaIdx;
  const pIdx=(pOver!=null)?pOver:basePIdx;
  const hub=(target&&target.hub)||AppState.hub||null;
  const P=personaAt(pIdx,hub)||D.PERSONAS[0];
  useEffect(()=>{setPOver(null)},[idx]);
  const name=isQueue?(target?target.name:""):free.name;
  const company=isQueue?(target?target.company:""):free.company;
  useEffect(()=>{
    if(connected){timer.current=setInterval(()=>setSec(s=>s+1),1000)}
    return()=>clearInterval(timer.current);
  },[connected]);
  useEffect(()=>{const k=e=>{if(e.key.toLowerCase()==="o"&&!e.target.matches("input,textarea")){e.preventDefault();setShowObj(s=>!s)}};window.addEventListener("keydown",k);return()=>window.removeEventListener("keydown",k)},[]);
  const advance=(disp)=>{
    const dsnap={};try{const dd=(discOutRef.current)||{};for(const k in dd){const nn=(dd[k]&&dd[k].n)||0;if(nn)dsnap[k]=Math.min(9,nn)}}catch(e){}
    const iv=intelOutRef.current||{};
    const entry={name,company,disp,sec:connected?sec:0,notes,ts:Date.now(),pIdx,hub,tz:target?target.tz:"",disc:dsnap,topics:(iv.topics||[]).slice(0,3),compHeard:iv.comp||""};
    setLog(l=>[...l,entry]);
    logCallEvent(disp);
    bumpStat("dials");
    if(disp==="VM"){bumpStat("vms")}
    if(disp==="GATE"){bumpStat("gate")}
    if(["CONVO","MEETING","NI","CB"].includes(disp)){bumpStat("connects");}
    if(disp==="CONVO"||disp==="MEETING")bumpStat("convos");
    if(disp==="MEETING")bumpStat("meetings");
    if(disp==="NI")bumpStat("ni");

      if(Object.keys(dsnap).length){const td=target.disc||{};for(const k in dsnap){td[k]=Math.max(td[k]||0,dsnap[k])}target.disc=td}
      saveState("targets");

  };

    setConnected(false);setSec(0);setNotes("");setTab("opener");setBooked(null);

      if(idx+1<queueIds.length)setIdx(idx+1);
      else onEnd(log);
    } else {setFree({name:"",company:"",personaIdx:free.personaIdx})}
  };
  const talkHint=sec>0?(sec<210?{t:"BUILD — keep asking",c:"var(--amber)"}:sec<350?{t:"GOOD DEPTH — drive to next step",c:"var(--go)"}:{t:"CLOSE NOW — one step, two times",c:"var(--sig)"}):null;
  if(booked)return h(BookedPanel,{booked,notes,onNext:nextCall,onEnd:()=>onEnd(log)});

    showObj&&h(ObjOverlay,{onClose:()=>setShowObj(false)}),

const RXC={};
function kwStem(w){
  if(w.length<5)return w;
  if(/(ss|us|is)$/.test(w))return w;
  if(w.endsWith("s")&&w.length>=6)return w.slice(0,-1)+"s?";
  return w+"s?";
}
function kwRx(p){

    const words=String(p).toLowerCase().trim().split(/\s+/).map(w=>kwStem(w.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")));
    r=RXC[p]=new RegExp("\\b"+words.join("\\s+")+"\\b");
  }
  return r;
}

  const th=topicHit(t,say);
  if(th)return th;

  return null;
}
function closeOdds(sec,sig,node){
  sig=sig||{};
  let s=0;
  if(sec>=60)s+=Math.min(25,Math.round((sec-60)/120*25));
  if(sec>=180)s+=Math.min(15,Math.round((sec-180)/180*15));
  s+=(sig.disc?20:0)+(sig.pitch?15:0)+(sig.topic?10:0)+(sig.obj?15:0)+(sig.pos?15:0)+Math.min(12,(sig.cov||0)*3);
  let drift=0;
  if(sec>420){drift=Math.min(35,Math.round((sec-420)/60*8));s-=drift}
  s=Math.max(0,Math.min(100,s));
  let band,c;
  if(drift>=8){band="DRIFTING \u2014 LOCK IT";c="var(--alarm)"}
  else if(s<25){band="EARLY \u2014 EARN IT";c="var(--dim)"}
  else if(s<50){band="BUILDING";c="var(--amber)"}
  else if(s<75){band="STRONG \u2014 ASK SOON";c="var(--go)"}
  else {band="PEAK \u2014 ASK NOW";c="var(--go)"}
  const term=node==="close"||node==="emailc"||node==="sched"||node==="vmnode"||node==="refer";
  const nudge=!term&&sec>=90&&(s>=55||drift>=8);
  return {score:s,band,c,nudge,drift};
}

}

function BlitzStrip({blitz,dials}){

const DISC_HUB_QX={
 pharma:{
  stack:{q:"Walk me through the batch record itself. paper in a binder, a hybrid PDF, or a real EBR?",why:"The batch record format is the whole story in pharma. paper or hybrid means review cycles, deviations, and data integrity pain live downstream. A live EBR means integrate, not replace.",green:["paper batch records","hybrid","print and scan","master batch record","no ebr"],red:["ebr just went live","mes rollout in flight"]},

  pain:{q:"Where does a batch actually wait today. QA review, deviation closure, or missing signatures?",why:"Pharma pain is queue time, not machine time. Naming the queue names the first use case and the number it moves.",green:["review takes weeks","deviation backlog","waiting on qa","chasing signatures"],red:["no backlog","batches never wait"]},

 meddevice:{

<script>

 {id:"coop",label:"COOPERATIVE",desc:"Curious prospect, mild objections. Learn the flow.",c:"var(--go)"},
 {id:"real",label:"REALISTIC",desc:"Busy, skeptical, 2–3 real objections. Match to live conditions.",c:"var(--amber)"},
 {id:"hostile",label:"HOSTILE",desc:"Interrupts, brush-offs, gatekeeper energy. Pressure inoculation.",c:"var(--alarm)"},

function sparSystem(P,level){

    ?"You are moderately busy but open. Raise one or two soft objections. If the rep is decent, warm up."
    :level==="real"
    ?"You are busy and skeptical. You did not expect this call. Raise 2-3 realistic objections from your world (send me an email, we have a system, no budget, bad timing). Warm up ONLY if the rep asks good questions about your actual problems, validates your objections, and earns it."
    :"You are irritated and short. Open with resistance ('who is this?', 'not interested'). Interrupt long monologues. Only a genuinely skilled rep who stays calm, validates, and hooks a real pain gets more than 60 seconds from you. Hanging up ('*click*') is allowed if they pitch too hard.";
  return "You are roleplaying a cold call PROSPECT. You are a "+P.title+" at a mid-size manufacturer. Your world: you care about "+(P.cares||[]).slice(0,3).join("; ")+". Your real pains (do NOT volunteer them, make the rep dig): "+(P.pains||[]).slice(0,3).join("; ")+". "+temper+" The caller is an SDR from Tulip, a frontline operations platform. Rules: reply ONLY as the prospect, 1-3 short spoken sentences, natural phone dialogue, no stage directions except an occasional *sigh* or *click* for hangup. Never break character, never coach, never mention being an AI. If the rep properly earns it (pain surfaced, value connected, clear ask), agree to a meeting and wrap up. If they say goodbye, end naturally.";

function sparGradePrompt(P,level,msgs){

    h("div",{className:"row",style:{marginBottom:12,flexWrap:"wrap"}},
      h("span",{className:"stamp",style:{color:"var(--sig)"}},"LIVE SPAR"),
      h("b",{className:"mono",style:{fontSize:12}},P.title),

<script>
"use strict";
/* ================= COMMAND PALETTE (Ctrl/Cmd+K) ================= */
function takeJump(t){
  if(window.__JUMP&&window.__JUMP.t===t){const j=window.__JUMP;window.__JUMP=null;return j}
  return null;
}
function buildPaletteIndex(){
  const ix=[];
  D.PERSONAS.forEach((p,i)=>ix.push({k:"PERSONA",c:p.c||"var(--steel)",label:p.title,sub:(p.pains||[""])[0],act:{page:"playbook",jump:{t:"playbook",tab:"personas",q:p.title}}}));
  allObjections().forEach(o=>ix.push({k:"OBJECTION",c:"var(--alarm)",label:o.name,sub:o.tag||"",act:{page:"objections",jump:{t:"objections",q:o.name}}}));
  D.COMPETITORS.forEach(c=>ix.push({k:"BATTLE",c:c.c||"var(--steel)",label:c.n,sub:c.t||"",act:{page:"playbook",jump:{t:"playbook",tab:"battle",q:c.n}}}));
  D.CASE_STUDIES.forEach(c=>ix.push({k:"CASE",c:c.color||"var(--go)",label:c.co,sub:c.tag||"",act:{page:"playbook",jump:{t:"playbook",tab:"cases",q:c.co}}}));
  D.PLAYBOOKS.forEach(p=>{if(["qualification","selling","prospecting","sequences","triggers"].includes(p.cat))ix.push({k:"PLAY",c:p.color||"var(--violet)",label:p.name,sub:p.cat,act:{page:"playbook",jump:{t:"playbook",tab:"frameworks",q:p.name}}})});
  D.ACRO.forEach(([a,d])=>ix.push({k:"ACRONYM",c:"var(--amber)",label:a,sub:d,copy:d}));
  getTemplates().forEach(t=>ix.push({k:"TEMPLATE",c:"var(--steel)",label:t.name,sub:(t.ch||"")+" · "+(t.when||""),act:{page:"messages",jump:{t:"messages",id:t.id}}}));
  RESOURCES.forEach(s=>s.items.forEach(it=>ix.push({k:"LINK",c:"var(--sig)",label:it.n,sub:s.sec,copy:it.u,copyMsg:"LINK COPIED"})));
  MODULES.forEach(m=>ix.push({k:"GO",c:"var(--ink)",label:m.label,sub:"open module",act:{page:m.id}}));
  return ix;
}
function CommandPalette({go}){
  const [open,setOpen]=useState(false);
  const [q,setQ]=useState("");
  const [hi,setHi]=useState(0);
  const ixRef=useRef(null);
  useEffect(()=>{
    window.__palette=()=>{ixRef.current=buildPaletteIndex();setQ("");setHi(0);setOpen(true)};
    const onKey=(e)=>{
      if((e.ctrlKey||e.metaKey)&&(e.key==="k"||e.key==="K")){e.preventDefault();window.__palette()}
      else if(e.key==="Escape")setOpen(false);
    };
    document.addEventListener("keydown",onKey);
    return()=>document.removeEventListener("keydown",onKey);
  },[]);
  if(!open)return null;
  const ix=ixRef.current||[];
  const ql=q.trim().toLowerCase();
  let res;
  if(!ql){res=ix.filter(x=>x.k==="GO")}
  else{
    const scored=[];
    ix.forEach(x=>{
      const L=x.label.toLowerCase(),S=(x.sub||"").toLowerCase();
      let sc=-1;
      if(L.startsWith(ql))sc=0; else if(L.includes(ql))sc=1; else if(S.includes(ql))sc=2;
      if(sc>=0)scored.push([sc,x]);
    });
    scored.sort((a,b)=>a[0]-b[0]);
    res=scored.slice(0,14).map(x=>x[1]);
  }
  const pick=(x)=>{
    if(x.copy){copyText(x.copy,x.copyMsg||"COPIED");setOpen(false);return}
    if(x.act){if(x.act.jump)window.__JUMP=x.act.jump;go(x.act.page);setOpen(false)}
  };
  return h("div",{className:"cp-overlay",onMouseDown:(e)=>{if(e.target.classList.contains("cp-overlay"))setOpen(false)}},
    h("div",{className:"cp-box anim-pop"},
      h("div",{className:"cp-inputrow"},
        h("span",{className:"mono",style:{fontSize:13,color:"var(--dim)"}},"⌕"),
        h("input",{className:"cp-input",autoFocus:true,placeholder:"Search personas, objections, battle cards, cases, acronyms, links…",value:q,
          onChange:e=>{setQ(e.target.value);setHi(0)},
          onKeyDown:e=>{
            if(e.key==="ArrowDown"){e.preventDefault();setHi(x=>Math.min(x+1,res.length-1))}
            else if(e.key==="ArrowUp"){e.preventDefault();setHi(x=>Math.max(x-1,0))}
            else if(e.key==="Enter"&&res[hi])pick(res[hi]);
          }}),
        h("span",{className:"cp-kbd"},"ESC")),
      h("div",{className:"cp-results"},
        res.length?res.map((x,i)=>h("div",{key:x.k+x.label+i,className:"cp-item"+(i===hi?" hi":""),onMouseEnter:()=>setHi(i),onClick:()=>pick(x)},
          h("span",{className:"cp-type",style:{color:x.c}},x.k),
          h("span",{className:"cp-label"},x.label),
          h("span",{className:"cp-sub"},x.sub||""),
          h("span",{className:"cp-go"},x.copy?"⧉":"↵")))
        :h("div",{className:"mono dim",style:{padding:"16px 14px",fontSize:11}},"No matches. Try fewer letters.")),
      h("div",{className:"cp-foot"},"↑↓ move · ↵ open (⧉ items copy to clipboard) · acronyms show their meaning right here")));
}
</script>

 {t:"Traveler",cat:"SHOP FLOOR",d:"The paper packet that physically travels with a part or batch through production, collecting steps, sign-offs, and measurements as it goes.",w:"If they say traveler, they are paper-based. That is a Tulip conversation starting itself."},

 {t:"Paper-on-glass",cat:"SYSTEMS",d:"Digitizing a paper form into a static screen without rethinking the process. A PDF on a tablet is still a PDF.",w:"Competitors sell paper-on-glass. Tulip's counter is apps that react, validate, and connect."},

 {t:"Single source of truth",cat:"SYSTEMS",d:"One agreed place where the correct version of information lives, instead of five spreadsheets that disagree.",w:"Ask how many versions of the truth exist between planning and the floor."},

 {t:"Deviation",cat:"QUALITY",d:"Any departure from the approved process or spec. In regulated plants, each one triggers documentation and investigation.",w:"Ask how long a deviation takes to close. Weeks is common. Weeks of engineer time."},

 {t:"Data integrity",cat:"QUALITY",d:"Assurance that records are complete, accurate, and unaltered. Regulators shorthand the criteria as ALCOA.",w:"A data integrity finding on an audit is a career-level bad day for a quality director."},
 {t:"Right-first-time",cat:"QUALITY",d:"The percentage of work completed correctly with no rework, deviations, or corrections.",w:"A metric quality leaders track and love to improve. Ask theirs."},
 {t:"Release",cat:"QUALITY",d:"The formal decision that a finished batch or lot can ship, made after reviewing all its records.",w:"Review-by-exception on digital records collapses release time. Big pharma proof point."},
 {t:"Batch record",cat:"PHARMA",d:"The complete documented history of one production batch: every step, ingredient, reading, and signature. Regulators can demand it years later.",w:"Paper batch records are the beating heart of pharma pain. Hours of review per batch."},
 {t:"Batch record review",cat:"PHARMA",d:"Quality checking every page of a batch record before release. On paper, error hunts through hundreds of pages.",w:"Ask how many people touch a batch record before release. The number sells for you."},
 {t:"Cleanroom",cat:"PHARMA",d:"A controlled production space where air, gowning, and behavior are strictly managed to prevent contamination.",w:"Paper in cleanrooms is a contamination and logistics headache. Tablets behind glass are not."},
 {t:"Environmental monitoring",cat:"PHARMA",d:"Routinely sampling air, surfaces, and people in clean spaces to prove contamination control.",w:"High-volume, deadline-driven data collection. Painful on paper, natural in an app."},
 {t:"Lot genealogy",cat:"PHARMA",d:"The family tree of a batch: which material lots went into it and which orders it fed.",w:"When a supplier recalls a lot, genealogy answers what else is affected. Paper makes that days."},
 {t:"Tech transfer",cat:"PHARMA",d:"Moving a process from one site or scale to another: lab to plant, site to site, with all its knowledge intact.",w:"Ask how process knowledge travels between sites. Usually: binders and one overworked expert."},
 {t:"Validation",cat:"PHARMA",d:"Documented proof that equipment, software, and processes reliably do what they claim. A regulatory requirement before production use.",w:"Buyers fear software that is hard to validate. Tulip has validation-ready answers; know they exist, let AEs go deep."},
 {t:"Design history file",cat:"MED DEVICE",d:"The complete record proving a device was designed under proper controls, from requirements through testing.",w:"Device buyers live in acronyms: DHF for design history, DHR for each unit built, DMR for the recipe. Knowing the difference earns credibility."},
 {t:"Design controls",cat:"MED DEVICE",d:"The regulated discipline governing how devices are designed: requirements, reviews, verification, validation, all documented.",w:"Signals you are talking to engineering leadership rather than production. Adjust your pains accordingly."},
 {t:"Complaint handling",cat:"MED DEVICE",d:"The regulated process for logging and investigating every product complaint from the field, with reporting deadlines to regulators.",w:"Complaint volume plus paper equals backlog. Quality directors feel this weekly."},
 {t:"Class II device",cat:"MED DEVICE",d:"FDA's middle risk tier: think surgical instruments, infusion pumps, diagnostics. Most devices live here, cleared through the 510(k) pathway.",w:"Class tells you regulatory intensity. Class II and III shops have the deepest documentation pain."},
 {t:"Sterilization lot",cat:"MED DEVICE",d:"A batch of product sterilized together, with parameters recorded as proof each unit is safe to use.",w:"Sterilization records are release-blocking. Delays here are shipment delays."},
 {t:"Serialized part",cat:"AERO & DEF",d:"A part with a unique tracked identity for its entire life, sometimes decades of service history.",w:"Serialization means traceability obsession. Aerospace buys traceability before it buys speed."},

 {t:"Yield",cat:"SHOP FLOOR",d:"Good units out divided by units started. The fraction of production that survives the process.",w:"Yield lives on spreadsheets updated after the fact. Ask when they find out yield dropped."},

 {t:"Traceability",cat:"QUALITY",d:"The ability to trace any product to exactly what went into it, who built it, on what equipment, when.",w:"The word that unlocks pharma, device, and aerospace conversations alike. Ask how long a trace takes them today."},
 {t:"Statistical process control",cat:"QUALITY",d:"Using live measurements and control charts to spot a process drifting before it makes bad parts. Often shortened to SPC.",w:"SPC on paper means charts nobody plots. Real-time SPC is a named Tulip capability."},

 {t:"Recall",cat:"QUALITY",d:"Pulling product back from customers or the field. The most expensive and public quality failure.",w:"Do not lead with recall fear on a call; do let them bring it up. If they have lived one, listen."},

 {t:"Supplier quality",cat:"QUALITY",d:"Managing the quality performance of vendors: scorecards, audits, corrective actions on their defects.",w:"Supplier issues found late become your deviation. Ask how supplier defects get logged today."},
 {t:"Cost of poor quality",cat:"QUALITY",d:"Everything defects cost: scrap, rework, inspection, complaints, recalls, expedites. Usually far larger than anyone admits.",w:"The bridge from floor pain to CFO language. Your case-study stats are cost-of-poor-quality stats."},
 {t:"Redline",cat:"QUALITY",d:"A marked-up correction to a released document, made in the moment and formalized later. Named for the red pen.",w:"Ask how long redlines take to reach every copy on the floor. On paper: weeks, and stale copies linger."},
 {t:"Electronic signature",cat:"QUALITY",d:"A regulated digital signature that legally stands in for wet ink, with identity and timestamp attached.",w:"Regulated buyers will ask if signatures are compliant with Part 11. The answer is yes; details belong to the AE."},
